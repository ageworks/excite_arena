  }
  if (isPopup && p.t > 8 && G.t % 60 < 38) shText('Zボタンで つづける', W / 2, py0 + ph2 - 16, 10, '#7cff8a', 'center');
}

/* 選手交代演出: 退く選手が左へ、入る選手が右から登場するスライド + バナー */
function drawSubFx() {
  const fx = M.subFx, t = fx.t;
  const team = TEAMS[0];
  // フェーズ: 0-18 入場, 18-92 表示, 92-110 退場
  let alpha = 1;
  if (t < 18) alpha = t / 18;
  else if (t > 92) alpha = Math.max(0, (110 - t) / 18);
  const slideIn = t < 18 ? easeOut(t / 18) : 1;       // 0→1
  // 半透明の暗転
  ctx.save();
  ctx.globalAlpha = alpha * 0.5;
  px(0, 150, W, 150, 'rgba(6,8,24,1)');
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = alpha;
  // バナー枠
  const bx = 56, by = 168, bw = 400, bh = 110;
  px(bx, by, bw, bh, 'rgba(12,16,40,0.96)');
  px(bx, by, bw, 4, '#ffd040'); px(bx, by + bh - 4, bw, 4, '#cc3030');
  ctx.strokeStyle = '#e8b030'; ctx.lineWidth = 2; ctx.strokeRect(bx + 1, by + 1, bw - 2, bh - 2);
  shText('★ 選手交代 ★', 256, by + 10, 16, '#ffd040', 'center');

  // OUT 選手(左から、退く) — 赤系・左へスライド
  const outX = bx + 40 - (1 - slideIn) * 60;
  drawSubChip(outX, by + 40, fx.outNum, fx.outName, '#ff8888', 'OUT ▼', team.shirt, team.pants);
  // IN 選手(右から、入る) — 緑系・右からスライド
  const inX = bx + bw - 200 + (1 - slideIn) * 60;
  drawSubChip(inX, by + 40, fx.inNum, fx.inName, '#7cff8a', 'IN ▲', team.shirt, team.pants);

  // 中央の矢印
  shText('⇄', 256, by + 52, 22, '#ffe060', 'center');
  ctx.restore();
}
function drawSubChip(x, y, num, name, col, label, shirt, pants) {
  text(label, x, y - 14, 11, col);
  // ミニ選手アイコン(ユニ色の四角)
  px(x, y, 16, 22, shirt); px(x + 2, y + 14, 12, 8, pants);
  px(x + 4, y - 6, 8, 8, '#f0c8a0');   // 頭
  shText('#' + num, x + 24, y - 2, 13, '#ffffff');
  text(name, x + 24, y + 16, 12, col);
}

function drawAttackSeq() {
  const at = M.atkTeam, df = 1 - at;
  const a = M.atk, b = M.blk;
  const dir = at === 0 ? -1 : 1;
  const setX = NETX + dir * 30;
  const t = M.t;

  // セッター
  dude(setX, 318, at, 'ready', 0, TEAMS[at].players[0]);

  if (at === 1) {
    // ===== プレイヤーのブロックフェーズ =====
    const type0 = ATK[M.cpuType];
    const cue = LV[G.level].cue;
    const IMPACT = SPIKE + 9;              // アタックのインパクト瞬間
    // 自軍ブロック枠(選択レーンを強調)
    for (let l = 0; l < 3; l++) {
      const sel = b.lane === l;
      px(NETX - 47, LANEY[l] - 14, 38, 44, sel ? 'rgba(124,255,138,.12)' : 'rgba(255,255,255,.03)');
      ctx.strokeStyle = sel ? '#7cff8a' : 'rgba(255,255,255,.30)';
      ctx.lineWidth = sel ? 3 : 1;
      ctx.strokeRect(NETX - 47, LANEY[l] - 14, 38, 44);
      text(LANENAME[l], NETX - 52, LANEY[l] - 2, 9, sel ? '#7cff8a' : '#9aa6d8', 'right');
    }
    // どのレーンに来るか(cue以降に開示)— 来るレーン枠を赤く点滅
    if (t >= cue) {
      const yy = LANEY[type0.lane];
      if (t % 10 < 6) { ctx.strokeStyle = '#ff5050'; ctx.lineWidth = 2; ctx.strokeRect(NETX + 9, yy - 14, 38, 44); }
      shText('▼' + LANENAME[type0.lane] + 'に来る!', 372, 150, 13, '#ff8888', 'center');
    }
    // ブロッカー(個体)
    let blocker = TEAMS[0].players[frontBlocker(0, b.lane)];
    if (!blocker) blocker = TEAMS[0].players.find(p => p) || TEAMS[0].libero;  // 念のため
    const jumped = b.pressT !== null && t - b.pressT < 26;
    const jumpH = jumped ? (32 - (t - b.pressT)) : 0;
    dude(NETX - 28, LANEY[b.lane] + 26, 0, jumped ? 'jumpB' : 'ready', Math.max(0, jumpH), blocker);
    text(blocker.name + ' [' + blocker.pos + ']', NETX - 28, 176, 9, '#9aa6d8', 'center');

    // 助走するアタッカー
    if (t >= cue) {
      const runP = clamp((t - cue) / (IMPACT - cue), 0, 1);
      const A = TEAMS[1].players[type0.slot[0]];
      const isBack = M.cpuType === 5, isBroad = M.cpuType === 6;
      let sX, eX, slideX = 0;
      if (isBack) { sX = NETX + 150; eX = NETX + 96; }          // 後方から
      else if (isBroad) { sX = NETX + 70; eX = NETX + 36; slideX = -runP * 40; } // ネット際を流れる
      else { sX = NETX + 120; eX = NETX + 36; }
      const ax = lerp(sX, eX, runP);
      const pose = runP > 0.82 ? 'spike' : 'run';
      dude(ax + slideX, LANEY[type0.lane] + 26, 1, pose, runP > 0.82 ? (isBack ? 36 : 30) : 0, A, t, 'left');
    }
    // トスのボール
    if (t > DECIDE) {
      const p = clamp((t - DECIDE) / (IMPACT - DECIDE), 0, 1);
      ballDraw(lerp(setX, NETX + 34, p), arcY(250, 206, type0.quick ? 26 : 70, p));
    } else {
      ballDraw(setX + 6, 268 - clamp(t * 1.2, 0, 24));
    }

    // ★ブロックタイミングバー: インパクト(IMPACT)で「JUST」帯を通過
    const bx = 120, bw = 272, by = 374, span = IMPACT;
    px(bx - 2, by - 2, bw + 4, 18, '#101028');
    px(bx, by, bw, 12, '#283050');
    const zc = bx + bw * IMPACT / span;   // = bx+bw(右端がインパクト)
    // ジャスト帯(±5)とセーフ帯(±19)を右端に向けて配置
    px(bx + bw * (IMPACT - 19) / span, by, bw * 38 / span, 12, '#3a5a30');
    px(bx + bw * (IMPACT - 5) / span, by, bw * 10 / span, 12, '#40c060');
    px(bx + bw - 1, by, 2, 14, '#ffe060');
    const mv = clamp(bx + bw * Math.min(t, IMPACT) / span, bx, bx + bw);
    px(mv - 1, by - 3, 3, 18, '#ffffff');
    text('Bブロック!', bx + bw + 6, by - 1, 10, '#7cff8a');
    // 押した瞬間のフィードバック
    if (b.pressT !== null) {
      const d = b.pressT - IMPACT;
      const lbl = Math.abs(d) <= 5 ? 'JUST!' : (d > -20 && d < 20) ? 'おしい' : '早すぎ/遅すぎ';
      const col = Math.abs(d) <= 5 ? '#7cff8a' : (d > -20 && d < 20) ? '#ffd76a' : '#ff6868';
      shText(lbl, NETX - 28, 150, 16, col, 'center');
    }
    // インパクト合図
    if (t > IMPACT - 14 && t < IMPACT + 4) {
      const f = 1 - Math.abs(t - IMPACT) / 14;
      ctx.strokeStyle = 'rgba(255,80,80,' + f + ')'; ctx.lineWidth = 3 + f * 4;
      ctx.strokeRect(NETX + 6, LANEY[type0.lane] - 16, 44, 48);
      if (t % 6 < 4) shText('NOW!', NETX + 26, 168, 20, '#ff6868', 'center');
    }
  } else {
    // ===== プレイヤーのトスフェーズ(2段方式) =====
    const at0 = M.atkTeam;
    const bx = 86, bw = 340, by = 374, span = TOSS_SPAN;
    const xOf = tt => bx + bw * clamp(tt, 0, span) / span;
    px(bx - 2, by - 2, bw + 4, 18, '#101028');
    px(bx, by, bw, 12, '#283050');
    // バー中央(MID)の境界線
    const midX = xOf(TOSS_MID);
    px(midX - 1, by - 2, 2, 16, '#55608a');

    if (!a.touched) {
      // 1回目タッチ前: 左側が作戦入力ゾーン(緑)
      px(bx, by, midX - bx, 12, 'rgba(80,200,120,.28)');
      text('← この間に作戦(1-6)を入力!', bx, by - 16, 10, '#7cff8a');
      text('押さないと自動オープン', bx, by + 14, 9, '#8a96d8');
    } else {
      // 1回目タッチ後: 右側に対応するジャストゲージ(作戦別許容幅)
      const gc = xOf(a.gate);
      const ty = ATK[a.typeId];
      const tolJ = ty.tolJ != null ? ty.tolJ : ATK_TOL_J;
      const tolOk = ty.tolOk != null ? ty.tolOk : ATK_TOL_OK;
      px(clamp(gc - bw * tolOk / span, bx, bx + bw), by, bw * 2 * tolOk / span, 12, 'rgba(80,200,120,.30)');
      px(clamp(gc - bw * tolJ / span, bx, bx + bw), by, bw * 2 * tolJ / span, 12, '#40c060');
      px(gc - 1, by, 2, 14, '#ffe060');
      text(ATK[a.typeId].name, gc, by - 16, 9, '#ffd76a', 'center');
      if (a.tButton === null) text('ジャストで矢印アタック!(↑奥 →中央 ↓手前 ←インナー)', bx, by + 14, 9, '#7cff8a');
      else {
        const courseJ = { deep: '後列・奥', center: '後列・中央', near: '後列・手前', inner: '前列インナークロス',
                          endline: 'エンドライン際', front: '手前' };
        text('コース: ' + (courseJ[a.course] || a.course), bx, by + 14, 10, '#7cff8a');
      }
    }
    // 進行カーソル
    const mv = clamp(xOf(t), bx, bx + bw - 2);
    px(mv, by - 3, 3, 18, '#ffffff');

    // フィードバック
    if (a.touched && a.grade) {
      const lbl = a.grade === 'just' ? 'JUST!' : a.grade === 'ok' ? 'OK' : '威力減…';
      const col = a.grade === 'just' ? '#7cff8a' : a.grade === 'ok' ? '#ffd76a' : '#ff6868';
      shText(lbl, NETX - 60, 150, 16, col, 'center');
    }

    // ボール・アタッカー描画
    if (!a.touched) {
      ballDraw(setX - 6, 268 - clamp(t * 0.6, 0, 14));      // 1回目タッチ待ち
    } else if (a.tButton === null) {
      // トス上昇中(2回目アタック待ち)。ボールはジャスト位置に向けて上がる
      const p = clamp((t - 0) / Math.max(1, a.gate), 0, 1);
      ballDraw(lerp(setX, setX - 8, p), 268 - p * 40);
      // アタッカー助走(クイックは短い助走、オープン/バックは長い助走)
      const type = ATK[a.typeId];
      const A = TEAMS[at0].players[type.slot ? type.slot[0] : 1];
      const startX = type.quick ? NETX - 70 : NETX - 110;
      dude(lerp(startX, NETX - 40, p), LANEY[type.lane] + 26, 0, 'run', 0, A, t);
    } else {
      const type = ATK[a.typeId];
      const A = TEAMS[at0].players[a.attacker];
      const p = clamp((t - a.tButton) / Math.max(1, a.spikeT - a.tButton), 0, 1);
      const quick = type.quick;
      const isBack = a.typeId === 5;     // バックアタック
      const isBroad = a.typeId === 6;    // ブロード
      // ボール軌道: クイックは低く速い弧、オープン/バックは高い弧
      // バックアタックはネットから離れた位置(アタックライン後方)へボールが上がる
      const ballEndX = isBack ? NETX - 92 : NETX - 34;
      ballDraw(lerp(setX, ballEndX, p), arcY(250, 206, type.quick ? 24 : 70, p));
      // 作戦別ジャンプ・助走
      let startX, endX, atkLaneY = LANEY[type.lane] + 26;
      let slideX = 0;
      if (isBack) {
        // 後衛アタッカー: アタックライン(論理x≈160)より後ろから踏み切る
        startX = NETX - 150; endX = NETX - 96;   // ネットから遠い(後方)
      } else if (isBroad) {
        // ブロード: ネット際を大きく横へ走ってブロックをかわす
        startX = NETX - 70; endX = NETX - 34;
        slideX = p * 40;                         // ネット平行に大きく流れる
      } else {
        startX = quick ? NETX - 70 : NETX - 100; endX = NETX - 36;
      }
      const ax = lerp(startX, endX, p);
      const jumpPeak = isBack ? 36 : a.typeId === 1 ? 32 : quick ? 24 : 28;
      const jumpThresh = quick ? 0.55 : (isBack ? 0.74 : 0.7);
      const pose = p > jumpThresh ? 'spike' : 'run';
      // 走行中は進行方向(右=相手コート)を向く
      const facing = pose === 'run' ? (isBroad ? 'right' : 'right') : 'right';
      dude(ax + slideX, atkLaneY, 0, pose, pose === 'spike' ? jumpPeak : 0, A, t, facing);
      if (p > 0.6 && b.blocker && (a.attacker == null || isFront(0, a.attacker))) {
        dude(NETX + 28, LANEY[b.lane] + 26, 1, 'jumpB', b.press ? 26 : 6, b.blocker);
      }
    }
  }
}

function drawOutcome() {
  const r = M.result, at = M.atkTeam;
  const dir = at === 0 ? 1 : -1;       // 攻撃の進行方向
  const sx = NETX - dir * 36, sy = 206;
  const p = clamp(M.t / 26, 0, 1);
  const a = M.atk, type = ATK[a.typeId];
  const A = TEAMS[at].players[a.attacker];
  // アタッカー & ブロッカー(個体)。作戦ごとにジャンプ高さ・位置を変える
  const quick = type.quick;
  const isBack = a.typeId === 5, isBroad = a.typeId === 6;
  const jumpPeak = isBack ? 36          // バックアタック: 高く
                 : a.typeId === 1 ? 32  // オープン: 高く
                 : quick ? 24 : 28;     // クイック系: 低めで素早い
  const atkY = LANEY[type.lane] + 26;
  // バックアタックはネットから離れた位置(アタックライン後方)で踏み切る
  const backOff = isBack ? dir * 60 : 0;
  // ブロード(6)は横に流れながら打つ
  const slideX = isBroad ? dir * Math.min(M.t, 16) * 2.2 : 0;
  dude(NETX - dir * 36 + slideX + backOff, atkY, at, 'spike',
       Math.max(0, jumpPeak - M.t * (quick ? 1.5 : 1)), A, M.t, at === 0 ? 'right' : 'left');
  if (M.blk.blocker && M.blk.press && (a.attacker == null || isFront(at, a.attacker)))
    dude(NETX + dir * 28, LANEY[M.blk.lane] + 26, 1 - at, 'jumpB', Math.max(0, 26 - M.t), M.blk.blocker);

  let ex, ey, peak = 6;
  if (r.kind === 'shut') { ex = NETX - dir * 70; ey = 330; }
  else if (r.kind === 'blockout') { ex = NETX + dir * 250; ey = 160; peak = 40; }
  else if (r.kind === 'out') { ex = NETX + dir * 244; ey = 348; }
  else if (r.kind === 'dig') { ex = NETX + dir * 150; ey = 300; }
  else {
    // 決定打: 打ち分けたコースで着地点・軌道を変える
    const c = a.course;
    if (c === 'inner') {        // インナークロス: 鋭い角度で逆サイド奥
      ex = NETX + dir * 120; ey = LANEY[0] + 30; peak = 4;
    } else if (c === 'endline') { // エンドライン際: 深く遠くへ伸びる
      ex = NETX + dir * 215; ey = 344; peak = 10;
    } else if (c === 'deep') {   // 奥側
      ex = NETX + dir * 165; ey = LANEY[0] + 22; peak = 6;
    } else if (c === 'front') {  // 手前に落とす(軟打/フェイント)
      ex = NETX + dir * 75; ey = LANEY[2] + 34; peak = 22;
    } else {
      ex = NETX + dir * 150; ey = 336;
    }
  }
  ballDraw(lerp(sx, ex, p), arcY(sy, ey, peak, p) , p > .5);
  if (r.kind === 'dig' && M.t > 26) {
    if (M.t < 40) dude(ex, 326, 1 - at, 'digswing', 0, r.digger, M.t - 26);
    else dude(ex, 326, 1 - at, 'recv', 0, r.digger, M.t);
    const p2 = clamp((M.t - 30) / 40, 0, 1);
    ballDraw(lerp(ex, NETX + dir * 30, p2), arcY(300, 250, 70, p2));
  }
  // ★ブロック成功(シャット)を派手に可視化
  if (r.kind === 'shut') {
    const cx = NETX + dir * 14, cy = LANEY[M.blk.lane] + 6;
    if (M.t < 40) {
      const f = M.t / 40;
      ctx.strokeStyle = 'rgba(124,255,138,' + (1 - f) + ')'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(cx, cy, 10 + f * 50, 0, 7); ctx.stroke();
    }
    if (M.t > 8 && M.t % 8 < 5) shText('★SHUT BLOCK★', cx, cy - 60, 16, '#7cff8a', 'center');
    const who = M.blk.blocker;
    if (M.t > 16) shText(who.name + ' が止めた!', 256, 174, 13, '#7cff8a', 'center');
  }
  if (r.kind === 'blockout' && M.t > 8 && M.t % 8 < 5)
    shText('ブロックアウト!', NETX + dir * 60, 150, 15, '#ff8888', 'center');
  if (M.t > 16 && r.kind !== 'shut') shText(r.text, 256, 150, 15,
    r.kind === 'dig' ? '#7cffd0' : (r.winner === 0 ? '#7cff8a' : '#ff8888'), 'center');
}

    text('' + r.l, tx + 174, ry + 8, 11, '#e8c0c0');

  if (leaders.length === 0) {

  } else {
    const medals = ['#ffd040', '#cfd8e8', '#d8a060', '#9aa6d8', '#9aa6d8'];
    leaders.forEach((s, i) => {
      const ly = py0 + 24 + i * 24;
      shText('' + (i + 1), px0 + 12, ly + 2, 12, medals[i], 'center');
      // 名字 + チーム略称
      const last = s.name.length > 5 ? s.name.slice(0, 5) : s.name;
      text(last, px0 + 26, ly, 10, '#e8ecff');
      text(LEAGUE[s.team].short || '', px0 + 26 + 64, ly + 1, 8, '#8a96c8');
      // 値
      let val = '';
      if (keys[tab] === 'points') val = s.points + ' 点';
      else if (keys[tab] === 'aces') val = s.aces + ' 本';
      else val = s.blocks + ' 本';
      shText(val, px0 + pw - 12, ly + 1, 12, '#ffe080', 'right');
    });
  }
  text('←→で個人賞を切替', px0 + pw / 2, py0 + 136, 8, '#7a86b8', 'center');

  // ===== 直近の他チーム戦の結果 =====
  if (L.lastSim) {
    const s = L.lastSim;
    text('他会場: ' + (LEAGUE[s.home].short || LEAGUE[s.home].name) + ' ' + s.hs + ' - ' + s.as + ' '
      + (LEAGUE[s.away].short || LEAGUE[s.away].name), 256, 214, 10, '#9aa6d8', 'center');
  }

  // ===== 下部メッセージ =====
  px(28, 232, 456, 70, 'rgba(8,10,30,0.62)');
  ctx.strokeStyle = '#3a4a80'; ctx.lineWidth = 1; ctx.strokeRect(28.5, 232.5, 455, 69);
  if (L.done) {
    const champ = L.champion;
    for (let i = 0; i < 24; i++) {
      const x = (i * 53 + G.t * 2) % W, y = (i * 31 + G.t * 3) % 50 + 240;
      px(x, y, 3, 3, ['#ffd040', '#ff7090', '#7cff8a', '#7cd8ff'][i % 4]);
    }
    const seasonTag = (G.mode === 'story') ? ((G.story && G.story.season || 1) + 'シーズン目 ') : '';
    if (champ === G.myTeam) {
      shText('★ ' + seasonTag + 'リーグ優勝！ おめでとう！ ★', 256, 246, 15, '#ffd040', 'center');

    if (G.t % 60 < 38) {

      else text('Zボタンで タイトルへ', 256, 290, 10, '#7cff8a', 'center');
    }
  } else {
    const fx = leagueNextMyFixture();

    } else {
      shText('リーグ戦 スタート!', 256, 244, 15, '#ffd040', 'center');
    }
    if (fx) {
      const homeAway = (fx.home === G.myTeam) ? '(ホーム)' : '(アウェイ)';
      const opp = (fx.home === G.myTeam) ? fx.away : fx.home;
      text('次戦: ' + LEAGUE[opp].name + ' ' + homeAway, 256, 276, 11, '#cfd8ff', 'center');
    }
    if (G.t % 60 < 38) text('Zボタンで 次の試合へ', 256, 292, 10, '#7cff8a', 'center');
  }
}

function drawTourney() {
  const T = G.tourney;

  // ===== リッチなアリーナ背景(タイトル画面風) =====
  let bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a1850'); bg.addColorStop(0.5, '#11215e'); bg.addColorStop(1, '#070d28');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  // スタンド観客(点描・うっすら明滅)
  for (let row = 0; row < 5; row++) for (let i = 0; i < 64; i++) {
    const x = (i * 8 + (row % 2) * 4) % W, y = 70 + row * 8;
    const tw = (i * 7 + row * 13) % 7;
    px(x, y, 3, 3, tw === 0 ? '#33458a' : ['#1c2a60', '#26306e', '#221c50'][(i + row) % 3]);
  }
  // アリーナの照明
  for (const lx of [30, 120, 256, 392, 482]) {
    px(lx - 8, 8, 16, 6, 'rgba(255,250,220,0.85)');
    const lg = ctx.createRadialGradient(lx, 14, 2, lx, 14, 40);
    lg.addColorStop(0, 'rgba(255,250,220,0.18)'); lg.addColorStop(1, 'rgba(255,250,220,0)');
    ctx.fillStyle = lg; ctx.fillRect(lx - 40, 8, 80, 70);
  }
  // 下部のコート床(うっすら)
  let fg = ctx.createLinearGradient(0, 392, 0, H);
  fg.addColorStop(0, 'rgba(58,160,192,0.30)'); fg.addColorStop(1, 'rgba(42,136,168,0.18)');
  ctx.fillStyle = fg; ctx.fillRect(0, 392, W, H - 392);

  // ===== ヘッダーバナー =====
  px(56, 14, 400, 40, '#0a0a18');
  px(56, 14, 400, 4, '#ffd040'); px(56, 50, 400, 4, '#cc3030');
  ctx.strokeStyle = '#e8b030'; ctx.lineWidth = 2; ctx.strokeRect(57, 15, 398, 38);
  // 金色グラデ風(2度描き)でロゴ感
  shText('TOURNAMENT', 256, 22, 22, '#b06010', 'center');
  shText('TOURNAMENT', 256, 21, 22, '#ffd040', 'center');
  text('東日本編 4チーム トーナメント', 256, 60, 11, '#9ad0ff', 'center');

  const sf = T.bracket.sf, fin = T.bracket.final;
  const boxW = 132, boxH = 24;

  // 1枠の描画(光沢・カラー帯付き)
  function teamBox(x, y, li, winLi, highlight, big) {
    const isMy = (li === G.myTeam);
    const won = (winLi != null && li === winLi);
    const w = big ? boxW + 6 : boxW, h = big ? boxH + 4 : boxH;
    // 影
    px(x + 2, y + 2, w, h, 'rgba(0,0,0,0.4)');
    // 本体グラデ
    let g = ctx.createLinearGradient(x, y, x, y + h);
    if (won) { g.addColorStop(0, '#3a7a4c'); g.addColorStop(1, '#1f4a2c'); }
    else if (isMy) { g.addColorStop(0, '#34468a'); g.addColorStop(1, '#1e2a5e'); }
    else { g.addColorStop(0, '#262a52'); g.addColorStop(1, '#14172e'); }
    ctx.fillStyle = g; ctx.fillRect(x, y, w, h);
    // ハイライト(上面の光沢)
    px(x, y, w, 2, 'rgba(255,255,255,0.18)');
    // 枠
    if (highlight) { ctx.strokeStyle = '#ffd76a'; ctx.lineWidth = 2; ctx.strokeRect(x + 1, y + 1, w - 2, h - 2); }
    else { ctx.strokeStyle = won ? '#5ad07a' : '#3a3e70'; ctx.lineWidth = 1; ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1); }
    // チームカラー帯
    if (li != null) { px(x + 4, y + 5, 9, h - 10, LEAGUE[li].shirt); px(x + 4, y + 5, 9, 2, 'rgba(255,255,255,.4)'); }
    const nm = (li == null ? '？？？' : LEAGUE[li].short) + (isMy ? '(自)' : '');
    text(nm, x + 18, y + (h - 11) / 2, big ? 12 : 11, won ? '#9cffb0' : (isMy ? '#ffd76a' : '#cfd8ff'));
    if (won) shText('✓', x + w - 14, y + (h - 12) / 2, 12, '#9cffb0', 'center');
  }

  // ===== レイアウト(512幅に収める) =====
  const sfx = 22, sf1y = 110, sf2y = 188, midx = 196, finy = 150, champx = 366, champy = 218;
  // ラウンド見出し
  text('準決勝', sfx + 4, 92, 11, '#9ad0ff');
  text('決勝',  midx + 4, 124, 11, '#ffd76a');
  text('優勝',  champx + 4, 196, 11, '#ffd040');

  // SF
  teamBox(sfx, sf1y, sf[0].a, sf[0].win); teamBox(sfx, sf1y + 30, sf[0].b, sf[0].win);
  teamBox(sfx, sf2y, sf[1].a, sf[1].win); teamBox(sfx, sf2y + 30, sf[1].b, sf[1].win);

  // 接続線(SF → 決勝)
  ctx.strokeStyle = '#6a7aac'; ctx.lineWidth = 1.5;
  const join1 = sf1y + 30 + boxH / 2 - 15;   // SF1ペア中央付近
  ctx.beginPath();
  ctx.moveTo(sfx + boxW, sf1y + boxH + 3); ctx.lineTo(midx - 14, sf1y + boxH + 3);
  ctx.moveTo(sfx + boxW, sf2y + boxH + 3); ctx.lineTo(midx - 14, sf2y + boxH + 3);
  ctx.moveTo(midx - 14, sf1y + boxH + 3); ctx.lineTo(midx - 14, sf2y + boxH + 3);
  ctx.moveTo(midx - 14, finy + boxH + 2); ctx.lineTo(midx, finy + boxH + 2);
  ctx.stroke();

  // 決勝
  teamBox(midx, finy, fin.a, fin.win, T.round === 'final');
  teamBox(midx, finy + 30, fin.b, fin.win, T.round === 'final');

  // 決勝 → 優勝 接続線
  ctx.strokeStyle = '#ffd76a'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(midx + boxW, finy + boxH + 2); ctx.lineTo(champx - 8, finy + boxH + 2);
  ctx.lineTo(champx - 8, champy + boxH / 2); ctx.lineTo(champx, champy + boxH / 2);
  ctx.stroke();

  // 優勝枠(トロフィー風・少し大きめ・512内に収まる)
  // 王冠アイコン
  if (T.champion != null) {
    const cx = champx + 8;
    px(cx, champy - 16, 4, 8, '#ffd040'); px(cx + 8, champy - 18, 4, 10, '#ffd040'); px(cx + 16, champy - 16, 4, 8, '#ffd040');
    px(cx, champy - 8, 20, 4, '#ffd040');
  }
  teamBox(champx, champy, T.champion, T.champion, T.champion != null, true);

  // 他チーム結果(自チーム以外の準決勝スコア)
  let infoY = 300;
  for (let i = 0; i < 2; i++) {
    const m = sf[i];
    if (m.win != null && !(m.a === G.myTeam || m.b === G.myTeam) && m.score) {
      text('準決勝' + (i + 1) + ': ' + tnName(m.a) + ' ' + m.score[0] + '-' + m.score[1] + ' ' + tnName(m.b)
        + ' → ' + tnName(m.win) + ' 勝利', 22, infoY, 10, '#9aa6d8'); infoY += 16;
    }
  }

  // ===== 演出メッセージ(下部・帯付き) =====
  px(28, 340, 456, 90, 'rgba(8,10,30,0.62)');
  ctx.strokeStyle = '#3a4a80'; ctx.lineWidth = 1; ctx.strokeRect(28.5, 340.5, 455, 89);
  const stage = G.tnView ? G.tnView.stage : 'intro';
  if (T.round === 'done') {
    if (T.champion === G.myTeam) {
      // 紙吹雪っぽい点描
      for (let i = 0; i < 30; i++) {
        const x = (i * 53 + G.t * 2) % W, y = (i * 31 + G.t * 3) % 70 + 348;
        px(x, y, 3, 3, ['#ffd040', '#ff7090', '#7cff8a', '#7cd8ff'][i % 4]);
      }
      shText('★ 優勝！ おめでとう！ ★', 256, 356, 20, '#ffd040', 'center');
      text(LEAGUE[G.myTeam].name + ' が東日本編を制覇!', 256, 386, 12, '#ffe080', 'center');
    } else {
      shText(tnFull(T.champion) + ' が優勝', 256, 358, 16, '#cfd8ff', 'center');
      text('あなたの挑戦はここまで… また挑戦しよう', 256, 386, 12, '#9aa6d8', 'center');
    }
    if (G.t % 60 < 38) text('Zボタンで タイトルへ', 256, 410, 11, '#7cff8a', 'center');
  } else if (stage === 'result') {
    if (T.myAlive) {
      shText(T.round === 'final' ? '決勝進出！' : '勝利！ 次のラウンドへ', 256, 358, 18, '#7cff8a', 'center');
    } else {
      shText('敗退…', 256, 356, 20, '#ff8888', 'center');
      text('あなたの試合は終了。優勝の行方を見届けよう', 256, 386, 11, '#9aa6d8', 'center');
    }
    if (G.tnView && G.tnView.saved) text('スロット ' + ((G.saveSlot || 0) + 1) + ' にオートセーブしました', 256, 374, 10, '#ffd76a', 'center');
    if (G.t % 60 < 38) {
      const nextTxt = !T.myAlive ? 'Zボタンで 続行' : (T.round === 'final' ? 'Zボタンで 決勝へ' : 'Zボタンで 次の試合へ');
      text(nextTxt, 256, 410, 11, '#7cff8a', 'center');
    }
  } else {
    shText('準決勝 スタート!', 256, 356, 18, '#ffd040', 'center');
    text('あなた: ' + LEAGUE[G.myTeam].name + ' vs ' + tnFull(tnMyOpponent()), 256, 386, 11, '#cfd8ff', 'center');
    if (G.t % 60 < 38) text('Zボタンで 試合開始', 256, 410, 11, '#7cff8a', 'center');
  }
}

/* ---------------- メインループ ---------------- */
function frame() {
  update();
  ctx.clearRect(0, 0, W, H);
  if (G.scene === 'opening') drawOpening();
  else if (G.scene === 'title') { drawTitle(); ctx.globalAlpha = 1; }
  else if (G.scene === 'modeSelect') drawModeSelect();
  else if (G.scene === 'saveSlotSelect') drawSaveSlotSelect();
  else if (G.scene === 'continuePrompt') drawContinuePrompt();
  else if (G.scene === 'leagueSizeSelect') drawLeagueSizeSelect();
  else if (G.scene === 'storyName') drawStoryName();
  else if (G.scene === 'storyPos') drawStoryPos();
  else if (G.scene === 'storyTeam') drawStoryTeam();
  else if (G.scene === 'storyLevel') drawStoryLevel();
  else if (G.scene === 'storyProfile') drawStoryProfile();
  else if (G.scene === 'levelSelect') drawLevelSelect();
  else if (G.scene === 'teamSelect') drawTeamSelect();
  else if (G.scene === 'rivalSelect') drawRivalSelect();
  else if (G.scene === 'oppSelect') drawOppSelect();
  else if (G.scene === 'roster') drawRoster();
  else if (G.scene === 'tourney') drawTourney();
  else if (G.scene === 'league') drawLeague();
  else if (G.scene === 'end') drawEnd();
  else drawMatch();
  if (statView) {
    if (statView.matchSub) {
      drawMatchSubPanel();
    } else if (statView.roster) {
      const T = LEAGUE[statView.league];
      drawStatPanel(0, 0, 56, 120, 400,
        { player: T.roster[statView.rosterIdx], teamName: T.name, foot: '←→で選手切替 / B・V・Zで閉じる' });
    } else {
      drawStatPanel(statView.team, statView.idx, 36, 120, 440);
    }
  }
  requestAnimationFrame(frame);
}

/* 試合中の選手データ/交代パネル */
function drawMatchSubPanel() {
  const team = TEAMS[0];
  const slot = statView.idx;
  const cur = team.players[slot] || team.players.find(p => p) || team.libero;
  if (!cur) { statView = null; return; }   // 念のため
  // 暗転
  px(0, 0, W, H, 'rgba(6,8,24,.6)');
  // 上: 現在の選手データ
  drawStatPanel(0, slot, 28, 18, 456,
    { player: cur, teamName: team.name + '  (' + (slot + 1) + '/6番枠)',
      foot: statView.subMode ? '交代する控えを選択中' : '←→:枠選択  Z:交代  B/V:閉じる' });
  // 下: 交代パネル
  const py = 224;
  px(28, py, 456, 196, 'rgba(10,12,34,.97)');
  ctx.strokeStyle = statView.subMode ? '#ffd76a' : '#5868c0'; ctx.lineWidth = 2;
  ctx.strokeRect(29, py + 1, 454, 194);
  const st = team.subState[slot];
  // 枠の交代状態表示
  shText('選手交代', 44, py + 8, 14, '#ffd76a');
  if (st == null) {
    text('この枠はまだ交代していません', 44, py + 30, 11, '#9aa6d8');
  } else {
    text('交代済: ' + st.starter.name + ' → ' + st.current.name, 44, py + 30, 11, '#9ad0ff');
    text('※戻せるのは ' + st.starter.name + ' のみ', 44, py + 46, 10, '#ffae40');
  }
  const cands = subCandidates(team, slot);
  if (cands.length === 0) {
    text('交代できる控え選手がいません', 44, py + 78, 12, '#ff8888');
    text('Xボタンで戻る', 44, py + 170, 10, '#7cff8a');
    return;
  }
  if (!statView.subMode) {
    // 控え一覧をプレビュー表示
    text('控え選手 (' + cands.length + '人):', 44, py + 66, 11, '#9aa6d8');
    let cx = 44, cy = py + 86;
    for (let i = 0; i < cands.length; i++) {
      const c = cands[i];
      const label = '#' + c.num + ' ' + c.name + '[' + c.pos + ']';
      text('・' + label, cx, cy, 10, '#cfd8ff');
      cy += 16;
      if (cy > py + 168) { cy = py + 86; cx += 150; }
    }
    text('Zボタンで この枠の交代へ', 44, py + 176, 10, '#7cff8a');
  } else {
    // 交代相手を選択: 全能力を横棒グラフで交代元と比較
    const c = cands[statView.subCursor];
    text('だれと交代する？ (←→で選択, Zで決定)', 44, py + 30, 11, '#9ad0ff');
    // ヘッダ: 交代元 → 候補
    const posFull = p => ({ S: 'セッター', OH: 'アウトサイド', OP: 'オポジット', MB: 'ミドル', L: 'リベロ' }[p.pos] || p.pos);
    shText(cur.name, 150, py + 48, 12, '#ff9898', 'center');     // OUT(交代元)
    shText('▼ 交代 ▲', 256, py + 48, 11, '#ffe060', 'center');
    shText(c.name, 366, py + 48, 12, '#7cff8a', 'center');       // IN(候補)
    text('#' + cur.num + ' [' + posFull(cur) + ']', 150, py + 64, 9, '#c8b0b0', 'center');
    text('#' + c.num + ' [' + posFull(c) + ']', 366, py + 64, 9, '#b0c8b0', 'center');

    // 比較する能力(現在値ベース)
    const rows = [
      ['パワー',   curPw(cur), curPw(c),  100],
      ['ジャンプ', curJp(cur), curJp(c),  110],
      ['瞬発力',   cur.qk,     c.qk,      100],
      ['精神力',   cur.mt,     c.mt,      100],
      ['体力',     cur.st,     c.st,      100],
      ['身長',     cur.h,      c.h,       210],
    ];
    const baseY = py + 80, rowH = 15, barW = 92;
    for (let i = 0; i < rows.length; i++) {
      const [nm, v1, v2, mx] = rows[i];
      const ry = baseY + i * rowH;
      // 中央にラベル
      text(nm, 256, ry, 9, '#9aa6d8', 'center');
      // 左: 交代元(右詰めバー, 中央から左へ伸びる)
      const w1 = Math.round(barW * Math.min(1, v1 / mx));
      px(232 - barW, ry + 1, barW, 8, '#1c2444');
      px(232 - w1, ry + 1, w1, 8, '#e07060');
      // 右: 候補(中央から右へ伸びる)
      const w2 = Math.round(barW * Math.min(1, v2 / mx));
      px(280, ry + 1, barW, 8, '#1c2444');
      px(280, ry + 1, w2, 8, '#5ad07a');
      // 勝っている側に小さな印
      if (v2 > v1) shText('▲', 280 + w2 + 4, ry - 1, 9, '#7cff8a');
      else if (v1 > v2) shText('▲', 232 - w1 - 10, ry - 1, 9, '#ff9090');
    }
    if (cands.length > 1) text('◀ ' + (statView.subCursor + 1) + ' / ' + cands.length + ' ▶', 256, py + 172, 10, '#9aa6d8', 'center');
    text('Zで決定 / Xでキャンセル', 44, py + 184 - 6, 9, '#7cff8a');
  }
}
frame();
})();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">

<title>V LEAGUE EXCITE ARENA 25-26 東日本編</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#0e0c1e;min-height:100%;overflow-x:hidden;
       touch-action:manipulation;}
  body{display:flex;flex-direction:column;align-items:center;

       user-select:none;-webkit-user-select:none;}
  #wrap{position:relative;line-height:0;margin-top:6px;}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;
         width:min(98vw,768px);height:auto;max-height:62vh;border:3px solid #3a3a6a;border-radius:4px;
         background:#000;box-shadow:0 0 30px #0008;display:block;}
  #scan{position:absolute;inset:3px;pointer-events:none;border-radius:2px;
        background:repeating-linear-gradient(0deg,rgba(0,0,0,.13) 0 1px,transparent 1px 3px);}

  /* ---- 仮想ゲームパッド ---- */
  #pad{width:min(98vw,768px);margin:8px auto 14px;display:grid;
       grid-template-columns:132px 1fr 142px;gap:6px;align-items:center;}
  .dpad{position:relative;width:140px;height:140px;}
  .dbtn{position:absolute;width:46px;height:46px;background:#2a2c52;border:2px solid #4a4e86;
        border-radius:8px;color:#cfd2ff;font-size:20px;display:flex;align-items:center;
        justify-content:center;font-weight:bold;}
  .dbtn:active,.dbtn.on{background:#4858c0;border-color:#7c8cf0;}
  #dU{left:47px;top:0;} #dD{left:47px;top:94px;} #dL{left:0;top:47px;} #dR{left:94px;top:47px;}
  #dpadc{left:47px;top:47px;width:46px;height:46px;}

  #midcol{display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;}
  #numrow{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:300px;}
  .nbtn{width:54px;height:50px;background:#262848;border:2px solid #44487e;border-radius:9px;
        color:#cfd2ff;font-size:17px;font-weight:bold;display:flex;flex-direction:column;
        align-items:center;justify-content:center;line-height:1.05;}
  .nbtn:active,.nbtn.on{background:#3a4490;border-color:#7c8cf0;}

  .acol{display:flex;flex-direction:column;gap:10px;align-items:center;}

  @media (max-width:560px){ #help{display:none;} canvas{max-height:54vh;} }

<body>
<div id="wrap">
  <canvas id="g" width="512" height="448"></canvas>
  <div id="scan"></div>
</div>

<div id="pad">
  <div class="dpad">
    <div class="dbtn" id="dU" data-k="ArrowUp">▲</div>
    <div class="dbtn" id="dD" data-k="ArrowDown">▼</div>
    <div class="dbtn" id="dL" data-k="ArrowLeft">◀</div>
    <div class="dbtn" id="dR" data-k="ArrowRight">▶</div>
  </div>
  <div id="midcol">
    <div id="numrow">
      <div class="nbtn" data-k="1">1<small>オープン</small></div>
      <div class="nbtn" data-k="2">2<small>Aクイック</small></div>
      <div class="nbtn" data-k="3">3<small>Bクイック</small></div>
      <div class="nbtn" data-k="4">4<small>Cクイック</small></div>
      <div class="nbtn" data-k="5">5<small>バックA</small></div>
      <div class="nbtn" data-k="6">6<small>ブロード</small></div>
    </div>
  </div>
  <div class="acol">
    <div class="abtn" id="bA" data-k="z">Z<small>決定/トス</small></div>
    <div class="abtn" id="bB" data-k="x">X<small>キャンセル</small></div>
    <div class="abtn" id="bV" data-k="v">V<small>選手データ/交代</small></div>
  </div>
</div>

<div id="help">
  <b>キーボード:</b> Z=決定/トス　X=キャンセル/ブロック　矢印=移動/コース　トス=矢印でコース→ゲージでZ　1〜6=作戦　V=選手データ/交代
</div>
<script>
(() => {
'use strict';
/* =====================================================================
   燃えろVリーグ25-26（東地区編） —  16bit風 バレーボールゲーム
   ===================================================================== */
const cv = document.getElementById('g');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W = 512, H = 448;
const NETX = 256, NETTOP = 184, NETBTM = 352;
const LANEY = [210, 264, 318];          // 0:レフト(奥) 1:センター 2:ライト(手前) ※コート全体を使用
const LANENAME = ['レフト', 'センター', 'ライト'];

const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const rnd = Math.random;
const ri = (a, b) => a + Math.floor(rnd() * (b - a + 1));
const lerp = (a, b, t) => a + (b - a) * t;
const pick = a => a[Math.floor(rnd() * a.length)];
const easeOut = t => 1 - (1 - t) * (1 - t);
const easeInOut = t => t < .5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

/* ===== 擬似3D投影(奥行きパース) =====
   論理座標(コート x∈[28,484], y∈[188,354], ネット中央 x=256)を、
   手前が広く奥が狭い台形のパース画面へ変換する。ゲームロジックは論理座標のまま。
   - 論理yが小さい(奥)ほど画面上方・小さく、大きい(手前)ほど下方・大きく。
   - 画面中央(x=256)へ向かって奥ほど横幅を縮める(台形)。                 */
const COURT_BACK = 188, COURT_FRONT = 354;   // 論理yのコート範囲
let NO_PERSPECTIVE = false;                   // true時はdudeがパースを取らず等倍描画(チーム選択画面用)
const PV = {
  cx: 256,           // 消失点方向の画面x
  backY: 182,        // 奥端の画面y(奥行きを浅く)
  frontY: 360,       // 手前端の画面y(この下に余白を確保)
  backScale: 0.74,   // 奥端のキャラ倍率
  frontScale: 1.18,  // 手前端のキャラ倍率
  squashX: 0.80,     // 奥端での横圧縮率(1=圧縮なし。台形を緩やかに)
};
function depthOf(ly) { return (ly - COURT_BACK) / (COURT_FRONT - COURT_BACK); }
function project(lx, ly) {
  const d = depthOf(ly);
  const scale = lerp(PV.backScale, PV.frontScale, d);
  const sy = lerp(PV.backY, PV.frontY, d);
  const sq = lerp(PV.squashX, 1, d);
  const sx = PV.cx + (lx - 256) * sq;
  return { x: sx, y: sy, scale };
}

/* ---------------- サウンド (WebAudio) ---------------- */
let AC = null;
let audioUnlocked = false;
function ensureAudio() {
  if (!AC) {
    try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (!AC) { audioUnlocked = true; return; }   // 音声非対応環境でも操作は通す
  if (AC.state === 'suspended') {
    // resume() は非同期。完了後に現在のシーンのBGMを起動する。
    const p = AC.resume();
    if (p && p.then) {
      p.then(() => { audioUnlocked = true; kickBGM(); }).catch(() => { audioUnlocked = true; });
    } else {
      audioUnlocked = true; kickBGM();
    }
  } else {
    audioUnlocked = true; kickBGM();
  }
}
// 現在のシーンに応じたループBGMを(まだ鳴っていなければ)起動する
function kickBGM() {
  if (!AC) return;
  if (typeof updateBGM === 'function') updateBGM();
}
function beep(f, dur, type, vol, delay) {
  if (!AC) return;
  type = type || 'square'; vol = (vol === undefined) ? 0.11 : vol; delay = delay || 0;
  const t0 = AC.currentTime + delay;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = f;
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0005, t0 + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t0); o.stop(t0 + dur + 0.03);
}
const sWhistle = () => { beep(2300, .12, 'square', .14); beep(2300, .3, 'square', .14, .17); };
const sHit    = () => beep(240, .05, 'square', .16);
const sSpike  = () => { beep(170, .05, 'square', .2); beep(105, .09, 'square', .14, .03); };
const sGood   = () => { beep(880, .07); beep(1320, .1, 'square', .1, .08); };
const sBest   = () => { beep(880, .06); beep(1175, .06, 'square', .1, .07); beep(1568, .14, 'square', .1, .14); };
const sBad    = () => beep(150, .2, 'sawtooth', .1);
const sScore  = () => { beep(660, .09); beep(880, .09, 'square', .1, .1); beep(1100, .18, 'square', .1, .2); };
const sCursor = () => beep(990, .04, 'square', .07);
const sBlock  = () => { beep(90, .12, 'sawtooth', .2); };
// 歓声: 上昇する和音の連打で盛り上がりを表現
const sCheer  = () => {
  beep(523, .12, 'square', .09); beep(659, .12, 'square', .09, .04); beep(784, .12, 'square', .09, .08);
  beep(1047, .22, 'square', .11, .12);
  beep(330, .5, 'sawtooth', .05, .0);    // ざわめき(低めのノイズ風)
};
// エース登場! : 多めの歓声 + 盛り上がる短いファンファーレ(観客は歓声と同じ)
const sAceFanfare = () => {
  // 盛り上がる短いファンファーレ(上昇する和音)
  beep(523, .14, 'square', .11, 0);    beep(659, .14, 'square', .11, 0);
  beep(784, .16, 'square', .12, .12);  beep(988, .16, 'square', .12, .12);
  beep(1047, .26, 'square', .13, .24); beep(1319, .26, 'square', .12, .24);
  // 多めの歓声(重ねて厚く)
  sCheer();
  beep(392, .6, 'sawtooth', .06, .05); beep(294, .7, 'sawtooth', .05, .1);
  beep(880, .16, 'square', .08, .36); beep(1175, .3, 'square', .1, .42);
};
// スーパーレシーブ! : 盛り上がる上昇SE + 歓声
const sSuperReceive = () => {
  // きらめく上昇音(レシーブの好守を表現)
  beep(660, .08, 'square', .10, 0); beep(880, .08, 'square', .10, .06);
  beep(1100, .10, 'square', .11, .12); beep(1320, .18, 'square', .12, .18);
  // 歓声
  sCheer();
  beep(523, .4, 'sawtooth', .05, .08);
};

/* ---------------- BGM エンジン (WebAudio シーケンサー) ----------------
   タイトル/チーム選択でループ、試合前/勝利/敗北は単発ジングル。
   著作権に配慮し、特定楽曲のメロディは使わず、雰囲気を模したオリジナル進行。 */
let BGM = { timer: null, name: null, step: 0, noiseBuf: null };

function noiseBuffer() {
  if (!AC) return null;
  if (BGM.noiseBuf) return BGM.noiseBuf;
  const len = Math.floor(AC.sampleRate * 0.3);
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  BGM.noiseBuf = buf;
  return buf;
}
// 単発の音符。chan: 'lead'/'bass'/'pad'。波形と減衰を音色ごとに調整。
function note(freq, dur, vol, when, chan) {
  if (!AC || !freq) return;
  const t0 = AC.currentTime + when;
  const o = AC.createOscillator(), g = AC.createGain();
  let type = 'square';
  if (chan === 'bass') type = 'triangle';
  else if (chan === 'pad') type = 'sawtooth';
  else if (chan === 'lead') type = 'square';
  o.type = type; o.frequency.value = freq;
  // ギター風: 速いアタック+短い余韻。ベース: やや丸く。
  const peak = vol;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(peak, t0 + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0006, t0 + dur);
  // リード/パッドに軽いビブラート風うねりは付けず、シンプルに。
  if (chan === 'lead') {
    // 軽い歪み感: 1オクターブ上の倍音を小さく重ねる
    const o2 = AC.createOscillator(), g2 = AC.createGain();
    o2.type = 'square'; o2.frequency.value = freq * 2;
    g2.gain.setValueAtTime(0.0001, t0);
    g2.gain.exponentialRampToValueAtTime(peak * 0.25, t0 + 0.01);
    g2.gain.exponentialRampToValueAtTime(0.0005, t0 + dur * 0.8);
    o2.connect(g2); g2.connect(AC.destination);
    o2.start(t0); o2.stop(t0 + dur + 0.03);
  }
  o.connect(g); g.connect(AC.destination);
  o.start(t0); o.stop(t0 + dur + 0.03);
}
// ドラム: kick/snare/hat をノイズ＆トーンで表現
function drum(kind, vol, when) {
  if (!AC) return;
  const t0 = AC.currentTime + when;
  if (kind === 'kick') {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(150, t0);
    o.frequency.exponentialRampToValueAtTime(45, t0 + 0.12);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0005, t0 + 0.18);
    o.connect(g); g.connect(AC.destination);
    o.start(t0); o.stop(t0 + 0.2);
  } else { // snare / hat はノイズ
    const buf = noiseBuffer(); if (!buf) return;
    const s = AC.createBufferSource(); s.buffer = buf;
    const g = AC.createGain(), f = AC.createBiquadFilter();
    f.type = 'highpass'; f.frequency.value = (kind === 'hat') ? 7000 : 1500;
    const dur = (kind === 'hat') ? 0.04 : 0.12;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0005, t0 + dur);
    s.connect(f); f.connect(g); g.connect(AC.destination);
    s.start(t0); s.stop(t0 + dur + 0.02);
  }
}

// 音名→周波数
const NF = {};
(function buildNoteTable() {
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  for (let oct = 1; oct <= 6; oct++) {
    for (let i = 0; i < 12; i++) {
      const f = 440 * Math.pow(2, (oct * 12 + i - 57) / 12); // A4=440 (A4 index=57)
      NF[names[i] + oct] = f;
    }
  }
})();
const nf = n => NF[n] || 0;

/* ===== タイトルBGM =====
   下田ヒトシ氏「BLACK or WHITE」の雰囲気 — マイナーキー(Am)の疾走ロック。
   コード進行(模倣・オリジナル): Am - F - C - G / Am - F - Dm - E7 を基調に、
   ギター風リード(8分アルペジオ)+ベース+ドラム。著作権配慮で原曲そのままの音列は使わない。 */
const TITLE_BPM = 150;
// 各小節: ベースのルート音(8分8個ぶん)、コードトーン(アルペジオ用)
const titleProg = [
  { bass: 'A2', chord: ['A3','C4','E4','A4'] },   // Am
  { bass: 'F2', chord: ['F3','A3','C4','F4'] },   // F
  { bass: 'C3', chord: ['C3','E3','G3','C4'] },   // C
  { bass: 'G2', chord: ['G3','B3','D4','G4'] },   // G
  { bass: 'A2', chord: ['A3','C4','E4','A4'] },   // Am
  { bass: 'F2', chord: ['F3','A3','C4','F4'] },   // F
  { bass: 'D3', chord: ['D3','F3','A3','D4'] },   // Dm
  { bass: 'E3', chord: ['E3','G#3','B3','E4'] },  // E7(導音G#)
];
// リードメロディ(雰囲気):各小節8音。Amペンタ+主音を中心にした疾走フレーズ(オリジナル)
const titleLead = [
  ['E4','A4','C5','B4','A4','E4','C5','B4'],
  ['F4','A4','C5','A4','F4','C5','A4','F4'],
  ['E4','G4','C5','G4','E4','C5','G4','E4'],
  ['D4','G4','B4','D5','B4','G4','D4','B3'],
  ['E4','A4','C5','E5','C5','A4','E4','C5'],
  ['F4','C5','A4','F4','A4','C5','F5','C5'],
  ['F4','A4','D5','A4','F4','D5','A4','F4'],
  ['E4','G#4','B4','E5','B4','G#4','E4','B3'],
];

function titleBGMStep() {
  if (!AC || BGM.name !== 'title') return;
  const spb = 60 / TITLE_BPM;           // 1拍
  const eighth = spb / 2;               // 8分音符
  const barIdx = BGM.step % titleProg.length;
  const bar = titleProg[barIdx];
  const lead = titleLead[barIdx];
  // 1小節 = 8分音符8個
  for (let i = 0; i < 8; i++) {
    const w = i * eighth;
    // ベース(各8分、ルート中心。3,7拍目で5度上)
    const bfreq = nf(bar.bass);
    note(bfreq, eighth * 0.9, 0.10, w, 'bass');
    // リード(ギター風)
    note(nf(lead[i]), eighth * 0.95, 0.075, w, 'lead');
    // パッド(コードトーンを薄く、各拍頭)
    if (i % 2 === 0) note(nf(bar.chord[(i / 2) % bar.chord.length]), eighth * 1.6, 0.03, w, 'pad');
    // ドラム: 4つ打ち気味 + スネア(2,4拍) + ハイハット(8分)
    if (i % 2 === 0) drum('kick', 0.22, w);
    if (i === 2 || i === 6) drum('snare', 0.14, w);
    drum('hat', 0.05, w);
  }
  BGM.step++;
  const barDur = eighth * 8;
  BGM.timer = setTimeout(titleBGMStep, barDur * 1000);
}

/* ===== チーム選択BGM ===== ドラムパターン中心のシンプルなグルーヴ。
   コード感は薄く、ベースの反復とドラムで構成。 */
const SEL_BPM = 124;
const selBassPat = ['D2','D2','F2','G2'];  // 4小節ぶんのルート
function selBGMStep() {
  if (!AC || BGM.name !== 'select') return;
  const spb = 60 / SEL_BPM;
  const sixteenth = spb / 4;             // 16分
  const barIdx = BGM.step % selBassPat.length;
  const root = nf(selBassPat[barIdx]);
  // 1小節 = 16分音符16個。ドラム中心。
  for (let i = 0; i < 16; i++) {
    const w = i * sixteenth;
    // キック: 1拍目と3拍目+裏で軽く
    if (i === 0 || i === 6 || i === 8 || i === 14) drum('kick', 0.22, w);
    // スネア: 2拍4拍(=i4,12)
    if (i === 4 || i === 12) drum('snare', 0.15, w);
    // ハイハット: 全16分(裏は弱く)
    drum('hat', i % 2 === 0 ? 0.05 : 0.03, w);
    // ベース: 8分でルート、たまにオクターブ
    if (i % 2 === 0) {
      const f = (i === 10) ? root * 2 : root;
      note(f, sixteenth * 1.8, 0.11, w, 'bass');
    }
    // 軽いシンセ刺し(1拍目のみ薄く5度)
    if (i === 0) note(root * 1.5, sixteenth * 6, 0.035, w, 'pad');
  }
  BGM.step++;
  const barDur = sixteenth * 16;
  BGM.timer = setTimeout(selBGMStep, barDur * 1000);
}

function startBGM(name) {
  if (!AC) return;
  if (BGM.name === name) return;     // 既に同じ曲なら何もしない
  stopBGM();
  BGM.name = name; BGM.step = 0;
  if (name === 'title') titleBGMStep();
  else if (name === 'select') selBGMStep();
}
function stopBGM() {
  if (BGM.timer) { clearTimeout(BGM.timer); BGM.timer = null; }
  BGM.name = null; BGM.step = 0;
}
// シーンに応じて適切なループBGMを鳴らす(試合中・リザルトはループ無し)
function updateBGM() {
  if (!AC) return;
  const running = (AC.state === 'running');
  const sc = G.scene;

function jingleMatchStart() {
  if (!AC) return;
  const seq = [['C4',0],['E4',.10],['G4',.20],['C5',.30]];
  for (const [n, w] of seq) note(nf(n), .14, 0.12, w, 'lead');

}
// 勝利/優勝: 長めの称賛ファンファーレ + 重ねた歓声
function jingleWin() {
  if (!AC) return;
  // 上昇ファンファーレ(オクターブ駆け上がり)
  const mel = [['C4',0],['E4',.12],['G4',.24],['C5',.36],['E5',.48],['G5',.60],['C6',.74]];
  for (const [n, w] of mel) note(nf(n), .22, 0.12, w, 'lead');

  [['G5',.92],['A5',1.00],['B5',1.08]].forEach(([n, w]) => note(nf(n), .16, 0.10, w, 'lead'));

  ['C5','E5','G5','C6'].forEach(n => note(nf(n), 1.0, 0.085, 1.22, 'lead'));
  note(nf('C3'), 1.1, 0.13, 1.22, 'bass');

  drum('kick', 0.26, 0); drum('kick', 0.24, .24); drum('snare', 0.18, .48);
  drum('kick', 0.24, .74); drum('snare', 0.20, 1.00);
  drum('kick', 0.30, 1.22); drum('snare', 0.24, 1.22);
  // 歓声を時間差で重ねて長く響かせる
  sCheer();
  setTimeout(() => { ensureAudio(); sCheer(); }, 300);
  setTimeout(() => { ensureAudio(); sCheer(); }, 720);
  setTimeout(() => { ensureAudio(); sCheer(); }, 1200);
}
// 敗北: 短めの下降ジングル(マイナー)
function jingleLose() {

}

/* ---- 仮想ゲームパッド(タッチ) ----
   各ボタンの data-k を keydown/keyup と同等に扱う。
   押下中は keys[k]=1 を保持(移動・Z+矢印の同時押しに必要)。            */
(function setupPad() {
  const press = (el, k) => {
    if (el.classList.contains('on')) return;
    el.classList.add('on'); ensureAudio();
    queue.push(k); keys[k] = 1;
  };
  const release = (el, k) => { el.classList.remove('on'); keys[k] = 0; };
  document.querySelectorAll('#pad [data-k]').forEach(el => {
    const k = el.getAttribute('data-k');
    const start = e => { e.preventDefault(); press(el, k); };
    const end   = e => { e.preventDefault(); release(el, k); };
    el.addEventListener('touchstart', start, { passive: false });
    el.addEventListener('touchend', end);
    el.addEventListener('touchcancel', end);
    // マウスでも一応動く(デバッグ用)
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', end);
    el.addEventListener('mouseleave', () => { if (el.classList.contains('on')) release(el, k); });
  });
  // 指がボタン外で離れた時の保険
  addEventListener('touchend', () => {
    document.querySelectorAll('#pad .on').forEach(el => release(el, el.getAttribute('data-k')));
  });
})();

/* ===== ストーリーモード: 自分育成 =====
   各ポジションの平均能力値(リーグ全選手から算出)。初期値はこの約60%でスタート。 */
const POS_AVG = {
  S:  { pw: 40, jp: 52, qk: 68, mt: 79, st: 63 },
  OH: { pw: 69, jp: 71, qk: 68, mt: 64, st: 64 },
  OP: { pw: 73, jp: 71, qk: 63, mt: 58, st: 80 },
  MB: { pw: 71, jp: 69, qk: 57, mt: 68, st: 64 },
  L:  { pw: 40, jp: 52, qk: 83, mt: 66, st: 90 },
};
// ポジション別の能力成長しやすさ(重み)。大きいほどレベルが上がりやすい(=必要XPが小さい)。
const POS_GROW = {
  S:  { pw: 0.4, jp: 0.5, qk: 0.9, mt: 1.4, st: 0.8 },   // セッター: 精神力・瞬発力
  OH: { pw: 1.2, jp: 1.2, qk: 1.0, mt: 0.9, st: 0.9 },   // 万能
  OP: { pw: 1.4, jp: 1.1, qk: 0.8, mt: 0.8, st: 1.1 },   // パワー
  MB: { pw: 1.2, jp: 1.2, qk: 0.7, mt: 1.0, st: 0.8 },   // ブロック寄り
  L:  { pw: 0.3, jp: 0.5, qk: 1.3, mt: 1.0, st: 1.4 },   // リベロ: 体力・瞬発力
};
const STAT_KEYS = ['pw', 'jp', 'qk', 'mt', 'st'];
const STAT_LABEL = { pw: 'パワー', jp: 'ジャンプ力', qk: '瞬発力', mt: '精神力', st: '体力' };
// 各能力1ポイント上げる基準XP。リーグ1周(14試合)の全体XPで平均よりやや下まで上がる量。
const XP_PER_POINT = 7.2;

function statXpNeed(pos, key, curVal) {
  const grow = (POS_GROW[pos] && POS_GROW[pos][key]) || 1;
  const avg = (POS_AVG[pos] && POS_AVG[pos][key]) || 60;
  const ratio = clamp(curVal / Math.max(avg, 1), 0, 1.4);
  const diff = 1 + ratio * 0.9;                 // 高いほど伸びにくい
  return Math.max(3, Math.round(XP_PER_POINT * diff / grow));
}

/* ストーリー選手を生成。初期値は平均の約60%(かなり低い)。 */
function makeStoryPlayer(name, pos, num) {
  const avg = POS_AVG[pos] || POS_AVG.OH;
  const lowMul = 0.6;
  const base = {};
  for (const k of STAT_KEYS) base[k] = Math.round(avg[k] * lowMul);
  const hByPos = { S: 180, OH: 183, OP: 186, MB: 190, L: 174 };
  return {
    name, pos, h: hByPos[pos] || 183,
    pw0: base.pw, jp0: base.jp, qk: base.qk, mt: base.mt, st0: base.st, st: base.st,
    jpMod: 0, hair: 2, hcol: '#2e2012', num: num || 1, cap: 0,
    sc: clamp(0.92 + ((hByPos[pos] || 183) - 175) * 0.0052, 0.88, 1.18),
    isStory: true,
    xp: { pw: 0, jp: 0, qk: 0, mt: 0, st: 0 },
    totalXp: 0, level: 1,
  };
}

function statVal(p, key) {
  return key === 'pw' ? p.pw0 : key === 'jp' ? p.jp0 : key === 'st' ? p.st0 : p[key];
}
function setStatVal(p, key, v) {
  if (key === 'pw') p.pw0 = v; else if (key === 'jp') p.jp0 = v;
  else if (key === 'st') { p.st0 = v; p.st = v; } else p[key] = v;
}

/* 全体成長XP(出場)またはプレー別能力XPを加算し、レベルアップ処理。 */
function addStoryXp(p, key, amount, levelUps) {
  if (!p || !p.isStory || amount <= 0) return;
  p.totalXp += amount;
  if (key === 'overall') {
    const grow = POS_GROW[p.pos] || {};
    let tot = 0; for (const k of STAT_KEYS) tot += (grow[k] || 1);
    for (const k of STAT_KEYS) gainStat(p, k, amount * ((grow[k] || 1) / tot), levelUps);
  } else {
    gainStat(p, key, amount, levelUps);
  }
}
function gainStat(p, key, xp, levelUps) {
  p.xp[key] += xp;
  let guard = 0;
  while (guard++ < 50) {
    const cur = statVal(p, key);
    const cap = Math.round((POS_AVG[p.pos][key] || 60) * 1.25);  // 上限=平均の1.25倍
    if (cur >= cap) { if (p.xp[key] > 0) p.xp[key] = 0; break; }
    const need = statXpNeed(p.pos, key, cur);
    if (p.xp[key] >= need) { p.xp[key] -= need; setStatVal(p, key, cur + 1); if (levelUps) levelUps.push(key); }
    else break;
  }
  const sum = STAT_KEYS.reduce((a, k) => a + statVal(p, k), 0);
  p.level = Math.max(1, Math.floor((sum - 130) / 12) + 1);
}

/* プレー参加ボーナスXP(プレー種別→能力)。少し=4 / 極少=0.8 / セッター精神=2。 */
function storyPlayBonus(p, action, levelUps) {
  if (!p || !p.isStory) return;
  const A = 4, S = 2, X = 0.8;
  const map = {
    open:   [['pw', A], ['jp', X]],
    quick:  [['qk', A], ['mt', X]],
    back:   [['jp', A], ['pw', X]],
    broad:  [['mt', A], ['pw', X]],
    toss:   [['mt', S]],
    receive:[['qk', X], ['mt', X]],
  };
  const gains = map[action];
  if (!gains) return;
  for (const [k, amt] of gains) gainStat(p, k, amt, levelUps);
  p.totalXp += gains.reduce((a, g) => a + g[1], 0);
}
function buildTeam(leagueTeam, chosen6, libero, benchPlayers) {
  const mk = p => Object.assign({}, p, { st: p.st0, jpMod: 0, fatPw: 0, fatJp: 0 });
  const players = chosen6.map(mk);
  return {
    name: leagueTeam.name, short: leagueTeam.short,
    col: leagueTeam.col, col2: leagueTeam.col2, skin: leagueTeam.skin,
    shirt: leagueTeam.shirt, pants: leagueTeam.pants, sl: leagueTeam.sl,
    players,
    libero: libero ? mk(libero) : null,
    bench: (benchPlayers || []).map(mk),   // 控え選手
    // 各コート枠の交代状態: null=未交代 / {starter, current} スターターと交代で入っている選手
    subState: players.map(() => null),
  };
}
// 自動編成: コート6人(S1,MB2,OH2,OP1優先)+リベロ1人 を返す {six, libero}
function autoPickFull(leagueTeam) {
  const byPos = {};
  for (const p of leagueTeam.roster) (byPos[p.pos] = byPos[p.pos] || []).push(p);
  const score = p => p.h * 0.5 + p.pw0 * 0.5 + p.jp0 * 0.5 + p.qk * 0.3 + p.mt * 0.3 + p.st0 * 0.2;
  const libScore = p => p.qk * 0.6 + p.mt * 0.4 + (212 - p.h) * 0.3 + p.st0 * 0.2;
  for (const k in byPos) byPos[k].sort((a, b) => score(b) - score(a));
  const libero = (byPos['L'] || []).slice().sort((a, b) => libScore(b) - libScore(a))[0] || null;
  const used = new Set(); if (libero) used.add(libero);
  const need = ['S', 'MB', 'MB', 'OH', 'OH', 'OP'];
  const chosen = [];
  for (const pos of need) {
    const list = (byPos[pos] || []).filter(p => !used.has(p));
    if (list.length) { chosen.push(list[0]); used.add(list[0]); }
  }
  if (chosen.length < 6) {  // 不足は L 以外から補充
    const rest = leagueTeam.roster.filter(p => !used.has(p) && p.pos !== 'L').sort((a, b) => score(b) - score(a));
    for (const p of rest) { if (chosen.length >= 6) break; chosen.push(p); used.add(p); }
  }
  return { six: orderForCourt(chosen), libero };
}
// 旧API互換(相手チームの簡易編成)
function autoPick(leagueTeam) { return autoPickFull(leagueTeam).six; }

// コート配置順: [0]=S [1,2]=OH [3]=OP [4,5]=MB (L は含めない)
function orderForCourt(six) {
  six = six.filter(p => p.pos !== 'L');
  const find = (pos, n) => six.filter(p => p.pos === pos).slice(0, n);
  const S = find('S', 1), OH = find('OH', 2), OP = find('OP', 1), MB = find('MB', 2);
  let arr = [...S, ...OH, ...OP, ...MB];
  const leftover = six.filter(p => !arr.includes(p));
  while (arr.length < 6 && leftover.length) arr.push(leftover.shift());
  arr = arr.slice(0, 6);
  if (!arr.some(p => p.pos === 'S') && arr.length) {     // S不在→精神力最高をトス役に
    let best = arr[0];
    for (const p of arr) if (p.mt > best.mt) best = p;
    arr = [best, ...arr.filter(p => p !== best)];
  }
  return arr;
}
function resetTeams() {
  for (const t of TEAMS) if (t) {
    for (const p of t.players) { p.st = p.st0; p.jpMod = 0; p.fatPw = 0; p.fatJp = 0; }
    if (t.libero) { t.libero.st = t.libero.st0; t.libero.jpMod = 0; t.libero.fatPw = 0; t.libero.fatJp = 0; }
  }
}

/* 体力疲労によるマイナス補正。
   体力が低いほど「発生確率」も「マイナス幅」も大きい。
   精神力が高いと発生確率だけ少し下がる(幅は不変)。
   プレー解決のたびに rollFatigue() で抽選し、p.fatPw / p.fatJp にキャッシュ。 */
function rollFatigue(p) {
  const lack = (100 - p.st) / 100;              // 0(満タン)〜1(空)
  let prob = lack * 0.9 - (p.mt - 60) * 0.004;  // 発生確率(精神力で低下)
  prob = clamp(prob, 0, 0.92);
  const maxCut = lack * 0.45;                    // マイナス幅の最大(能力の最大45%)
  p.fatPw = (rnd() < prob) ? rnd() * maxCut : 0;
  p.fatJp = (rnd() < prob) ? rnd() * maxCut : 0;
}
/* 現在値(体力疲労でランダムにマイナス補正) */
const curPw = p => Math.round(clamp(p.pw0 * (1 - (p.fatPw || 0)), 18, 120));
const curJp = p => Math.round(clamp(p.jp0 * (1 - (p.fatJp || 0)) + (p.jpMod || 0), 18, 120));
/* プレー値 */
const rcvPow = p => Math.round((212 - p.h) * 1.5 + p.qk * 0.55 + p.mt * 0.2 +
                    (p.pos === 'OP' ? -14 : p.pos === 'MB' ? -10 : 4) * 1);
const atkPow = p => Math.round((p.h - 150) * 0.9 + curJp(p) * 0.45 + curPw(p) * 0.5);
const blkPow = p => Math.round((p.h - 150) * 1.0 + curJp(p) * 0.40 + curPw(p) * 0.35);
const srvPow = p => Math.round(curJp(p) * 0.5 + curPw(p) * 0.6);
/* チームのエース選手(パワー+ジャンプ合計が高い順。同点なら全能力合計が高い順)。
   topN を指定するとその順位までの選手名の配列を返す。既定はトップ1人(従来互換)。 */
function acePlayerOf(team, topN) {
  if (!team) return topN ? [] : null;
  const all = team.players.slice();
  if (team.libero) all.push(team.libero);
  if (team.bench) for (const b of team.bench) all.push(b);
  const scored = all.map(p => ({
    p,
    pj: (p.pw0 || 0) + (p.jp0 || 0),
    tot: (p.pw0 || 0) + (p.jp0 || 0) + (p.qk || 0) + (p.mt || 0) + (p.st0 || p.st || 0) + (p.h || 0),
  }));
  scored.sort((a, b) => (b.pj - a.pj) || (b.tot - a.tot));
  if (topN) return scored.slice(0, topN).map(s => s.p.name);
  return scored.length ? scored[0].p : null;
}
/* 精神力でブレ幅が縮む */
function noise(p, base) {
  const range = Math.max(4, 26 - p.mt * 0.2);
  return base + (rnd() * 2 - 1) * range;
}
function drain(p, n) { p.st = clamp(p.st - n, 0, 100); }

/* ---------------- 攻撃の型 ----------------

const ATK = {

  // digDebuff: ディガーが偏った位置だった場合、次の攻撃参加率と攻撃力を下げる度合い。

  5: { name: 'バックアタック', slot: [3],    lane: 1, mul: 1.08, quick: 0, eff: ['jp', 'qk'] },

// 作戦の影響能力値による攻撃補正(平均60を基準に±)。能力で攻撃力が上下する。
function planEffMul(p, typeId) {
  const eff = ATK[typeId].eff; if (!eff) return 1;
  const val = k => k === 'pw' ? curPw(p) : k === 'jp' ? curJp(p) : k === 'qk' ? p.qk : p.mt;
  const avg = (val(eff[0]) + val(eff[1])) / 2;
  return clamp(0.82 + (avg - 60) * 0.006, 0.7, 1.25);
}

/* ===== スーパーレシーブ！ =====
   レシーブ成功時に積み上げ条件を評価し、ゲージに加算 → 抽選。
   receiver: レシーブした選手, opt.isJustAtk/opt.isJustServe/opt.success
   戻り値: スーパーレシーブが発生したら true */
function evalSuperReceive(receiver, opt) {
  opt = opt || {};
  // チュートリアル中はスーパーレシーブを発生させない(基本を学ぶため)
  if (G.tut) { M.srActive = false; return false; }
  // --- 積み上げ ---
  // リベロが相手のジャスト攻撃をレシーブ: +10%
  if (receiver && receiver.pos === 'L' && opt.isJustAtk) M.srGauge += 0.10;
  // リベロが相手のジャストサーブをレシーブ: +10%
  if (receiver && receiver.pos === 'L' && opt.isJustServe) M.srGauge += 0.10;
  // 同じ選手が連続レシーブ: 2回連続+10%, 3回目以降+5%
  if (M.srLastReceiver && receiver && M.srLastReceiver === receiver.name) {
    M.srStreak++;
    M.srGauge += (M.srStreak === 1) ? 0.10 : 0.05;   // streak1=2回連続目
  } else {
    M.srStreak = 0;
  }
  M.srLastReceiver = receiver ? receiver.name : null;
  // スーパーレシーブ後の攻撃のレシーブに成功: +30%
  if (M.srActive) M.srGauge += 0.30;
  M.srGauge = clamp(M.srGauge, 0, 0.95);   // 上限(常に100%にはしない含み)
  // --- 抽選(レシーブタイミングで) ---
  const hit = rnd() < M.srGauge;
  if (hit) {
    M.srActive = true;
    M.srFx = { t: 0, name: receiver ? receiver.name : '' };
    M.popup = { text: 'スーパーレシーブ！', t: 0, col: '#3cc8ff' };
    sSuperReceive();
  } else {
    M.srActive = false;     // 発生しなければ次攻撃の強化はなし
  }
  return hit;
}

/* サーバーが途中交代でコートに入った選手か(その枠のsubState.currentと一致) */
function isSubstituteServer(teamIdx, server) {
  const team = TEAMS[teamIdx];
  if (!team || !team.subState) return false;
  for (let i = 0; i < 6; i++) {
    const st = team.subState[i];
    if (st && st.current && team.players[i] === server && server === st.current) return true;
  }
  return false;
}

      // ⑥ サーブ練習(フローター)、相手レシーブ、相手攻撃

        comReceive: true },
      // ⑪ ブロック練習、必ずシャットブロック、得点
      { kind: 'block', forced: 'shut', num: '⑪', title: 'ブロックフェーズ',

      // ⑫ 必ず歓声イベント、サーブ練習、サービスエース

  // 初期表示: サーブ側は守備陣形、受け手側はレシーブ隊形

  tform[1 - M.serve] = receiveFormation(1 - M.serve);

/* ===== 6人制ローテーション =====
   コートポジション(1-6, 時計回り): P1=後衛右(サーバー), P2=前衛右, P3=前衛中央,
   P4=前衛左, P5=後衛左, P6=後衛中央。前衛=P2,P3,P4 / 後衛=P1,P5,P6。
   ローテーション0での基準配置(各コートポジションに座るroster slot)。
   roster: [0]=S [1,2]=OH [3]=OP [4,5]=MB。
   試合開始時の標準配置(添付図): 前衛 P4=OP / P3=MB / P2=OH, 後衛 P5=OH / P6=MB / P1=S。
   S(P1)とOP(P4)が対角。サイドアウトで時計回りに回る。 */
const ROT_BASE = [0, 1, 4, 3, 2, 5];   // P1..P6 に座る roster slot (rotation 0)
// チームtmのrotationにおける、コートポジションpos(1-6)に居るroster slotを返す
function slotAtPos(tm, pos) {
  const rot = (M.rotation && M.rotation[tm]) || 0;
  // 時計回りローテーション: pos が rot 回まわって元の座席へ
  const baseIdx = (pos - 1 + rot) % 6;
  return ROT_BASE[baseIdx];
}
// roster slot が現在居るコートポジション(1-6)
function posOfSlot(tm, slot) {
  for (let pos = 1; pos <= 6; pos++) if (slotAtPos(tm, pos) === slot) return pos;
  return 1;
}
// 前衛ポジション(P2,P3,P4)か
function isFrontPos(pos) { return pos === 2 || pos === 3 || pos === 4; }
// サーバー(P1)の roster slot
function serverSlot(tm) { return slotAtPos(tm, 1); }
// サイドアウト: 受け側が時計回りに1つ回る
function rotateTeam(tm) { M.rotation[tm] = ((M.rotation[tm] || 0) + 1) % 6; }

function setPhase(name) {
  M.phase = name; M.t = 0;
  const recvTeam = 1 - M.serve;
  if (name === 'plan') {
    M.plan = null; M.firstAtk = true; M.rally = 0;
    M.recv = null; M.atk = null; M.blk = null; M.result = null; M.ball = null;
    // スーパーレシーブの積み上げ・状態はラリーごとにリセット
    M.srGauge = 0; M.srActive = false; M.srLastReceiver = null; M.srStreak = 0;
    M.msg = (recvTeam === 0)
      ? '作戦フェーズ: 1~6で攻撃パターンを入力!'
      : '相手チームが作戦を立てている…(Vで選手データ)';
  }
  if (name === 'whistle') { M.msg = ''; sWhistle(); }
  if (name === 'serve') {
    const t = TEAMS[M.serve];
    // 6人制: サーバーは P1(後衛右)に居る選手 = 直前のローテで前衛右(P2)から後衛に回ってきた選手
    // リベロはサーブを打たない。サーバーがMBの場合もMB本人がサーブする(リベロは入らない)。
    let serverSlotIdx = serverSlot(M.serve);
    let server = t.players[serverSlotIdx];
    if (!server) server = t.players.find(p => p) || t.libero;
    // aimLane: 狙う縦レーン(0=上/1=中/2=下)。プレイヤーは上下キーで変更可。
    M.srv = { server, stage: 0, g: 0, type: null, pow: 0, ok: true, flyT: 75, aimLane: 1 };
    if (M.serve === 1) M.srv.aimLane = ri(0, 2);   // COMはランダムに狙う
    // ---- 歓声イベント判定(プレイヤー・COM共通) ----
    const isDeuce = (M.score[0] >= 24 && M.score[1] >= 24);   // 24-24以降はデュース
    let cheerP = 0;
    if (M.lastRallyLen >= 4) cheerP += 0.20;                       // 長いラリーの後
    if (M.score[M.serve] <= M.score[1 - M.serve] - 5) cheerP += 0.20;  // 5点差以上負け
    if (M.lastWasAce && M.lastAceTeam === M.serve) cheerP += 0.20;  // サービスエースの後
    if (curPw(server) >= 78 && curJp(server) >= 78) cheerP += 0.30; // パワー&ジャンプが高い
    if (isDeuce) cheerP += 1.00;                                    // デュース中は常時歓声(+100%)
    // 途中交代でコートに入った選手の1回目のサーブ: +50%
    const isSubbedIn = isSubstituteServer(M.serve, server);
    if (isSubbedIn && !M.subServed[server.name]) cheerP += 0.50;
    // リーグ戦ホームアドバンテージ: ホーム +30% / アウェイ -5%
    if (M.homeTeam !== undefined && M.homeTeam !== null) {
      if (M.serve === M.homeTeam) cheerP += 0.30;
      else cheerP -= 0.05;
    }

    // ---- 「エース登場！」イベント判定 ----
    // チームのエース(パワー+ジャンプ合計の上位2名)のサーブ時。出現率は発生回数で上昇。
    const aceNames = acePlayerOf(t, 2);
    let aceEvent = false;
    if (aceNames.includes(server.name)) {
      const n = M.aceCount[M.serve];                  // これまでの発生回数
      const aceP = n === 0 ? 0.60 : n === 1 ? 0.80 : 1.00;
      if (rnd() < aceP) aceEvent = true;
    }

    // 前ターンが歓声で、かつそのターンで得点していたら今回も確定発生
    let forced = !!M.cheerStreak || isDeuce;
    // チュートリアル⑫: 必ず歓声イベントを発生させる(プレイヤーのサーブ時)
    if (G.tut && G.tut.step === 'serve' && M.serve === 0) {
      const c = curTut();
      if (c && c.cheer) { forced = true; aceEvent = false; }   // 歓声を出し、エース登場演出は出さない
    }
    const cheerEvent = forced || (rnd() < cheerP);
    // エース登場を優先: エース発生時は歓声演出を出さず、エースのみ。
    M.srv.ace = aceEvent;
    M.srv.cheer = aceEvent ? false : cheerEvent;      // エース時は歓声フラグを立てない
    M.srv.cheerForced = forced && !aceEvent;
    M.srv.deuce = isDeuce;
    // サーブ威力強化はエース or 歓声どちらでも有効にするため別フラグ
    M.srv.boosted = aceEvent || M.srv.cheer;
    if (aceEvent) {
      M.aceCount[M.serve]++;
      M.aceFx = { t: 0, name: server.name };
      M.popup = { text: 'エース登場！', t: 0, col: '#ff5a3c' };
      sAceFanfare();
    } else if (M.srv.cheer) {
      M.cheerFx = { t: 0, name: server.name }; sCheer();
    }
    // サーブした記録(交代選手・エースの1回目判定用)
    if (isSubbedIn) M.subServed[server.name] = true;
    M.msg = (M.serve === 0)
      ? 'サーブ: ↑↓で狙うコース → Zでトス → 赤ゾーンでZ!(早押し=フローター)'
      : server.name + ' のサーブ…';
    // 受け手チームはレシーブ隊形(後列4人+前列2人)、サーブ側は守備陣形
    setReceiveFormation(1 - M.serve);
    setFormation(M.serve, RFORM);
  }
  if (name === 'serveFly') {
    const s = M.srv;
    M.recv = { pressed: null, grade: null, byNonSetter: false, tosser: null,
               receiver: pickReceiver(recvTeam, { serve: true, aimLane: s ? s.aimLane : 1,
                                                  float: s && s.type === 'float' }) };
    M.msg = (recvTeam === 0) ? 'レシーブフェーズ: リングが重なる瞬間にZ!' : '';
  }
  if (name === 'recvMsg') { /* 表示のみ */ }
  if (name === 'attackSeq') {
    const at = M.atkTeam;
    M.atk = { typeId: null, course: null, grade: null, attacker: null,
              touched: false, gate: null, gateKind: null, tButton: null, spikeT: null };
    M.blk = { lane: 1, pressT: null, press: null, laneOK: false, moveLate: false,
              blocker: null, moveT: -999 };
    // レシーブ隊形から本来のフォーメーションへ移動: 攻撃側は攻撃準備位置、守備側は守備位置
    setFormation(at, FORM[M.plan || 1]);
    setFormation(1 - at, RFORM);
    if (at === 1) {           // COMの攻撃 → プレイヤーがブロック
      M.cpuType = cpuPickType();
      M.msg = 'ブロックフェーズ: ↑↓で位置どり、アタックの瞬間にZ(またはX)!';
    } else {
      M.msg = 'トスフェーズ: バー左側で作戦(1-6)! → 右のジャストゲージで矢印アタック(コース)!';
    }
  }
  if (name === 'outcome') { /* resolve済み */ }
  if (name === 'point') {
    // チュートリアル②: レシーブ失敗の再挑戦(スコア加算せず同じサーブをやり直し)
    if (G.tut && G.tut.retryReceive) {
      G.tut.retryReceive = false;
      G.tut.flags.recvIntro = false; G.tut.flags.recvJudged = false;
      M.serve = 1; M.atkTeam = null; M.result = null; M.recv = null; M.recvGrade = null;
      setReceiveFormation(0); setFormation(1, RFORM);
      setPhase('serve');
      return;
    }
    sScore();
    const w = M.result.winner;
    const servingTeam = M.serve;          // このラリーのサーブ側
    const wasCheer = M.srv && M.srv.cheer;
    M.score[w]++;
    // ラリーポイント制: サーブ側が得点ならサーブ権・ローテーション維持。
    // サイドアウト(レシーブ側が得点)なら、サーブ権が移り、その新サーブ側がローテーション。
    if (w !== servingTeam) {
      // サイドアウト: サーブ権が移り、新サーブ側が時計回りに1つローテーション
      M.serve = w;
      M.srvCount[w]++;
      rotateTeam(w);                       // 新サーブ側がローテーション
    }
    // ---- 歓声イベントの履歴を更新 ----
    M.lastRallyLen = M.rally || 0;                          // このラリーの長さ
    M.lastWasAce = (M.result.kind === 'ace');               // サービスエースだったか
    M.lastAceTeam = M.lastWasAce ? servingTeam : -1;
    // 歓声ターンで「サーブ側が得点」したら次も歓声(連続)。失点したら途切れる。
    M.cheerStreak = (wasCheer && w === servingTeam);
    // ベンチに下がっている選手の体力回復(1ターン=どちらかに得点 → +2, 自身の最大値が上限)
    for (let tm = 0; tm < 2; tm++) {
      const T = TEAMS[tm];
      if (!T) continue;
      // リベロと交代でコート外のMB(現在ベンチに居る = リベロがコートに入っているMB)
      const slot = computeLiberoSlot(tm);
      if (slot !== null && T.players[slot] && T.libero) {
        // この瞬間はMBがコート上だが、リベロ表示中はMBが休んでいる扱い → 回復
        const mb = T.players[slot];
        const cap = (mb.st0 !== undefined ? mb.st0 : 100);
        mb.st = clamp(mb.st + 2, 0, cap);
      }
      // 通常交代でベンチに下がっている選手も回復(自身の最大値=st0 が上限)
      if (T.bench) for (const b of T.bench) {
        const cap = (b.st0 !== undefined ? b.st0 : 100);
        b.st = clamp(b.st + 2, 0, cap);
      }
      // ラリー終了でディグデバフをクリア
      for (const p of T.players) { p.atkPenalty = 0; p._lastDigZone = null; }
      if (T.libero) { T.libero.atkPenalty = 0; T.libero._lastDigZone = null; }
    }
    // COM(相手チーム)の選手交代: 体力が大きく減った選手をベンチの元気な控えと交代
    cpuAutoSubstitute(1);
  }
}

/* COMの自動選手交代: コート上で体力が大きく落ちた選手を、ベンチの元気な同等候補と交代する。
   主に体力減少時に発動。1ラリーに最大1回。 */
function cpuAutoSubstitute(tm) {
  const T = TEAMS[tm];
  if (!T || !T.bench || T.bench.length === 0) return;
  if (G.tut) return;                       // チュートリアル中は行わない
  // コート上の各枠で、体力が落ちている選手を探す(リベロ枠は除外)
  const liberoSlot = computeLiberoSlot(tm);
  let bestSlot = -1, bestGain = 0, bestCand = null;
  for (let slot = 0; slot < 6; slot++) {
    if (slot === liberoSlot) continue;       // リベロが入っている枠は対象外
    const cur = T.players[slot];
    if (!cur) continue;
    const cap = cur.st0 || 100;
    const ratio = cur.st / cap;              // 体力割合
    if (ratio > 0.55) continue;              // まだ元気なら交代しない
    // この枠で交代できる候補(同等ポジション優先)から、最も体力が高い控えを選ぶ
    const cands = subCandidates(T, slot).filter(c => T.bench.includes(c));
    for (const c of cands) {
      const samePos = (c.pos === cur.pos);
      const cCap = c.st0 || 100;
      // 交代で得られる体力改善(同ポジ優先で重み付け)
      const gain = (c.st - cur.st) + (samePos ? 20 : -15);
      if (c.st / cCap > 0.7 && gain > bestGain) { bestGain = gain; bestSlot = slot; bestCand = c; }
    }
  }
  // 十分な改善が見込めるときだけ交代(無駄な交代を避ける)
  if (bestSlot >= 0 && bestCand && bestGain > 12) {
    const outP = T.players[bestSlot];
    if (doSubstitute(T, bestSlot, bestCand)) {
      // 相手側の交代は簡易バナーで通知(演出はプレイヤー側のみ)
      M.msg = '相手交代: ' + outP.name + ' → ' + bestCand.name;
    }
  }
}

// レシーバー選出。サーバーが狙ったコース(レーン)の選手が取る。
//  opt.serve=true   : サーブレシーブ
//  opt.aimLane(0-2) : サーバーが狙った縦レーン(コース)
//  opt.float=true   : フローターサーブ(コース内の全選手が同確率)
//  opt.digBias      : ラリー中ディグの位置偏り('front'=前衛/'back'=後衛になりやすい)
/* レシーバーになった選手の「次の自分の攻撃」へのマイナス補正を設定。
   瞬発力(qk)・精神力(mt)が高いほど補正は小さい。
   レシーブで体勢を崩しても、能力が高い選手ほど素早く攻撃に転じられる。 */
function setReceiverAtkPenalty(p) {
  if (!p) return;
  // qk,mtは概ね30-99。平均が高いほどペナルティ減。
  const ability = ((p.qk || 50) + (p.mt || 50)) / 2;        // 0-99程度
  // ability=99 → ~0.06, ability=50 → ~0.25, ability=30 → ~0.34
  const pen = clamp(0.40 - ability * 0.0034, 0.05, 0.40);
  p.atkPenalty = Math.max(p.atkPenalty || 0, pen);
}

function pickReceiver(team, opt) {
  opt = opt || {};
  const T = TEAMS[team];
  const lib = T.libero;
  const libSlot = computeLiberoSlot(team);
  // コート上の実際の選手(リベロ交代を反映)。{player, lane, front}の配列。
  const onCourt = [];
  for (let i = 0; i < 6; i++) {
    const p = (libSlot === i && lib) ? lib : T.players[i];
    if (!p) continue;                           // 念のため(空きスロット保護)
    if (p.pos === 'S') continue;                // セッターは原則レシーブしない
    const y = tform[team] && tform[team][i] ? tform[team][i].y : LANEY[1];
    const r = (y - 26 - LANEY[0]) / (LANEY[2] - LANEY[0]);
    const lane = r < 0.34 ? 0 : r < 0.67 ? 1 : 2;
    onCourt.push({ p, lane, i, front: isFront(team, i) });
  }
  const mark = (p, zone) => { if (p) p._lastDigZone = zone; return p; };
  if (opt.serve) {
    const aim = opt.aimLane === undefined ? 1 : opt.aimLane;
    const inLane = onCourt.filter(o => o.lane === aim).map(o => o.p);
    if (opt.float) {
      if (inLane.length) return pick(inLane);
    } else {
      const r = rnd();
      const libInLane = lib && onCourt.some(o => o.p === lib);
      if (libInLane && r < 0.62) return lib;
      if (inLane.length && r < 0.88) return pick(inLane);
    }
  } else {
    // ラリー中のディグ
    // 打ち分けコースに対応する位置の選手 or リベロが受ける
    if (opt.course) {
      const courseLane = { deep: 0, center: 1, near: 2 };
      let zoneList;
      if (opt.course === 'inner') {
        zoneList = onCourt.filter(o => o.front);            // 前列インナー → 前衛
      } else if (courseLane[opt.course] !== undefined) {
        const ln = courseLane[opt.course];
        zoneList = onCourt.filter(o => !o.front && o.lane === ln); // 後列の該当レーン
        if (!zoneList.length) zoneList = onCourt.filter(o => o.lane === ln);
      }
      if (zoneList && zoneList.length) {
        // リベロがそのゾーンに居れば優先的に。なければゾーンの選手。たまにリベロが横取り。
        const libInZone = lib && zoneList.some(o => o.p === lib);
        if (libInZone && rnd() < 0.7) return mark(lib, opt.digBias || null);
        if (lib && libSlot !== null && !libInZone && rnd() < 0.30) return mark(lib, null);
        return mark(pick(zoneList).p, opt.digBias || null);
      }
    }
    if (opt.digBias) {
      // 偏り作戦: 指定位置の選手が高確率でディグ。選ばれたらゾーンを記録。
      const wantFront = opt.digBias === 'front';
      const zoneList = onCourt.filter(o => o.front === wantFront);
      const other = onCourt.filter(o => o.front !== wantFront);
      if (zoneList.length && rnd() < 0.78) return mark(pick(zoneList).p, opt.digBias);
      if (other.length) return mark(pick(other).p, null);
      if (zoneList.length) return mark(pick(zoneList).p, opt.digBias);
    }
    if (lib && libSlot !== null && rnd() < 0.4) return mark(lib, null);
  }
  // フォールバック: 守備力(瞬発力)の高い選手
  let best = null, bv = -1;
  for (const o of onCourt) {
    const v = rcvPow(o.p) * (0.85 + rnd() * 0.3);
    if (v > bv) { bv = v; best = o.p; }
  }
  // 最終保証: onCourtが空でも必ず実在の選手を返す(undefined防止)
  const fallback = best || lib || T.players.find(p => p) || T.players[1] || T.players[0];
  return mark(fallback, null);
}
function cpuPickType() {
  if (M.firstAtk && M.plan && rnd() < 0.75) return M.plan;
  return ri(1, 6);
}
// 作戦を決定し、その陣形へ移行+カットイン演出を起動
function triggerPlan(n, recvTeam) {
  M.plan = n;
  setFormation(recvTeam, FORM[n]);      // 攻撃側は作戦陣形へ
  setFormation(M.serve, RFORM);         // サーブ側は守備陣形
  // カットインは作戦が分かる側(プレイヤーが攻撃側のとき)だけ番号表示
  M.cutin = { type: n, team: recvTeam, t: 0, reveal: recvTeam === 0 };
}

/* =====================================================================
   更新処理
   ===================================================================== */
function update() {
  const pressed = takeKeys();
  G.t++;

  /* --- BGM自動制御: シーンに応じてループ曲を切替 --- */
  updateBGM();

  /* --- 選手データ画面(オーバーレイ) --- */
  if (statView) {
    for (const k of pressed) {
      if (statView.matchSub) {
        // 試合中: 選手データ/交代
        const team = TEAMS[0];
        if (statView.subMode) {
          // 交代相手(控え)を選ぶモード
          const cands = subCandidates(team, statView.idx);
          if (cands.length === 0) { statView.subMode = false; sBad(); }
          else {
            if (k === 'ArrowLeft')  { statView.subCursor = (statView.subCursor + cands.length - 1) % cands.length; sCursor(); }
            if (k === 'ArrowRight') { statView.subCursor = (statView.subCursor + 1) % cands.length; sCursor(); }
            if (isA(k) || k === 'Enter') {
              const cand = cands[statView.subCursor];
              const slot = statView.idx;
              const outP = team.players[slot];   // 退く選手(交代前)
              if (doSubstitute(team, slot, cand)) {
                sBest();
                // 交代演出をセット(試合画面に戻った時に再生)
                M.subFx = { t: 0, slot, outName: outP.name, outNum: outP.num,
                            inName: cand.name, inNum: cand.num };
                statView = null;                 // 画面を閉じて試合へ戻る
              } else sBad();
            }
            if (isB(k) || k === 'Escape') { statView.subMode = false; statView.subCursor = 0; sCursor(); }
          }
        } else {
          // コート選手の閲覧モード
          if (k === 'ArrowLeft')  { statView.idx = (statView.idx + 5) % 6; sCursor(); }
          if (k === 'ArrowRight') { statView.idx = (statView.idx + 1) % 6; sCursor(); }
          if (isA(k) || k === 'Enter') {
            // 交代へ: 候補があればサブモードへ
            if (subCandidates(team, statView.idx).length > 0) { statView.subMode = true; statView.subCursor = 0; sGood(); }
            else sBad();
          }
          if (isV(k) || isB(k) || k === 'Escape') { statView = null; sCursor(); }
        }
      } else if (statView.roster) {
        const rosterLen = LEAGUE[statView.league].roster.length;
        if (k === 'ArrowLeft')  { statView.rosterIdx = (statView.rosterIdx + rosterLen - 1) % rosterLen; sCursor(); }
        if (k === 'ArrowRight') { statView.rosterIdx = (statView.rosterIdx + 1) % rosterLen; sCursor(); }
        if (isV(k) || isA(k) || isB(k) || k === 'Escape') { statView = null; sCursor(); }
      } else {
        if (k === 'ArrowLeft')  { statView.idx = (statView.idx + 5) % 6; sCursor(); }
        if (k === 'ArrowRight') { statView.idx = (statView.idx + 1) % 6; sCursor(); }
        if (k === 'ArrowUp' || k === 'ArrowDown') { statView.team = 1 - statView.team; sCursor(); }
        if (isV(k) || isA(k) || k === 'Escape') statView = null;
      }
    }
    return;
  }

  if (G.scene === 'opening')     return updOpening(pressed);
  if (G.scene === 'title')       return updTitle(pressed);
  if (G.scene === 'modeSelect')  return updModeSelect(pressed);
  if (G.scene === 'saveSlotSelect') return updSaveSlotSelect(pressed);
  if (G.scene === 'continuePrompt') return updContinuePrompt(pressed);
  if (G.scene === 'leagueSizeSelect') return updLeagueSizeSelect(pressed);
  if (G.scene === 'storyName')   return updStoryName(pressed);
  if (G.scene === 'storyPos')    return updStoryPos(pressed);
  if (G.scene === 'storyTeam')   return updStoryTeam(pressed);
  if (G.scene === 'storyLevel')  return updStoryLevel(pressed);
  if (G.scene === 'storyProfile') return updStoryProfile(pressed);
  if (G.scene === 'levelSelect') return updLevelSelect(pressed);
  if (G.scene === 'teamSelect')  return updTeamSelect(pressed);
  if (G.scene === 'rivalSelect') return updRivalSelect(pressed);
  if (G.scene === 'oppSelect')   return updOppSelect(pressed);
  if (G.scene === 'roster')      return updRoster(pressed);
  if (G.scene === 'tourney')     return updTourney(pressed);
  if (G.scene === 'league')      return updLeague(pressed);
  if (G.scene === 'end')         return updEnd(pressed);
  if (G.scene === 'match')       return updMatch(pressed);
}

/* オープニング: 「MEGA NeXT」ロゴ。Zまたは3秒でタイトルへ。
   ここでの初回入力で音声を解除しておくので、タイトルは1回のZでモード選択へ進める。 */
function updOpening(pressed) {
  if (!G.openStart) G.openStart = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  for (const k of pressed) {
    if (isA(k) || isB(k) || k === 'Enter' || numKey(k) >= 1) {
      ensureAudio();          // 最初のユーザー操作で音声を解除(以降BGMが鳴る)
      gotoTitle();
      return;
    }
  }
  const now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  if (now - G.openStart >= 3000) gotoTitle();    // 3秒経過で自動遷移
}
function gotoTitle() {
  G.scene = 'title';
  G.titleStarted = true;      // タイトルでは1回のZでモード選択へ
  G.titleFade = 0;            // フェードイン開始
  if (audioUnlocked) startBGM('title');   // 音声解除済みならタイトルBGM開始
  sGood();
}

function updTitle(pressed) {
  for (const k of pressed) {
    if (isA(k) || isB(k) || k === 'Enter' || numKey(k) >= 1) {
      ensureAudio();          // 念のため(オープニングを飛ばした場合の保険)
      G.scene = 'modeSelect'; G.cursor = 0; sGood();

}

/* ゲームモード選択(エキシビション / トーナメント / リーグ戦) */
function updModeSelect(pressed) {
  for (const k of pressed) {
    if (k === 'ArrowUp')   { G.cursor = (G.cursor + 3) % 4; sCursor(); }
    if (k === 'ArrowDown') { G.cursor = (G.cursor + 1) % 4; sCursor(); }
    if (isA(k) || k === 'Enter') {
      const mode = G.cursor === 0 ? 'exhibition' : G.cursor === 1 ? 'tournament'
                 : G.cursor === 2 ? 'league' : 'story';
      G.mode = mode;
      if (mode === 'exhibition') {
        G.saveSlot = null;                       // エキシビションはセーブ無し
        G.scene = 'levelSelect'; G.cursor = G.level - 1; sGood();
      } else {
        // セーブ対応モード(トーナメント/リーグ/ストーリー)はスロット選択へ
        G.scene = 'saveSlotSelect'; G.cursor = 0; sGood();
      }

    if (isB(k) || k === 'Escape') { G.scene = 'title'; G.titleStarted = false; sCursor(); }
  }
}

/* 新規ゲーム開始のための最初のセットアップ画面へ(モード別) */
function beginNewGameForMode() {
  if (G.mode === 'story') {
    G.story = { name: '', pos: null, team: null, season: 1, nameChars: [], nameIdx: 0, charSet: 0, onTab: false };
    G.scene = 'storyName'; G.cursor = 0;
  } else if (G.mode === 'league') {
    G.scene = 'leagueSizeSelect'; G.cursor = (G.leagueSize === 8) ? 1 : 0;
  } else { // tournament
    G.scene = 'levelSelect'; G.cursor = G.level - 1;

}

/* セーブスロット選択(モード毎に3つ) */
function updSaveSlotSelect(pressed) {
  for (const k of pressed) {
    if (k === 'ArrowUp')   { G.cursor = (G.cursor + SAVE_SLOTS - 1) % SAVE_SLOTS; sCursor(); }
    if (k === 'ArrowDown') { G.cursor = (G.cursor + 1) % SAVE_SLOTS; sCursor(); }
    const n = numKey(k); if (n >= 1 && n <= SAVE_SLOTS) { G.cursor = n - 1; sCursor(); }
    if (isA(k) || k === 'Enter') {
      G.saveSlot = G.cursor;
      if (slotInfo(G.mode, G.cursor)) { G.scene = 'continuePrompt'; G.cursor = 0; sGood(); }  // 既存データあり
      else { beginNewGameForMode(); }                                                          // 空き → 新規
    }
    if (isB(k) || k === 'Escape') {
      G.scene = 'modeSelect';
      G.cursor = G.mode === 'tournament' ? 1 : G.mode === 'league' ? 2 : 3;
      sCursor();
    }
  }
}

/* 「続きから / 新規」選択(選択中スロットに対して) */
function updContinuePrompt(pressed) {
  for (const k of pressed) {
    if (k === 'ArrowUp' || k === 'ArrowDown') { G.cursor = (G.cursor + 1) % 2; sCursor(); }
    if (isA(k) || k === 'Enter') {
      if (G.cursor === 0) {
        // 続きから
        if (loadSlot(G.mode, G.saveSlot)) { sGood(); }
        else { beginNewGameForMode(); }
      } else {
        // 新規(このスロットを消して通常フロー)
        clearSlot(G.mode, G.saveSlot);
        beginNewGameForMode();
      }
    }
    if (isB(k) || k === 'Escape') { G.scene = 'saveSlotSelect'; G.cursor = G.saveSlot || 0; sCursor(); }
  }
}

const NAME_SETS = [

function updStoryName(pressed) {

/* ===== ストーリー: 難易度選択(練習試合〜SV級) ===== */
const STORY_LEVELS = [2, 3, 4, 5];   // LVキー(練習試合/Vリーグ/プレーオフ/SV級)
function updStoryLevel(pressed) {
  for (const k of pressed) {
    if (k === 'ArrowUp')   { G.cursor = (G.cursor - 1 + STORY_LEVELS.length) % STORY_LEVELS.length; sCursor(); }
    if (k === 'ArrowDown') { G.cursor = (G.cursor + 1) % STORY_LEVELS.length; sCursor(); }
    if (isA(k) || k === 'Enter') {
      G.story.level = STORY_LEVELS[G.cursor];
      startStory();
    }
    if (isB(k) || k === 'Escape') { G.scene = 'storyTeam'; G.cursor = G.story.team || 0; sCursor(); }
  }
}

/* ストーリー開始: 自分をチームに加入させ、8チームリーグを生成 */
function startStory() {
  const s = G.story;
  s.season = s.season || 1;            // シーズン数(継続で加算)
  // 自分の背番号(チーム内で未使用の番号)
  const used = new Set(LEAGUE[s.team].roster.map(p => p.num));
  let myNum = 1; while (used.has(myNum)) myNum++;
  const me = makeStoryPlayer(s.name, s.pos, myNum);
  G.storyPlayer = me;
  // 自チーム=加入チーム。ロスター先頭に自分を加入(ランタイムでLEAGUEに挿入)。
  G.myTeam = s.team;
  if (!LEAGUE[s.team].roster.some(p => p.isStory)) {
    LEAGUE[s.team].roster.unshift(me);   // 先頭に追加(自分が主役)
  }
  // 8チームリーグ(自チーム+ランダム7)
  const others = LEAGUE.map((_, i) => i).filter(i => i !== s.team);
  // シャッフルして7チーム
  for (let i = others.length - 1; i > 0; i--) { const j = ri(0, i); [others[i], others[j]] = [others[j], others[i]]; }
  G.tnRivals = others.slice(0, 7);
  G.leagueSize = 8;
  G.level = G.story.level || 3;       // 選択した難易度(デフォルトVリーグ)
  startLeague();
  G.league.story = true;
}

/* ストーリー: 次のシーズンを開始(育成した自分を引き継ぎ、リーグを新規生成) */
function startNextStorySeason() {
  if (!G.story) return;
  G.story.season = (G.story.season || 1) + 1;   // シーズン+1
  G.myPick = []; G.myLibero = -1;               // 能力変化に合わせて再編成
  startLeague();                                // 新リーグ生成(順位表・個人賞リセット)+ セーブ + league画面
  G.league.story = true;
  saveGame();                                   // story.season 等を確実に保存
}

function updStoryProfile(pressed) {

/* リーグ参加チーム数(4/8)選択 */
function updLeagueSizeSelect(pressed) {
  for (const k of pressed) {
    if (k === 'ArrowUp' || k === 'ArrowDown') { G.cursor = (G.cursor + 1) % 2; sCursor(); }
    if (isA(k) || k === 'Enter') {
      G.leagueSize = G.cursor === 0 ? 4 : 8;
      G.scene = 'levelSelect'; G.cursor = G.level - 1; sGood();
    }
    if (isB(k) || k === 'Escape') { G.scene = 'modeSelect'; G.cursor = 2; sCursor(); }
  }
}

/* 難易度選択 */
function updLevelSelect(pressed) {
  for (const k of pressed) {
    if (k === 'ArrowUp')   { G.cursor = (G.cursor + 4) % 5; sCursor(); }
    if (k === 'ArrowDown') { G.cursor = (G.cursor + 1) % 5; sCursor(); }
    const n = numKey(k);
    if (n >= 1 && n <= 5) { G.cursor = n - 1; sCursor(); }
    if (isA(k) || k === 'Enter') {
      G.level = G.cursor + 1;
      // エキシビションのLV1=チュートリアル。試合中ガイドを表示。
      G.tutorial = (G.mode === 'exhibition' && G.level === 1);
      G.tutorialDone = false; G.tut = null;
      G.scene = 'teamSelect'; G.cursor = 0; G.tnPickStep = 0; sGood();
    }
    if (isB(k) || k === 'Escape') { G.scene = 'modeSelect'; G.cursor = G.mode === 'exhibition' ? 0 : 1; sCursor(); }
  }
}

/* チーム選択(3列グリッド・9チーム) */
function gridMove(cur, d, n) {
  let c = cur;
  if (d === 'L') c = (c + n - 1) % n;
  if (d === 'R') c = (c + 1) % n;
  if (d === 'U') c = (c - 3 + n) % n;
  if (d === 'D') c = (c + 3) % n;
  return c;
}
function updTeamSelect(pressed) {
  const n = LEAGUE.length;
  for (const k of pressed) {
    if (k === 'ArrowLeft')  { G.cursor = gridMove(G.cursor, 'L', n); sCursor(); }
    if (k === 'ArrowRight') { G.cursor = gridMove(G.cursor, 'R', n); sCursor(); }
    if (k === 'ArrowUp')    { G.cursor = gridMove(G.cursor, 'U', n); sCursor(); }
    if (k === 'ArrowDown')  { G.cursor = gridMove(G.cursor, 'D', n); sCursor(); }
    if (isA(k) || k === 'Enter') {
      G.myTeam = G.cursor; sGood();
      if (G.mode === 'tournament' || G.mode === 'league') {
        // トーナメント/リーグ戦: ライバル3チーム選択へ
        G.tnRivals = []; G.tnPickStep = 0;
        G.scene = 'rivalSelect'; G.cursor = (G.cursor + 1) % n;
      } else {
        G.scene = 'oppSelect'; G.cursor = (G.cursor + 1) % n;
      }
    }
    if (isB(k) || k === 'Escape') { G.scene = 'levelSelect'; G.cursor = G.level - 1; sCursor(); }
    if (isV(k)) { statView = { team: 0, idx: 0, league: G.cursor, rosterIdx: 0, roster: true, browse: true }; sCursor(); }
  }
}

/* トーナメント: ライバル3チームを選ぶ */
function updRivalSelect(pressed) {
  const n = LEAGUE.length;
  for (const k of pressed) {
    if (k === 'ArrowLeft')  { G.cursor = gridMove(G.cursor, 'L', n); sCursor(); }
    if (k === 'ArrowRight') { G.cursor = gridMove(G.cursor, 'R', n); sCursor(); }
    if (k === 'ArrowUp')    { G.cursor = gridMove(G.cursor, 'U', n); sCursor(); }
    if (k === 'ArrowDown')  { G.cursor = gridMove(G.cursor, 'D', n); sCursor(); }
    if (isA(k) || k === 'Enter') {
      if (G.cursor === G.myTeam || G.tnRivals.includes(G.cursor)) { sBad(); }
      else {
        G.tnRivals.push(G.cursor); sGood();
        const needRivals = (G.mode === 'league') ? ((G.leagueSize || 4) - 1) : 3;
        if (G.tnRivals.length >= needRivals) {
          // 規定数確定 → モード別に開始
          if (G.mode === 'league') startLeague();
          else startTournament();
        } else {
          // 次のライバルへ(未選択のチームにカーソル)
          let c = (G.cursor + 1) % n;
          while (c === G.myTeam || G.tnRivals.includes(c)) c = (c + 1) % n;
          G.cursor = c;
        }
      }
    }
    if (isB(k) || k === 'Escape') {
      if (G.tnRivals.length > 0) { G.tnRivals.pop(); sCursor(); }   // 1つ戻す
      else { G.scene = 'teamSelect'; G.cursor = G.myTeam; sCursor(); }
    }
    if (isV(k)) { statView = { team: 0, idx: 0, league: G.cursor, rosterIdx: 0, roster: true, browse: true }; sCursor(); }
  }
}
function updOppSelect(pressed) {
  const n = LEAGUE.length;
  for (const k of pressed) {
    if (k === 'ArrowLeft')  { G.cursor = gridMove(G.cursor, 'L', n); sCursor(); }
    if (k === 'ArrowRight') { G.cursor = gridMove(G.cursor, 'R', n); sCursor(); }
    if (k === 'ArrowUp')    { G.cursor = gridMove(G.cursor, 'U', n); sCursor(); }
    if (k === 'ArrowDown')  { G.cursor = gridMove(G.cursor, 'D', n); sCursor(); }
    if ((isA(k) || k === 'Enter') && G.cursor !== G.myTeam) {
      G.oppTeam = G.cursor; sGood();
      // 選手選抜の初期化(おすすめのコート6人+リベロを選んだ状態から)
      const myL = LEAGUE[G.myTeam];
      const auto = autoPickFull(myL);
      G.myPick = auto.six.map(p => myL.roster.indexOf(p));
      G.myLibero = auto.libero ? myL.roster.indexOf(auto.libero) : -1;
      G.pickCursor = 0; G.scene = 'roster';
    } else if ((isA(k) || k === 'Enter') && G.cursor === G.myTeam) {
      sBad();   // 自分と同じチームは選べない
    }
    if (isB(k) || k === 'Escape') { G.scene = 'teamSelect'; G.cursor = G.myTeam; sCursor(); }
    if (isV(k)) { statView = { team: 0, idx: 0, league: G.cursor, rosterIdx: 0, roster: true, browse: true }; sCursor(); }
  }
}

/* 選手選抜: コート6人(L以外) + リベロ1人(L) を選ぶ */
function updRoster(pressed) {
  const roster = LEAGUE[G.myTeam].roster;
  const n = roster.length;
  for (const k of pressed) {
    if (k === 'ArrowLeft')  { G.pickCursor = (G.pickCursor + n - 1) % n; sCursor(); }
    if (k === 'ArrowRight') { G.pickCursor = (G.pickCursor + 1) % n; sCursor(); }
    if (k === 'ArrowUp')    { G.pickCursor = (G.pickCursor - 4 + n) % n; sCursor(); }
    if (k === 'ArrowDown')  { G.pickCursor = (G.pickCursor + 4) % n; sCursor(); }
    if (isV(k)) {
      statView = { team: 0, idx: 0, league: G.myTeam, rosterIdx: G.pickCursor, roster: true };
    }
    if (isB(k)) {   // 選択トグル(Lはリベロ枠、それ以外はコート枠)
      const p = roster[G.pickCursor];
      if (p.pos === 'L') {
        G.myLibero = (G.myLibero === G.pickCursor) ? -1 : G.pickCursor;
        sGood();
      } else {
        const i = G.myPick.indexOf(G.pickCursor);
        if (i >= 0) { G.myPick.splice(i, 1); sCursor(); }
        else if (G.myPick.length < 6) { G.myPick.push(G.pickCursor); sGood(); }
        else sBad();
      }
    }
    if (isA(k) || k === 'Enter') {
      if (G.myPick.length === 6 && G.myLibero >= 0) { startMatch(); }
      else { sBad(); }
    }
    if (k === 'Escape') { G.scene = 'oppSelect'; G.cursor = G.oppTeam; sCursor(); }
  }
}
function startMatch() {
  const myRoster = LEAGUE[G.myTeam].roster;
  const chosen = orderForCourt(G.myPick.map(i => myRoster[i]));
  const myLib = G.myLibero >= 0 ? myRoster[G.myLibero] : null;
  // ベンチ: ロスターから出場6人とリベロを除いた控え(リベロ以外のフィールドプレイヤー)
  const onCourt = new Set(chosen);
  const myBench = myRoster.filter(p => !onCourt.has(p) && p !== myLib && p.pos !== 'L');
  TEAMS[0] = buildTeam(LEAGUE[G.myTeam], chosen, myLib, myBench);
  const oppAuto = autoPickFull(LEAGUE[G.oppTeam]);
  const oppRoster = LEAGUE[G.oppTeam].roster;
  const oppOnCourt = new Set(oppAuto.six);
  const oppBench = oppRoster.filter(p => !oppOnCourt.has(p) && p !== oppAuto.libero && p.pos !== 'L');
  TEAMS[1] = buildTeam(LEAGUE[G.oppTeam], oppAuto.six, oppAuto.libero, oppBench);
  stopBGM();                 // ループBGMを止めてジングルへ
  jingleMatchStart();        // 試合前ジングル
  G.scene = 'match'; newMatch();    // newMatchでM.homeTeam設定
  recolorCrowd();            // ホームアドバンテージ(観客色)を反映
  sWhistle();
}

/* ===== 選手交代 ===== */
// コート枠slotに対して交代可能な控え選手の配列を返す
function subCandidates(team, slot) {
  const st = team.subState[slot];
  if (st == null) {
    // 未交代: ベンチの全選手と交代可能
    return team.bench.slice();
  } else {
    // 交代済み: 元のスターターのみ戻せる(B↔Aのペア固定)
    return [st.starter];
  }
}
// コート枠slotの選手を、控えcandidateと交代する
function doSubstitute(team, slot, candidate) {
  if (slot < 0 || slot > 5 || !team.players[slot]) return false;   // 不正スロット保護
  // ルール厳守: 交代可能な候補に含まれていなければ拒否
  if (!subCandidates(team, slot).includes(candidate)) return false;
  const outP = team.players[slot];           // 今コートにいる選手(退く)
  const benchIdx = team.bench.indexOf(candidate);
  if (benchIdx < 0) return false;
  const st = team.subState[slot];
  // 入れ替え
  team.players[slot] = candidate;
  team.bench[benchIdx] = outP;
  if (st == null) {
    // 初回交代: outP がスターター。以後この枠は outP↔candidate のみ
    team.subState[slot] = { starter: outP, current: candidate };
  } else {
    // 戻し交代: スターターが戻った → 枠を未交代に戻す(再び自由に交代可能)
    if (candidate === st.starter) {
      team.subState[slot] = null;
    } else {
      // 通常ここには来ない(候補がstarterのみのため)
      team.subState[slot] = { starter: st.starter, current: candidate };
    }
  }
  return true;
}


function teamStrength(li) {
  // チームの平均的な強さ(自動対戦のシード/勝敗推定に使用)
  const r = LEAGUE[li].roster;
  let s = 0; for (const p of r) s += p.pw0 + p.jp0 + p.qk + p.mt + p.h * 0.5 + p.st0 * 0.4;
  return s / r.length;
}
/* ===== リーグ戦 ===== */
/* 試合中の個人スタッツ記録。p:選手, kind:'point'|'ace'|'atkTry'|'atkKill'|'block' */
function statRec(p, kind) {
  if (!p || !M.matchStats) return;
  const st = M.matchStats[p.name];
  if (!st) return;
  if (kind === 'point') st.points++;
  else if (kind === 'ace') { st.aces++; st.points++; }
  else if (kind === 'atkTry') st.atkTry++;
  else if (kind === 'atkKill') { st.atkKill++; st.points++; }
  else if (kind === 'block') { st.blocks++; st.points++; }
}

/* ===== セーブ/ロード(localStorage) ===== */
const SAVE_KEY = 'vleague_save_v1';        // 旧単一セーブキー(互換用・未使用)
const SAVE_SLOTS = 3;                      // 各モードのセーブスロット数
function slotKey(mode, slot) { return 'vleague_save_v2_' + mode + '_' + slot; }

/* 現在のゲーム状態からセーブデータ(プレーンオブジェクト)を構築 */
function buildSaveData() {
  return {
    mode: G.mode,
    level: G.level,
    myTeam: G.myTeam,
    leagueSize: G.leagueSize || 4,
    tnRivals: G.tnRivals || [],
    tourney: G.tourney || null,
    league: G.league || null,
    story: G.story || null,
    storyPlayer: G.storyPlayer || null,
    ts: Date.now(),
  };
}
/* 現在のスロットへオートセーブ。成功でtrue。スロット未設定(エキシビ等)なら何もしない。 */
function saveGame() {
  if (G.saveSlot === undefined || G.saveSlot === null) return false;
  try {
    localStorage.setItem(slotKey(G.mode, G.saveSlot), JSON.stringify(buildSaveData()));
    return true;
  } catch (e) { return false; }
}
/* 指定スロットの生データを読む。無ければnull。 */
function readSlot(mode, slot) {
  try {
    const raw = localStorage.getItem(slotKey(mode, slot));
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
/* 指定スロットを削除 */
function clearSlot(mode, slot) {
  try { localStorage.removeItem(slotKey(mode, slot)); } catch (e) {}
}
/* 現在のスロットを削除(旧API互換) */
function clearSave() {
  if (G.saveSlot === undefined || G.saveSlot === null) return;
  clearSlot(G.mode, G.saveSlot);
}

/* セーブデータ → 選択画面用の概要 {title, detail, detail2} を返す。空きはnull。 */
function summaryFromData(d) {
  try {
    if (d.mode === 'story' && d.league) {
      const myFix = d.league.fixtures.filter(f => f.home === d.myTeam || f.away === d.myTeam);
      const played = myFix.filter(f => f.played).length, total = myFix.length;
      const season = (d.story && d.story.season) || 1;
      const nm = d.storyPlayer ? d.storyPlayer.name : '選手';
      const short = LEAGUE[d.myTeam] ? (LEAGUE[d.myTeam].short || LEAGUE[d.myTeam].name) : '';
      const matchNo = d.league.done ? total : Math.min(played + 1, total);
      return { mode: 'story', title: 'ストーリー',
        detail: nm + '(' + short + ')',
        detail2: season + 'シーズン目  ' + matchNo + ' / ' + total + ' 試合目' + (d.league.done ? ' [終了]' : '') };
    }
    if (d.mode === 'league' && d.league) {
      const myFix = d.league.fixtures.filter(f => f.home === d.myTeam || f.away === d.myTeam);
      const played = myFix.filter(f => f.played).length, total = myFix.length;
      const nm = LEAGUE[d.myTeam] ? LEAGUE[d.myTeam].name : '';
      return { mode: 'league', title: 'リーグ戦',
        detail: nm,
        detail2: played + ' / ' + total + ' 試合' + (d.league.done ? ' [終了]' : '') };
    }
    if (d.mode === 'tournament' && d.tourney) {
      const roundJ = d.tourney.round === 'sf' ? '準決勝' : d.tourney.round === 'final' ? '決勝' : '終了';
      const nm = LEAGUE[d.myTeam] ? LEAGUE[d.myTeam].name : '';
      return { mode: 'tournament', title: 'トーナメント', detail: nm, detail2: roundJ };
    }
  } catch (e) {}
  return null;
}
/* 指定スロットの概要(空きはnull) */
function slotInfo(mode, slot) {
  const d = readSlot(mode, slot);
  return d ? summaryFromData(d) : null;
}

/* 指定スロットからゲームを復帰。成功でtrue。 */
function loadSlot(mode, slot) {
  const d = readSlot(mode, slot);
  if (!d) return false;
  G.saveSlot = slot;
  try {
    G.mode = d.mode;
    G.level = d.level || 1;
    G.myTeam = d.myTeam || 0;
    G.leagueSize = d.leagueSize || 4;
    G.tnRivals = d.tnRivals || [];
    G.myPick = []; G.myLibero = -1;       // ロスターは再選択
    if (d.mode === 'tournament' && d.tourney) {
      G.tourney = d.tourney;
      G.scene = 'tourney'; G.tnView = { t: 0, stage: 'intro' };
      return true;
    }
    if ((d.mode === 'league' || d.mode === 'story') && d.league) {
      G.league = d.league;
      // ストーリー: 育成中の自分を復元し、チームに再加入させる
      if (d.mode === 'story' && d.storyPlayer) {
        G.story = d.story || { name: d.storyPlayer.name, pos: d.storyPlayer.pos, team: d.myTeam, season: 1 };
        if (!G.story.season) G.story.season = 1;
        G.storyPlayer = d.storyPlayer;
        const r = LEAGUE[G.myTeam].roster;
        const existing = r.findIndex(p => p.isStory);
        if (existing >= 0) r[existing] = G.storyPlayer;
        else r.unshift(G.storyPlayer);
      }
      G.scene = 'league'; G.lgView = { t: 0, stage: 'intro' };
      return true;
    }
    return false;
  } catch (e) { return false; }
}
/* 旧API互換: 現在のモード/スロットからロード */
function loadGame() { return loadSlot(G.mode, G.saveSlot); }

function startLeague() {
  const teams = [G.myTeam, ...G.tnRivals];   // 4 または 8 チーム
  // 総当たりホーム&アウェイ。サークル法でラウンドを組み、ホーム/アウェイを
  // 各チームでバランスよく交互に配置する。4チーム=12試合 / 8チーム=56試合。
  const fixtures = buildLeagueFixtures(teams);
  const stats = {};
  for (const ti of teams) {
    for (const p of LEAGUE[ti].roster) {
      stats[p.name] = { name: p.name, team: ti, pos: p.pos,
                        points: 0, aces: 0, atkTry: 0, atkKill: 0, blocks: 0 };
    }
  }
  G.league = {
    teams,
    fixtures,
    table: teams.map(ti => ({ team: ti, w: 0, l: 0, pf: 0, pa: 0 })),
    stats,
    matchIndex: 0,
    done: false,
    champion: null,
    lastSim: null,
  };
  G.scene = 'league'; G.lgView = { t: 0, stage: 'intro' }; saveGame(); sGood();
}

/* サークル法でダブルラウンドロビンの対戦表を作る。
   各節で全チームが1試合ずつ。前半=1巡目、後半=同カードの入替(ホーム/アウェイ反転)。
   前半の各カードの向きを「その時点でホーム回数が少ない側をホーム」に決めることで、
   各ペアは前後半で1回ずつホームを担当しつつ、どのチームもH/Aが偏らず交互に近くなる。 */
function buildLeagueFixtures(teams) {
  const n = teams.length;
  const arr = teams.map((_, i) => i);
  const roundPairs = [];
  for (let r = 0; r < n - 1; r++) {
    const pairs = [];
    for (let k = 0; k < n / 2; k++) pairs.push([arr[k], arr[n - 1 - k]]);
    roundPairs.push(pairs);
    arr.splice(1, 0, arr.pop());          // 回転(先頭固定)
  }
  const homeCnt = teams.map(() => 0);
  const firstLegDir = [];                 // 前半各カードの向き [home, away]
  const fixtures = [];
  // 前半: ホーム回数が少ない側をホームに(同数なら節ごとに交互)
  for (let r = 0; r < roundPairs.length; r++) {
    for (let k = 0; k < roundPairs[r].length; k++) {
      const [x, y] = roundPairs[r][k];
      let h, a;
      if (homeCnt[x] !== homeCnt[y]) {
        if (homeCnt[x] < homeCnt[y]) { h = x; a = y; } else { h = y; a = x; }
      } else { if ((r + k) % 2 === 0) { h = x; a = y; } else { h = y; a = x; } }
      homeCnt[h]++;
      firstLegDir.push([h, a]);
      fixtures.push({ home: teams[h], away: teams[a], played: false, score: null });
    }
  }
  // 後半: 前半と同じ順序で、各カードのホーム/アウェイを反転(1回ずつホームを保証)
  for (const [h, a] of firstLegDir) {
    fixtures.push({ home: teams[a], away: teams[h], played: false, score: null });
  }
  return fixtures;
}

/* チーム順位の計算(勝率→得失点)。 */
function leagueStandings() {
  const L = G.league; if (!L) return [];
  const rows = L.table.map(r => ({
    team: r.team, w: r.w, l: r.l, pf: r.pf, pa: r.pa,
    games: r.w + r.l,
    winRate: (r.w + r.l) > 0 ? r.w / (r.w + r.l) : 0,
    diff: r.pf - r.pa,
  }));
  rows.sort((a, b) => (b.winRate - a.winRate) || (b.diff - a.diff) || (b.pf - a.pf));
  return rows;
}

/* 個人賞ランキング上位N(総得点/サービスエース/ブロックポイント) */
function leagueLeaders(key, topN) {
  const L = G.league; if (!L) return [];
  let arr = Object.values(L.stats);
  if (key === 'points') arr = arr.filter(s => s.points > 0).sort((a, b) => b.points - a.points);
  else if (key === 'aces') arr = arr.filter(s => s.aces > 0).sort((a, b) => b.aces - a.aces);
  else if (key === 'blocks') arr = arr.filter(s => s.blocks > 0).sort((a, b) => b.blocks - a.blocks);
  return arr.slice(0, topN || 3);
}

function leagueApplyResult(home, away, hs, as) {
  const L = G.league; if (!L) return;
  const homeRow = L.table.find(r => r.team === home);
  const awayRow = L.table.find(r => r.team === away);
  homeRow.pf += hs; homeRow.pa += as;
  awayRow.pf += as; awayRow.pa += hs;
  if (hs > as) { homeRow.w++; awayRow.l++; } else { awayRow.w++; homeRow.l++; }
}

function leagueSimMatch(home, away) {
  const sh = teamStrength(home) + 4 + rnd() * 16;   // ホーム微有利
  const sa = teamStrength(away) + rnd() * 16;
  const homeWin = sh >= sa;
  const tgt = (G.mode === 'story') ? 15 : 25;
  const ws = tgt, ls = ri(Math.max(0, tgt - 10), tgt - 2);   // 勝者=目標点、敗者は数点差
  const hs = homeWin ? ws : ls, as = homeWin ? ls : ws;
  leagueApplyResult(home, away, hs, as);
  simDistributeStats(home, hs);
  simDistributeStats(away, as);
  return { hs, as, homeWin };
}

function simDistributeStats(teamIdx, teamPoints) {
  const L = G.league;
  const roster = LEAGUE[teamIdx].roster.filter(p => p.pos !== 'L');
  // アタック得点の重み(OP/OHが主軸)
  const atkW = roster.map(p => (p.pw0 + p.jp0) * (p.pos === 'OP' || p.pos === 'OH' ? 1.3 : p.pos === 'MB' ? 0.9 : 0.15));
  const atkSum = atkW.reduce((a, b) => a + b, 0) || 1;
  // チーム得点の内訳: 約75%アタック / 約12%サービスエース / 約13%ブロック
  const atkPts = Math.round(teamPoints * 0.75);
  const acePts = Math.round(teamPoints * 0.12);
  const blkPts = Math.round(teamPoints * 0.13);
  // アタック得点を能力比で配分
  for (let i = 0; i < roster.length; i++) {
    const p = roster[i];
    const st = L.stats[p.name]; if (!st) continue;
    const share = atkW[i] / atkSum;
    const kills = Math.round(atkPts * share);
    const tries = Math.round(kills * (1.3 + rnd() * 0.4));
    st.atkKill += kills; st.atkTry += tries; st.points += kills;
  }
  // サービスエースを配分(パワー/精神力の高い選手中心)。端数を持ち越して確実に整数配分。
  const aceW = roster.map(p => (p.pw0 + (p.mt || 60)) * (p.pos === 'OP' || p.pos === 'OH' ? 1.2 : 1.0));
  distributeInt(roster, aceW, acePts, 'aces');
  // ブロックポイントを配分(MB中心、次いで前衛OP/OH)
  const blkW = roster.map(p => (p.jp0 + p.h * 0.5) * (p.pos === 'MB' ? 1.6 : p.pos === 'OP' ? 1.0 : p.pos === 'OH' ? 0.7 : 0.1));
  distributeInt(roster, blkW, blkPts, 'blocks');
}

/* 重み付きで整数pointsを選手に配分し、指定スタッツと総得点(points)に加算 */
function distributeInt(roster, weights, total, statKey) {
  const L = G.league;
  if (total <= 0) return;
  const wsum = weights.reduce((a, b) => a + b, 0) || 1;
  // 期待値の整数部を配り、端数は確率で1点追加(合計がtotalに概ね一致)
  let assigned = 0;
  const frac = [];
  for (let i = 0; i < roster.length; i++) {
    const exp = total * (weights[i] / wsum);
    const base = Math.floor(exp);
    frac.push({ i, f: exp - base });
    const st = L.stats[roster[i].name];
    if (st) { st[statKey] += base; st.points += base; }
    assigned += base;
  }
  // 残りを端数の大きい順に1点ずつ
  let left = total - assigned;
  frac.sort((a, b) => b.f - a.f);
  for (let k = 0; k < frac.length && left > 0; k++) {
    const st = L.stats[roster[frac[k].i].name];
    if (st) { st[statKey]++; st.points++; left--; }
  }
}

function leagueNextMyFixture() {
  const L = G.league; if (!L) return null;
  return L.fixtures.find(f => !f.played && (f.home === G.myTeam || f.away === G.myTeam)) || null;

function lgStartMyMatch() {

function lgReportResult() {
  const L = G.league;
  const fx = G.lgFixture;
  const myScore = M.score[0], oppScore = M.score[1];
  const myIsHome = (fx.home === G.myTeam);
  const homeScore = myIsHome ? myScore : oppScore;
  const awayScore = myIsHome ? oppScore : myScore;
  fx.played = true; fx.score = [homeScore, awayScore];
  leagueApplyResult(fx.home, fx.away, homeScore, awayScore);
  recordMatchStats();
  // ストーリー: 出場の全体成長XP(一瞬でも出場すればもらえる)。
  // ボーナス無しでリーグ1周(14試合)で平均よりやや下まで上がる量に調整。
  if (G.mode === 'story' && G.storyPlayer) {
    const me = G.storyPlayer;
    const levelUps = M.storyLevelUps || [];
    // 1試合あたりの全体XP(14試合で平均よりやや少ない程度に成長)
    addStoryXp(me, 'overall', 78, levelUps);
    me.matches = (me.matches || 0) + 1;
    G.story.lastLevelUps = levelUps.slice();
  }
  // 他チーム戦を、自チーム戦の進行ペースに合わせて複数シミュレート。
  // (他チーム総数 / 自チーム総数)を切り上げた数だけ各節で消化し、最終戦で残りを一掃。
  const myTotal = L.fixtures.filter(f => f.home === G.myTeam || f.away === G.myTeam).length;
  const otherTotal = L.fixtures.length - myTotal;
  const perRound = Math.max(1, Math.ceil(otherTotal / myTotal));
  const myRemaining = L.fixtures.filter(f => !f.played && (f.home === G.myTeam || f.away === G.myTeam)).length;
  // 自チーム最終戦なら残り全部、それ以外はperRound試合をシミュレート
  let simCount = (myRemaining === 0) ? otherTotal : perRound;
  L.lastSim = null;
  for (let s = 0; s < simCount; s++) {
    const otherFx = L.fixtures.find(f => !f.played && f.home !== G.myTeam && f.away !== G.myTeam);
    if (!otherFx) break;
    const r = leagueSimMatch(otherFx.home, otherFx.away);
    otherFx.played = true; otherFx.score = [r.hs, r.as];
    L.lastSim = { home: otherFx.home, away: otherFx.away, hs: r.hs, as: r.as };
  }
  let didSave = false;
  if (L.fixtures.every(f => f.played)) {
    L.done = true;
    const st = leagueStandings();
    L.champion = st[0].team;
    if (G.mode === 'story') { saveGame(); didSave = true; }   // ストーリーは次シーズンへ継続するため保持
    else clearSave();                                         // リーグ戦は完了で削除
  } else {
    saveGame();                     // 進行中はセーブ
    didSave = true;
  }
  G.scene = 'league'; G.lgView = { t: 0, stage: 'result', saved: didSave };
}

function recordMatchStats() {
  const L = G.league;
  if (!M.matchStats) return;
  for (const name in M.matchStats) {
    const ms = M.matchStats[name];
    const st = L.stats[name];
    if (!st) continue;
    st.points += ms.points || 0;
    st.aces += ms.aces || 0;
    st.atkTry += ms.atkTry || 0;
    st.atkKill += ms.atkKill || 0;
    st.blocks += ms.blocks || 0;
  }
}

function startTournament() {

/* 他チーム同士の自動対戦(強さ+乱数で勝者決定) */
function tnSimResult(a, b) {
  const sa = teamStrength(a) + rnd() * 18, sb = teamStrength(b) + rnd() * 18;
  const win = sa >= sb ? a : b;
  const lose = win === a ? b : a;
  // それらしいスコア
  const ws = 25, ls = ri(15, 23);
  return { win, lose, score: win === a ? [ws, ls] : [ls, ws] };
}
/* 自チームが次に戦う相手を返す。なければnull(自チーム敗退済み) */
function tnMyOpponent() {
  const T = G.tourney; if (!T) return null;
  if (T.round === 'sf') {
    const m = T.bracket.sf.find(x => x.a === G.myTeam || x.b === G.myTeam);
    if (!m) return null;
    return m.a === G.myTeam ? m.b : m.a;
  }
  if (T.round === 'final') {
    const f = T.bracket.final;
    if (f.a === G.myTeam) return f.b;
    if (f.b === G.myTeam) return f.a;
    return null;
  }
  return null;
}
/* トーナメントの自チーム戦を開始 */
function tnStartMyMatch() {
  G.oppTeam = tnMyOpponent();
  // 選手選抜へ(初回のみ。2回目以降は前回のまま使い回し)
  if (!G.myPick || G.myPick.length !== 6) {
    const myL = LEAGUE[G.myTeam];
    const auto = autoPickFull(myL);
    G.myPick = auto.six.map(p => myL.roster.indexOf(p));
    G.myLibero = auto.libero ? myL.roster.indexOf(auto.libero) : -1;
    // ストーリー: 自分を必ず先発に入れる(同ポジの一人と入替)
    if (G.mode === 'story') ensureStoryStarter();
  }
  G.pickCursor = 0; G.scene = 'roster';
}

/* ストーリー: 自分(story選手)を必ず先発6人(リベロならリベロ枠)に含める */
function ensureStoryStarter() {
  const myL = LEAGUE[G.myTeam];
  const meIdx = myL.roster.findIndex(p => p.isStory);
  if (meIdx < 0) return;
  const me = myL.roster[meIdx];
  if (me.pos === 'L') {
    G.myLibero = meIdx;                       // リベロ枠に自分
    return;
  }
  if (G.myPick.includes(meIdx)) return;       // 既に先発
  // 同ポジの先発を探して入替。なければ最後の枠と入替。
  let swap = G.myPick.find(i => myL.roster[i].pos === me.pos);
  if (swap === undefined) swap = G.myPick[G.myPick.length - 1];
  const pos = G.myPick.indexOf(swap);
  G.myPick[pos] = meIdx;
}
/* 自チーム戦の結果をトーナメントに反映し、他チーム戦も処理して次へ */
function tnReportResult(myWon) {
  const T = G.tourney;
  if (T.round === 'sf') {
    // 自チームの準決勝
    const mi = T.bracket.sf.findIndex(x => x.a === G.myTeam || x.b === G.myTeam);
    const m = T.bracket.sf[mi];
    m.win = myWon ? G.myTeam : (m.a === G.myTeam ? m.b : m.a);
    // もう一方の準決勝を自動対戦
    const oi = 1 - mi;
    const om = T.bracket.sf[oi];
    if (om.win === null) { const r = tnSimResult(om.a, om.b); om.win = r.win; om.score = r.score; }
    // 決勝の組み合わせ確定
    T.bracket.final.a = T.bracket.sf[0].win;
    T.bracket.final.b = T.bracket.sf[1].win;
    T.round = 'final';
    T.myAlive = (m.win === G.myTeam);
  } else if (T.round === 'final') {
    const f = T.bracket.final;
    f.win = myWon ? G.myTeam : (f.a === G.myTeam ? f.b : f.a);
    T.champion = f.win;
    T.round = 'done';
    T.myAlive = (f.win === G.myTeam);
  }
  let didSave = false;
  if (T.round === 'done' || T.champion !== null) clearSave();   // 完了で削除
  else { saveGame(); didSave = true; }                          // 進行中はセーブ
  G.scene = 'tourney'; G.tnView = { t: 0, stage: 'result', saved: didSave };
}
function updEnd(pressed) {

}

function updTourney(pressed) {

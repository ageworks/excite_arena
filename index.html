/* ---------------- 試合 ---------------- */
function updMatch(pressed) {
  const cfg = LV[G.level];
  const recvTeam = 1 - M.serve;
  // チュートリアル: ポップアップ表示中はポーズ(M.tも進めない)し、専用コントローラで進行を制御
  if (G.tut) {
    if (G.tut.popup) {
      // ポップアップ中はバー/タイマーを完全停止(M.t++しない)
      updTutorial(pressed);
      return;
    }
    M.t++;
    const consumed = updTutorial(pressed);
    if (consumed) return;       // ポーズ中はゲーム進行を止める
  } else {
    M.t++;
  }

  // 選手交代演出のタイマー(一定時間で終了)
  if (M.subFx) { M.subFx.t++; if (M.subFx.t > 110) M.subFx = null; }
  if (M.aceFx) { M.aceFx.t++; if (M.aceFx.t > 90) M.aceFx = null; }
  if (M.srFx) { M.srFx.t++; if (M.srFx.t > 70) M.srFx = null; }

  for (const k of pressed) {
    if (isV(k) && (M.phase === 'plan' || M.phase === 'point')) {
      // ボールが止まっている時: 選手データ/交代画面(自チームのコート選手を閲覧・交代)
      statView = { team: 0, idx: 0, matchSub: true, subMode: false, subCursor: 0 };
      return;
    }
  }

  switch (M.phase) {

  case 'plan': {
    if (recvTeam === 0) {                       // プレイヤーが作戦入力
      for (const k of pressed) {
        const n = numKey(k);
        if (n) { triggerPlan(n, recvTeam); sGood(); setPhase('whistle'); return; }
      }
      if (M.t > 1100) { triggerPlan(1, recvTeam); setPhase('whistle'); }   // タイムアウト
    } else {
      if (M.t === 45) triggerPlan(ri(1, 6), recvTeam);   // COMの作戦(陣形だけ動く・番号は非公開)
      if (M.t > 90) setPhase('whistle');
    }
    break;
  }

  case 'whistle': {
    if (M.t > 55) setPhase('serve');
    break;
  }

  case 'serve': {
    const s = M.srv;
    if (M.cheerFx) M.cheerFx.t++;     // 歓声演出のタイマー
    if (M.serve === 0) {                        // プレイヤーサーブ
      if (s.stage === 0) {
        for (const k of pressed) {
          if (k === 'ArrowUp'   && s.aimLane > 0) { s.aimLane--; sCursor(); }
          if (k === 'ArrowDown' && s.aimLane < 2) { s.aimLane++; sCursor(); }
          if (isA(k)) { s.stage = 1; s.g = 0; sHit(); }
        }
      } else if (s.stage === 1) {
        s.g += 1.6;
        let fired = false;
        for (const k of pressed) if (isA(k)) { fired = true; }
        if (fired) { decideServe(s.g); }
        else if (s.g >= 104) { decideServe(-1); }   // 押し損ね→弱い普通サーブ
      }
    } else {                                    // COMサーブ
      if (s.stage === 0 && M.t > 40) { s.stage = 1; s.g = 0; sHit(); }
      if (s.stage === 1) {
        s.g += 1.6;
        if (s.cpuAim === undefined) {
          // 強サーブ狙い時、レベルが高いほどジャスト帯(78±4)に近づく
          s.cpuAim = (rnd() < cfg.srvStrong) ? 78 + (rnd() * 2 - 1) * (11 - G.level * 2.5)
                   : (rnd() < 0.5 ? ri(8, 30) : ri(42, 58));
        }
        if (s.g >= s.cpuAim) decideServe(s.g);
      }
    }
    break;
  }

  case 'serveFault': {
    if (M.t === 1) {
      // 失敗の種類を決定: ネットにかける / コート外アウト
      M.srv.faultKind = rnd() < 0.5 ? 'net' : 'out';
    }
    if (M.t > 52) {
      M.result = { winner: 1 - M.serve, text: M.srv.server.name + ' サーブミス!', kind: 'fault' };
      setPhase('point');
    }
    break;
  }

  case 'serveFly': {
    const s = M.srv;
    const p = M.t / s.flyT;
    if (recvTeam === 0) {                       // プレイヤーレシーブ
      for (const k of pressed) if (isA(k) && M.recv.pressed === null) {
        M.recv.pressed = M.t; sHit();
      }
    }
    if (p >= 1) { finishReceive(); }
    break;
  }

  case 'recvMsg': {
    if (M.t > 60) {
      M.atkTeam = recvTeam; M.firstAtk = true;
      setPhase('attackSeq');
    }
    break;
  }

  case 'attackSeq': {
    if (M.atkTeam === 0) updPlayerAttack(pressed, cfg);
    else                 updCpuAttack(pressed, cfg);
    break;
  }

  case 'outcome': {
    const r = M.result;
    if (M.t === 14) {
      if (r.kind === 'shut') sBlock();
      else if (r.kind === 'dig') sHit();
      else sSpike();
    }
    if (M.t > 80) {
      if (r.kind === 'dig') {
        M.atkTeam = 1 - M.atkTeam; M.firstAtk = false; M.rally++;
        M.recvGrade = (rnd() < 0.6) ? 'good' : 'bad';
        setPhase('attackSeq');
      } else {
        setPhase('point');
      }
    }
    break;
  }

  case 'point': {
    if (M.t > 130) {
      // ラリーポイント制: 目標点以上かつ2点差で勝利。デュースは2点差まで継続。
      // ストーリーモードは15点マッチ、それ以外は25点。
      const target = (G.mode === 'story') ? 15 : 25;
      const a = M.score[0], b = M.score[1];
      const win = (Math.max(a, b) >= target && Math.abs(a - b) >= 2);
      if (win) {
        G.scene = 'end'; G.winner = (a > b) ? 0 : 1;
        if (G.winner === 0) { jingleWin(); } else { jingleLose(); }
      } else {
        setPhase('plan');
      }
    }
    break;
  }
  }
}

/* ---------- サーブ決定 ---------- */
function decideServe(g) {
  const s = M.srv, p = s.server;
  rollFatigue(p);                 // 体力疲労を抽選(現在のサーブ力に反映)
  // 歓声/エース: ジャストになりやすい(ゲージを理想値78へ引き寄せ)。エースはさらに強く。
  if ((s.cheer || s.ace) && g >= 0) {
    g = Math.round(lerp(g, 78, s.ace ? 0.72 : 0.55));
  }
  // 威力倍率: エース登場(+70%) > 歓声(+40%) > 通常
  const evMul = s.ace ? 1.7 : (s.cheer ? 1.4 : 1);
  const base = srvPow(p) * evMul;
  if (g >= 0 && g < 35) {
    s.type = 'float'; s.grade = 'float';
    s.pow = base * 0.55; s.ok = rnd() < 0.90; s.flyT = 96;
    drain(p, 1);                  // フローター: 1
  } else if (g >= 60) {
    // 強サーブ: 中心78、ジャスト±4 / グッド±9 / それ以外バッド
    const d = Math.abs(g - 78);
    const grade = d <= 4 ? 'just' : d <= 9 ? 'good' : 'bad';
    s.type = 'strong'; s.grade = grade;
    const powMul = grade === 'just' ? 1.34 : grade === 'good' ? 1.16 : 0.98;
    s.pow = base * powMul;
    const mtb = clamp(p.mt - 50, 0, 45) * 0.6;
    const sucBase = grade === 'just' ? 88 : grade === 'good' ? 80 : 62;
    const evBonus = s.ace ? 20 : (s.cheer ? 12 : 0);
    s.ok = rnd() < clamp((sucBase + mtb + evBonus) / 100, 0.55, 0.98);
    s.flyT = grade === 'just' ? 50 : grade === 'good' ? 56 : 62;
    drain(p, grade === 'just' ? 3 : 2);   // 強サーブ: 2(ジャスト3)
  } else {
    s.type = 'norm'; s.grade = 'norm';
    s.pow = base * (g < 0 ? 0.6 : 0.8); s.ok = rnd() < 0.86; s.flyT = 76;
    drain(p, 2);                  // 通常: 2
  }
  s.stage = 2;
  // サーブコース: 強い/速いサーブほど奥(エンドライン際)に入りやすい
  s.deep = (s.type === 'strong') ? (rnd() < 0.62)
         : (s.type === 'float')  ? (rnd() < 0.45)
         : (rnd() < 0.40);
  sSpike();
  // チュートリアル: 相手のサーブは必ず成立(レシーブ練習のため)
  if (G.tut && G.tut.step === 'recv' && M.serve === 1) s.ok = true;
  if (!s.ok) { setPhase('serveFault'); M.msg = ''; }
  else {
    setPhase('serveFly');
    const lbl = s.type === 'float' ? 'フローター!'
      : s.type === 'strong' ? (s.grade === 'just' ? 'ジャスト! 強烈サーブ!!' : s.grade === 'good' ? 'ナイスサーブ!' : 'サーブ…')
      : 'サーブ!';
    M.popup = { text: lbl, t: 0,
      col: s.grade === 'just' ? '#7cff8a' : s.grade === 'good' ? '#ffd76a' : '#e8ecff' };
  }
}

/* レシーブのタイミング許容幅(成功円の大きさ)。
   精神力と瞬発力が高いほど大きく広がる。リベロはさらに広い。サーブが強いほど狭い。  */
function recvWindow(rp, srvType) {
  let base = srvType === 'strong' ? 2.6 : srvType === 'norm' ? 4.0 : 3.6;
  // 精神力・瞬発力(基準60)で大きく変動。両方高い選手は円が大きく、低い選手は極端に小さい
  base += (rp.mt - 60) * 0.065 + (rp.qk - 60) * 0.055;
  if (rp.pos === 'L') base += 2.2;            // リベロは成功円が大きい
  return clamp(base, 1.0, 11);
}

/* ---------- レシーブ確定 ---------- */
function finishReceive() {
  const cfg = LV[G.level];
  const s = M.srv, rTeam = 1 - M.serve, rc = M.recv;
  const rp = rc.receiver;
  rollFatigue(rp); drain(rp, 1);     // レシーブ: 1
  // ストーリー: 自分(リベロ等)がレシーブした参加ボーナス
  if (G.mode === 'story' && rTeam === 0 && rp && rp.isStory) {
    storyPlayBonus(rp, 'receive', (M.storyLevelUps = M.storyLevelUps || []));
  }
  let grade;
  if (rTeam === 0) {                            // プレイヤー側: タイミング判定
    // チュートリアル: ジャストで止めて押させたので必ず成功(スーパーレシーブは出さない)
    if (G.tut && G.tut.step === 'recv' && G.tut.flags.recvForceOK) {
      grade = 'good';                            // 'best'だとスーパーレシーブ抽選に乗るため'good'
    } else if (rc.pressed === null) grade = 'miss';
    else {
      const ideal = s.flyT * 0.86;
      const d = Math.abs(rc.pressed - ideal);
      const bw = recvWindow(rp, s.type);       // 精神力・瞬発力・リベロで変わる成功円(BESTの判定幅)
      const gw = bw * 3.0;                     // BESTをシビアに(GOODは相対的に広め)
      grade = d <= bw ? 'best' : d <= gw ? 'good' : 'bad';
    }
    if (grade === 'bad' && rnd() < rcvPow(rp) / 260) grade = 'good';
  } else {                                      // COM側: レベル依存+精神力/リベロ
    let b = cfg.rcvB, gd = cfg.rcvG;
    if (s.type === 'strong') { b -= 0.13; gd -= 0.05; }
    b = clamp(b - (s.pow - 70) * 0.003, 0.03, 0.9);
    b += (rp.mt - 60) * 0.002;                  // 精神力ボーナス
    if (rp.pos === 'L') { b += 0.10; gd += 0.04; }  // リベロは成功率高め
    const r = rnd();
    grade = r < b ? 'best' : r < b + gd ? 'good' : 'bad';
    // チュートリアル: サーブの結果を制御
    if (G.tut && G.tut.step === 'serve' && M.serve === 0) {
      const c = curTut();
      if (c && c.ace) grade = 'miss';              // ⑫: 必ずサービスエース(相手レシーブ失敗)
      else if (c && c.comReceive && grade === 'bad') grade = 'good';  // ④⑥⑩: 相手は必ずレシーブ成功(攻撃へ)
    }
  }
  // エース判定
  if (grade === 'miss' || (grade === 'bad' && s.type === 'strong' && rnd() < 0.28)
      || (grade === 'bad' && rnd() < 0.08)) {
    // チュートリアル: レシーブ失敗はサービスエース扱い→もう一度練習
    if (G.tut && G.tut.step === 'recv' && rTeam === 0) {
      M.result = { winner: M.serve, text: 'サービスエース!! ' + s.server.name, kind: 'ace' };
      M.recvGrade = 'bad';
      M.popup = { text: 'MISS… もう一度!', t: 0, col: '#ff6868' }; sBad();
      G.tut.retryReceive = true;     // リトライ指示
      setPhase('point'); return;
    }
    M.result = { winner: M.serve, text: 'サービスエース!! ' + s.server.name, kind: 'ace' };
    statRec(s.server, 'ace');
    M.recvGrade = 'bad';
    if (rTeam === 0) { M.popup = { text: 'MISS…', t: 0, col: '#ff6868' }; sBad(); }
    setPhase('point'); return;
  }
  rc.grade = grade;
  M.recvGrade = grade;
  // サーブレシーブした選手も、そのターンに攻撃する場合は補正(瞬発力・精神力依存)
  setReceiverAtkPenalty(rp);
  // スーパーレシーブ判定(レシーブ成功時): 相手のジャストサーブをリベロが受けたか等
  const wasSrActive = M.srActive;
  if (grade !== 'bad') {
    evalSuperReceive(rp, { isJustServe: (s.grade === 'just'), success: true,
                           afterSr: wasSrActive });
  } else {
    M.srActive = false; M.srStreak = 0; M.srLastReceiver = rp ? rp.name : null;
  }
  // ジャンプ力変動(レシーブフェーズの結果)
  M.jpDelta = grade === 'best' ? 2 : grade === 'good' ? 0 : -2;
  // Bad → セッター以外がトスに入ることも
  if (grade === 'bad' && rnd() < 0.35) {
    rc.byNonSetter = true;
    const cands = TEAMS[rTeam].players.filter(p => p.pos !== 'S' && p !== rp);
    rc.tosser = pick(cands);
  } else {
    rc.tosser = TEAMS[rTeam].players[0];
  }
  M.popup = { text: grade === 'best' ? 'BEST!!' : grade === 'good' ? 'GOOD!' : 'BAD…', t: 0,
              col: grade === 'best' ? '#7cff8a' : grade === 'good' ? '#ffd76a' : '#ff6868' };
  if (rTeam === 0) (grade === 'best' ? sBest : grade === 'good' ? sGood : sBad)();
  M.msg = rc.byNonSetter ? rc.tosser.name + ' が代わりにトス!' : '';
  setPhase('recvMsg');
}

/* ---------- プレイヤー攻撃 / COMブロック ---------- */
/* 作戦種別(typeId)→ジャストゲージの種類 */
function gateKind(typeId) {
  if (typeId === 5 || typeId === 6) return 'back';  // バックアタック・ブロード → 右寄り
  if (ATK[typeId].quick) return 'quick';            // A/B/Cクイック → 中央寄り
  return 'open';                                     // オープン → 中央
}

/* 1回目タッチ(作戦ボタン)確定。typeId をセットしジャストゲージ位置を決める */
function setPlan1stTouch(typeId) {
  const a = M.atk;
  a.typeId = typeId;
  a.touched = true;
  const kind = gateKind(typeId);
  a.gate = ATK_GATE[kind];                     // ジャストゲージ中心フレーム
  a.gateKind = kind;
  sHit();
  // ストーリー: 自分がセッターでコートに居ればトス参加ボーナス
  if (G.mode === 'story' && M.atkTeam === 0 && G.storyPlayer && G.storyPlayer.pos === 'S') {
    const me = TEAMS[0].players.find(p => p.isStory);
    if (me) storyPlayBonus(me, 'toss', (M.storyLevelUps = M.storyLevelUps || []));
  }
}

/* 2回目アタック(矢印)確定。タイミングとコースを決定し攻撃解決へ。
   作戦キーで選んだ攻撃種別(typeId)はそのまま維持。矢印はコース(方向)のみ決める。 */
function decideAttackTiming(cfg, course) {
  const a = M.atk;
  a.course = course;
  a.tButton = M.t; sHit();
  // 作戦別のジャスト/OK許容幅
  const type = ATK[a.typeId];
  const tolJ = type.tolJ != null ? type.tolJ : ATK_TOL_J;
  const tolOk = type.tolOk != null ? type.tolOk : ATK_TOL_OK;
  const d = Math.abs(M.t - a.gate);
  a.grade = d <= tolJ ? 'just' : d <= tolOk ? 'ok' : 'late';
  a.spikeT = M.t + (type.quick ? 18 : 28);
  finalizeAttack(cfg);
}

/* 攻撃種別・グレード確定後の共通処理(アタッカー選出・COMブロック決定) */
function finalizeAttack(cfg) {
  const a = M.atk;
  applyTossExtras(0);     // ジャンプ補正・アタッカー選出・セッター以外トスのペナルティ
  const type = ATK[a.typeId];
  let laneP = cfg.lane;
  if (type.quick) laneP -= 0.12;
  const b = M.blk;
  b.laneOK = rnd() < laneP;
  b.lane = b.laneOK ? type.lane : pick([0, 1, 2].filter(l => l !== type.lane));
  const r = rnd();
  b.press = r < cfg.blkJust ? 'just' : r < cfg.blkJust + cfg.blkLate ? 'late' : null;
  b.moveLate = b.press === 'late' && rnd() < 0.3;
  b.blocker = TEAMS[1].players[frontBlocker(1, b.lane)];
  M.popup = { text: type.name + (a.grade === 'just' ? ' JUST!' : a.grade === 'ok' ? ' OK' : ' 威力減…'), t: 0,
              col: a.grade === 'just' ? '#7cff8a' : a.grade === 'ok' ? '#ffd76a' : '#ff6868' };
}

function updPlayerAttack(pressed, cfg) {
  const a = M.atk;
  for (const k of pressed) {
    // 1回目タッチ: バー前半(TOSS_MIDより前)で作戦ボタン(1-6)
    if (!a.touched) {
      const n = numKey(k);
      if (n >= 1 && n <= 6 && M.t < TOSS_MID) setPlan1stTouch(n);
    } else if (a.tButton === null) {
      // 2回目アタック: 矢印でコース&タイミング決定
      //  ↑=後列奥(画面奥) / →=後列中央 / ↓=後列手前(画面手前) / ←=前列インナークロス
      let course = null;
      if (k === 'ArrowUp')         course = 'deep';    // 後列・画面奥(lane0)
      else if (k === 'ArrowRight') course = 'center';  // 後列・中央(lane1)
      else if (k === 'ArrowDown')  course = 'near';    // 後列・画面手前(lane2)
      else if (k === 'ArrowLeft')  course = 'inner';   // 前列へのインナークロス
      if (course) { decideAttackTiming(cfg, course); }
    }
  }
  // チュートリアル③: 凍結方式のためタイムアウトは発生しないが、念のためのガード
  if (G.tut && G.tut.step === 'toss') {
    if (a.spikeT !== null && M.t === a.spikeT) { resolveAttack(cfg); sSpike(); setPhase('outcome'); }
    return;
  }
  // 1回目タッチを押せずに前半終了 → 自動で前衛オープン
  if (!a.touched && M.t >= TOSS_MID) {
    setPlan1stTouch(1);
    M.msg = '作戦入力なし → オープン!';
  }
  // 2回目アタックを押せずにバー終了 → タイミング外れ(威力減)でアタック
  if (a.touched && a.tButton === null && M.t >= TOSS_TIMEOUT) {
    a.course = 'endline'; a.grade = 'late'; a.tButton = M.t;
    a.spikeT = M.t + (ATK[a.typeId].quick ? 18 : 28);
    finalizeAttack(cfg);
  }
  if (a.spikeT !== null && M.t === a.spikeT) { resolveAttack(cfg); sSpike(); setPhase('outcome'); }
}

/* ---------- COM攻撃 / プレイヤーブロック ---------- */
function updCpuAttack(pressed, cfg) {
  const a = M.atk, b = M.blk;
  for (const k of pressed) {
    if (k === 'ArrowUp'   && b.lane > 0) { b.lane--; b.moveT = M.t; sCursor(); }
    if (k === 'ArrowDown' && b.lane < 2) { b.lane++; b.moveT = M.t; sCursor(); }
    if ((isA(k) || isB(k)) && b.pressT === null) { b.pressT = M.t; sHit(); }
  }
  if (M.t === DECIDE) {
    a.typeId = M.cpuType;
    const r = rnd();
    a.grade = r < cfg.tossJust ? 'just' : r < cfg.tossJust + cfg.tossOk ? 'ok' : 'late';
    a.course = pick(['inner', 'center', 'deep', 'near']);
    applyTossExtras(1);
  }
  if (M.t === SPIKE + 9) {
    const type = ATK[a.typeId];
    b.laneOK = b.lane === type.lane;
    if (b.pressT !== null) {
      const d = b.pressT - SPIKE;
      b.press = Math.abs(d) <= 5 ? 'just' : (d > -20 && d < 20) ? 'late' : null;
    }
    b.moveLate = b.moveT > SPIKE - 18;
    b.blocker = TEAMS[0].players[frontBlocker(0, b.lane)];
    resolveAttack(cfg); sSpike(); setPhase('outcome');
  }
}

/* 選手が前衛か。6人制ローテーションのコートポジションで判定(P2,P3,P4=前衛)。 */
function isFront(team, i) {
  return isFrontPos(posOfSlot(team, i));
}

/* 作戦に応じて攻撃する選手(players index)を選ぶ。確率つき。 */
function pickAttacker(team, typeId) {
  const ps = TEAMS[team].players;       // [0]=S [1,2]=OH [3]=OP [4,5]=MB
  const idx = ps.map((p, i) => i).filter(i => ps[i].pos !== 'S' && ps[i].pos !== 'L');
  const front = idx.filter(i => isFront(team, i));
  const back  = idx.filter(i => !isFront(team, i));
  const pos = (list, ...wanted) => {
    for (const w of wanted) { const f = list.filter(i => ps[i].pos === w); if (f.length) return f; }
    return [];
  };
  // デバフ(直前に狙われた位置でディグした選手)は参加率を下げる: 候補内に非デバフ者がいれば優先
  const pick = list => {
    if (!list || !list.length) return undefined;
    const clean = list.filter(i => !(ps[i].atkPenalty));
    // デバフ者は (1-penalty) の確率でのみ残す。非デバフが居れば高確率でそちら。
    if (clean.length && clean.length < list.length && rnd() < 0.75) return clean[Math.floor(Math.random()*clean.length)];
    return list[Math.floor(Math.random() * list.length)];
  };
  const pickOr = (...lists) => {
    for (const l of lists) if (l && l.length) return pick(l);
    return (front.length ? pick(front) : (idx.length ? pick(idx) : 1));
  };
  const r = rnd();
  switch (typeId) {
    case 1: // オープン: 誰でも可。優先 前衛OP=前衛OH > 前衛MB > 後衛OP=後衛OH
      return pickOr(pos(front, 'OP', 'OH'), pos(front, 'MB'),
                    pos(back, 'OP', 'OH'), pos(back, 'MB'), idx);
    case 2: // Aクイック: 前衛のみ。主にMB、稀に前衛OH/OP
      if (r < 0.82) return pickOr(pos(front, 'MB'), pos(front, 'OH', 'OP'));
      return pickOr(pos(front, 'OH', 'OP'), pos(front, 'MB'));
    case 3: // Bクイック: 前衛のみ。主にMB、たまに前衛OH
      if (r < 0.78) return pickOr(pos(front, 'MB'), pos(front, 'OH'));
      return pickOr(pos(front, 'OH'), pos(front, 'MB'));
    case 4: // Cクイック: 前衛のみ。MBかOH
      return pickOr(pos(front, 'MB', 'OH'), pos(front, 'OP'));
    case 6: // ブロード: 前衛のみ。主にMB、稀に前衛OH
      if (r < 0.84) return pickOr(pos(front, 'MB'), pos(front, 'OH'));
      return pickOr(pos(front, 'OH'), pos(front, 'MB'));
    case 5: // バックアタック: 後衛のみ。後衛のOH/OP優先、なければ後衛MB
      return pickOr(pos(back, 'OH', 'OP'), pos(back, 'MB'), back);
    default:
      return pickOr(front, idx);
  }
}

/* トス確定時の共通処理(体力/ジャンプ変動・アタッカー選出) */
function applyTossExtras(team) {
  const a = M.atk;
  const type = ATK[a.typeId];
  a.attacker = pickAttacker(team, a.typeId);
  const A = TEAMS[team].players[a.attacker];
  // セッター以外トスのペナルティ(精神力依存)
  if (M.firstAtk && M.recv && M.recv.byNonSetter) {
    const t = M.recv.tosser;
    if (t) drain(t, 1);
    if (t && rnd() < clamp(1 - t.mt / 115, 0.12, 0.8)) {
      a.grade = a.grade === 'just' ? 'ok' : 'late';
    }
  } else if (M.firstAtk && M.recv && M.recv.tosser) {
    drain(M.recv.tosser, 1);
  }
  // ジャンプ力変動(レシーブ+トスフェーズの結果)
  let d = (M.jpDelta || 0) + (a.grade === 'just' ? 1 : a.grade === 'late' ? -1 : 0);
  A.jpMod = clamp((A.jpMod || 0) + d, -8, 8);
  M.jpDelta = 0;
  // 攻撃の体力消費: オープン=1(ジャスト2)、それ以外=2(ジャスト4)。作戦別指定(ブロード等)があれば優先。
  rollFatigue(A);
  const just = a.grade === 'just';
  if (type.stCost != null) drain(A, just ? (type.stCostJust != null ? type.stCostJust : type.stCost) : type.stCost);
  else if (a.typeId === 1) drain(A, just ? 2 : 1);
  else drain(A, just ? 4 : 2);
}

/* ---------- アタック解決 ---------- */
function recMul(g) { return g === 'best' ? 1.15 : g === 'good' ? 1.0 : 0.78; }
function tossMul(g) { return g === 'just' ? 1.12 : g === 'ok' ? 1.0 : 0.82; }

function resolveAttack(cfg) {
  const at = M.atkTeam, df = 1 - at;
  const a = M.atk, b = M.blk;
  const type = ATK[a.typeId];
  const A = TEAMS[at].players[a.attacker];
  statRec(A, 'atkTry');                    // アタック試行を記録
  // --- ストーリー: 自分の攻撃参加ボーナスXP ---
  if (G.mode === 'story' && at === 0 && A && A.isStory) {
    const act = a.typeId === 1 ? 'open' : a.typeId === 5 ? 'back' : a.typeId === 6 ? 'broad' : 'quick';
    storyPlayBonus(A, act, (M.storyLevelUps = M.storyLevelUps || []));
  }
  // --- チュートリアル: 強制的な結果(ステップ設定のforcedで分岐) ---
  if (G.tut) {
    const c = curTut();
    // トス: プレイヤーの攻撃結果(kill=必ず決まる / dig=拾われる)
    if (G.tut.step === 'toss' && at === 0 && c) {
      if (c.forced === 'kill') {
        M.result = { winner: 0, text: A.name + ' ' + type.name + 'が決まった!!', kind: 'kill', ap: 80 };
        statRec(A, 'atkKill'); statRec(A, 'point');
        return;
      }
      // dig: 相手に拾われる(⑩は狙った選手=方向のレシーバーが拾い、次の攻撃が弱くなる)
      const D = TEAMS[df].players[pickReceiver(df, {})] || TEAMS[df].players[0];
      if (D) setReceiverAtkPenalty(D);   // 拾った選手の次の攻撃を弱く
      M.result = { winner: -1, text: (D ? D.name : '相手') + ' 拾った!!', kind: 'dig', ap: 50, digger: D };
      M.rally++; M.firstAtk = false;
      return;
    }
    // ブロック: 相手のスパイク(shut=必ずシャットで自得点 / out=ブロックアウトで相手得点)
    if (G.tut.step === 'block' && at === 1 && c) {
      if (c.forced === 'shut') {
        const B = TEAMS[0].players[frontBlocker(0, b.lane)];
        M.result = { winner: 0, text: (B ? B.name : '') + ' シャットアウト!!', kind: 'shut', ap: 50, blocker: B };
        if (B) statRec(B, 'block'), statRec(B, 'point');
        return;
      }
      // out: ブロックに当たってアウト→相手の得点
      M.result = { winner: 1, text: A.name + ' のスパイクがブロックアウト!', kind: 'out', ap: 50 };
      return;
    }
  }
  let ap = noise(A, atkPow(A)) * recMul(M.recvGrade) * tossMul(a.grade) * type.mul;
  ap *= planEffMul(A, a.typeId);          // 作戦ごとの影響能力値で補正
  // スーパーレシーブ後の攻撃: 大幅に決まりやすく(威力増。ただし後段のディグ成功率も下げる)
  const srBoost = M.srActive;
  if (srBoost) ap *= 1.65;
  // 直前に狙われた位置でディグした選手は攻撃力ダウン(使用後リセット)
  if (A.atkPenalty) { ap *= (1 - A.atkPenalty); A.atkPenalty = 0; A._lastDigZone = null; }
  if (at === 1) ap *= cfg.atkM;
  // 打ち分けコース別の威力補正(新コース: deep=後列奥/center=後列中央/near=後列手前/inner=前列インナー)
  if (a.course === 'deep')   ap += 5;       // 後列奥(深い)= 強い
  if (a.course === 'center') ap += 3;       // 後列中央
  if (a.course === 'near')   ap += 2;       // 後列手前
  if (a.course === 'inner')  ap += 2;       // 前列インナークロス
  // 旧コース名(COM等)の互換
  if (a.course === 'endline') ap += 6;
  const feint = a.course === 'front';        // 手前=フェイント/軟打(旧)
  if (feint) ap *= 0.6;

  // アウト判定
  let outP = 0.05 + (a.grade === 'late' ? 0.10 : 0)
           + (a.course === 'deep' || a.course === 'endline' ? 0.05 : 0)
           + (M.recvGrade === 'bad' ? 0.04 : 0)
           + (type.quick && a.grade === 'late' ? 0.06 : 0)
           - A.mt * 0.0006 - (feint ? 0.03 : 0);
  if (rnd() < clamp(outP, 0.01, 0.6)) {
    M.result = { winner: df, text: A.name + ' ' + type.name + '…アウト!', kind: 'out', ap };
    return;
  }

  // ブロック判定(後衛アタッカーはブロックの対象にならない)
  const B = b.blocker;
  let touched = false;
  const attackerFront = isFront(at, a.attacker);
  if (attackerFront) {
    // ブロード: タイミングが合えば(ジャスト時)ブロック影響を回避する
    let laneOK = b.laneOK;
    if (laneOK && type.evade) {
      const canEvade = type.evadeNeedsJust ? (a.grade === 'just') : true;
      if (canEvade && rnd() < type.evade) laneOK = false;
    }
    if (!feint && b.press && B) { rollFatigue(B); drain(B, 2); }
    if (!feint && b.press === 'just' && laneOK) {
      const bp = noise(B, blkPow(B)) * (1 + B.qk * 0.002);
      if (bp >= ap * 1.12) {                       // シャット成功はさらに厳しく(ブロッカーが大きく上回る必要)
        M.result = { winner: df, text: B.name + ' シャットブロック!!', kind: 'shut', ap };
        statRec(B, 'block');                  // ブロックポイント
        return;
      }
      ap *= 0.26; touched = true;                  // ワンタッチでの威力減をさらに強化
    } else if (!feint && b.press === 'late' && laneOK) {
      ap *= 0.42; touched = true;                  // ワンタッチでの威力減をさらに強化
    } else if (!feint && b.press && !laneOK) {
      ap *= 0.70; touched = rnd() < 0.5;
    }
  }
  // ブロックアウト: アタッカーの精神力が高いほど増える。Bクイックは大きくボーナス。
  let blockoutP = clamp(0.12 + (A.mt - 60) * 0.005, 0.06, 0.40) + (type.boBonus || 0);
  if (touched && (b.moveLate || type.boBonus) && rnd() < clamp(blockoutP, 0.06, 0.6)) {
    M.result = { winner: at, text: 'ブロックアウト! ' + A.name + 'のポイント!', kind: 'blockout', ap };
    statRec(A, 'atkKill');                  // ブロックアウトも得点
    return;
  }

  // ディグ(拾えるか)。打ち分けコースに対応する位置の選手かリベロが受ける。
  let D = pickReceiver(df, { digBias: type.digBias, course: a.course });
  if (!D) D = TEAMS[df].players.find(p => p) || TEAMS[df].libero;  // 念のための保証
  let digP = clamp(0.95 - ap / 165, 0.04, 0.9)
           + D.qk * 0.0012 + (touched ? 0.12 : 0) + (feint ? 0.10 : 0)
           - M.rally * 0.05;
  if (df === 1) digP += cfg.dig;
  if (srBoost) digP -= 0.55;       // スーパーレシーブ後の攻撃は拾われにくい(ただし0%ではない)
  // スーパーレシーブの攻撃強化はこの攻撃で消費
  if (srBoost) M.srActive = false;
  if (rnd() < clamp(digP, 0.03, 0.92)) {
    rollFatigue(D); drain(D, 1);
    // レシーバーは次の自分の攻撃に補正がかかる(瞬発力・精神力が高いほど補正は小さい)
    setReceiverAtkPenalty(D);
    // 位置偏り作戦: ディガーが狙った位置(前衛/後衛)なら追加でダウン(上書きで大きい方)
    if (type.digBias && D._lastDigZone === type.digBias) {
      D.atkPenalty = Math.max(D.atkPenalty || 0, type.digDebuff || 0.5);
    }
    // スーパーレシーブ判定: リベロが相手のジャスト攻撃を拾った等 / 連続レシーブ / SR後成功
    const wasSrActive = M.srActive;
    evalSuperReceive(D, { isJustAtk: (a.grade === 'just'), success: true, afterSr: wasSrActive });
    M.result = { winner: -1, text: D.name + ' 拾った!!', kind: 'dig', ap, digger: D };
  } else {
    M.result = { winner: at, text: A.name + ' ' + type.name + 'が決まった!!', kind: 'kill', ap };
    statRec(A, 'atkKill');                  // アタック決定(得点)
  }
}

/* =====================================================================
   描画
   ===================================================================== */
function px(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x | 0, y | 0, w, h); }
/* 色ユーティリティ: 16bit級のシェーディング用に明暗を作る */
function hex2rgb(h) {
  if (h[0] !== '#') return null;
  if (h.length === 4) return [parseInt(h[1]+h[1],16), parseInt(h[2]+h[2],16), parseInt(h[3]+h[3],16)];
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}
const _shadeCache = {};
function shade(col, amt) {            // amt: -1(暗)〜+1(明)
  const key = col + '|' + amt;
  if (_shadeCache[key]) return _shadeCache[key];
  const rgb = hex2rgb(col); if (!rgb) return col;
  const f = amt < 0 ? (1 + amt) : 1;
  const add = amt > 0 ? amt * 255 : 0;
  const out = rgb.map(v => clamp(Math.round(v * f + add), 0, 255));
  const r = '#' + out.map(v => v.toString(16).padStart(2, '0')).join('');
  _shadeCache[key] = r; return r;
}
/* 縦グラデの箱(上が明るく下が暗い、立体的なボディ用) */
function box3d(x, y, w, h, col, hi, lo) {
  hi = hi === undefined ? 0.28 : hi; lo = lo === undefined ? 0.30 : lo;
  px(x, y, w, h, col);
  px(x, y, w, Math.max(1, h * 0.22), shade(col, hi));       // 上ハイライト
  px(x, y + h - Math.max(1, h * 0.28), w, Math.max(1, h * 0.28), shade(col, -lo)); // 下シャドウ
  px(x, y, Math.max(1, w * 0.16), h, shade(col, hi * 0.6)); // 左ハイライト
  px(x + w - Math.max(1, w * 0.18), y, Math.max(1, w * 0.18), h, shade(col, -lo * 0.7)); // 右シャドウ
}
function text(s, x, y, size, c, align) {
  ctx.font = 'bold ' + size + 'px "MS Gothic","Hiragino Kaku Gothic Std",monospace';
  ctx.fillStyle = c || '#fff'; ctx.textAlign = align || 'left'; ctx.textBaseline = 'top';
  ctx.fillText(s, x, y);
}
function shText(s, x, y, size, c, align) {
  text(s, x + 2, y + 2, size, '#101028', align); text(s, x, y, size, c, align);
}

/* 髪を描く。cx,cy=頭の左上, hw,hh=頭サイズ, p=選手 */
/* 2頭身ちびキャラの頭(顔+髪)。facing: 'front'|'back'|'left'|'right'
   cx,cy=頭の左上, hw,hh=頭サイズ(大きめ) */
function drawChibiHead(cx, cy, hw, hh, sk, p, facing) {
  const skHi = shade(sk, 0.16), skLo = shade(sk, -0.18);
  const hc = p ? p.hcol : '#33240f';
  const hi = shade(hc, 0.4), lo = shade(hc, -0.3);
  const hair = p ? p.hair : 0;
  const P = (dx, dy, w, h, col) => px(cx + dx, cy + dy, Math.ceil(w), Math.ceil(h), col);

  // --- 後頭部(背中向き): 髪で覆われた頭 ---
  if (facing === 'back') {
    P(0, 0, hw, hh, sk);                       // 頭の地
    // 髪が後頭部を大きく覆う
    P(-1, -1, hw + 2, hh * 0.86, hc);
    P(0, -1, hw * 0.55, 3, hi);
    P(hw * 0.6, hh * 0.3, hw * 0.4, hh * 0.5, lo);
    // 襟足
    P(hw * 0.2, hh * 0.82, hw * 0.6, hh * 0.18, shade(hc, -0.15));
    drawChibiHairTop(P, hw, hh, hair, hc, hi, lo, 'back');
    return;
  }

  // --- 横顔(プロフィール) ---
  if (facing === 'left' || facing === 'right') {
    const dir = facing === 'right' ? 1 : -1;   // 顔が向く方向
    P(0, 0, hw, hh, sk);
    P(0, 0, hw, hh * 0.26, skHi);
    P(0, hh * 0.72, hw, hh * 0.28, skLo);
    // 後ろ側に髪を厚めに
    if (dir > 0) P(-1, -1, hw * 0.6, hh * 0.9, hc); else P(hw * 0.4 + 1, -1, hw * 0.6, hh * 0.9, hc);
    drawChibiHairTop(P, hw, hh, hair, hc, hi, lo, dir > 0 ? 'right' : 'left');
    // 眉(向いている側に1本)
    const browX = dir > 0 ? cx + hw * 0.52 : cx + hw * 0.22;
    px(browX, cy + hh * 0.30, hw * 0.26, Math.max(1, hh * 0.05), shade(hc, -0.1));
    // 片目(丸・向いている側)
    const eyeCX = dir > 0 ? cx + hw * 0.64 : cx + hw * 0.34;
    const eyeCY = cy + hh * 0.46, eyeR = Math.max(1.6, hw * 0.12);
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(eyeCX, eyeCY, eyeR, 0, 7); ctx.fill();
    ctx.fillStyle = '#201810'; ctx.beginPath(); ctx.arc(eyeCX + dir * eyeR * 0.2, eyeCY, eyeR * 0.62, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.85)'; ctx.beginPath(); ctx.arc(eyeCX - eyeR * 0.2, eyeCY - eyeR * 0.25, eyeR * 0.22, 0, 7); ctx.fill();
    // 鼻先
    const nx = dir > 0 ? hw - 1 : -1;
    P(nx, hh * 0.52, 1.6, 2.4, skLo);
    // 口
    P(dir > 0 ? hw * 0.52 : hw * 0.32, hh * 0.72, hw * 0.16, Math.max(1, hh * 0.06), shade(sk, -0.3));
    return;
  }

  // --- 正面顔 ---
  // 耳
  P(-1, hh * 0.4, 1.4, hh * 0.24, sk); P(hw - 0.4, hh * 0.4, 1.4, hh * 0.24, sk);
  P(0, 0, hw, hh, sk);
  P(0, 0, hw, hh * 0.26, skHi);                 // 額
  P(0, hh * 0.72, hw, hh * 0.28, skLo);         // 顎
  // 眉毛(左右)
  const browY = cy + hh * 0.32, browCol = shade(hc, -0.1);
  px(cx + hw * 0.20, browY, hw * 0.22, Math.max(1, hh * 0.05), browCol);
  px(cx + hw * 0.58, browY, hw * 0.22, Math.max(1, hh * 0.05), browCol);
  // 目(丸・パワプロ仕様): 白目の上に黒目の点
  const eyeR = Math.max(1.6, hw * 0.11);
  const eyeLX = cx + hw * 0.30, eyeRX = cx + hw * 0.70, eyeY = cy + hh * 0.46;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(eyeLX, eyeY, eyeR, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(eyeRX, eyeY, eyeR, 0, 7); ctx.fill();
  ctx.fillStyle = '#201810';
  ctx.beginPath(); ctx.arc(eyeLX, eyeY, eyeR * 0.62, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(eyeRX, eyeY, eyeR * 0.62, 0, 7); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.85)';      // ハイライト(きらめき)
  ctx.beginPath(); ctx.arc(eyeLX - eyeR * 0.25, eyeY - eyeR * 0.25, eyeR * 0.22, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(eyeRX - eyeR * 0.25, eyeY - eyeR * 0.25, eyeR * 0.22, 0, 7); ctx.fill();
  // 口
  px(cx + hw * 0.40, cy + hh * 0.72, hw * 0.20, Math.max(1, hh * 0.06), shade(sk, -0.32));
  // 前髪
  drawChibiHairTop(P, hw, hh, hair, hc, hi, lo, 'front');
}

/* 髪型(天頂〜前髪)。styleで前/後/横の見え方を切替 */
function drawChibiHairTop(P, hw, hh, hair, hc, hi, lo, view) {
  const frontFringe = (view === 'front');
  if (hair === 0) {                 // 短髪
    P(-1, -2, hw + 2, hh * 0.36, hc);
    P(0, -2, hw * 0.5, 2, hi);
    if (frontFringe) { P(-1, hh * 0.26, 3, hh * 0.12, hc); P(hw - 2, hh * 0.26, 3, hh * 0.12, hc); }
  } else if (hair === 1) {          // ツーブロック(横刈り上げ)
    P(-1, -2, hw + 2, hh * 0.3, hc);
    P(0, -2, hw * 0.6, 2, hi);
    P(-1, hh * 0.28, 2, hh * 0.16, lo); P(hw - 1, hh * 0.28, 2, hh * 0.16, lo);
    if (frontFringe) P(hw * 0.5, hh * 0.24, hw * 0.5, hh * 0.14, hc);
  } else if (hair === 2) {          // モヒカン/ツンツン
    for (let i = 0; i < 4; i++) P(hw * 0.16 * (i + 1) - 2, -4 - (i % 2) * 2, 3, hh * 0.4, hc);
    P(-1, -1, hw + 2, hh * 0.22, hc);
    P(hw * 0.4, -5, 2, hh * 0.4, hi);
  } else if (hair === 3) {          // ロング/結んだ髪
    P(-2, -2, hw + 4, hh * 0.4, hc);
    P(-3, hh * 0.1, 3, hh * 0.95, hc); P(hw, hh * 0.1, 3, hh * 0.95, hc);
    P(-3, hh * 0.1, 1, hh * 0.6, hi); P(hw + 1, hh * 0.1, 2, hh * 0.6, lo);
    if (frontFringe) P(0, hh * 0.24, hw, hh * 0.14, hc);
  } else if (hair === 4) {          // 丸刈り
    P(-1, -1, hw + 2, hh * 0.3, shade(hc, -0.1));
    P(0, -1, hw * 0.5, 2, shade(hc, 0.2));
  } else {                          // パーマ/アフロ(もこもこ)
    for (const [ox, oy] of [[-3, -3], [hw * 0.3, -5], [hw * 0.7, -4], [hw, -2], [-3, hh * 0.2], [hw, hh * 0.2]])
      P(ox, oy, hw * 0.5, hh * 0.4, hc);
    P(-2, -3, hw + 4, hh * 0.34, hc);
    P(0, -3, hw * 0.4, 2, hi);
  }
}

/* ピクセル選手  p省略可(汎用)
   anim: アニメーション用フレーム数(省略時はG.t)。'run'の足踏み、
         'recv'の構え揺れ、jumpH中のタック量に使用。              */
function dude(x, y, team, pose, jumpH, p, anim, facing) {
  const T = (typeof team === 'object' && team) ? team : TEAMS[team];
  const teamIdx = (typeof team === 'number') ? team : (TEAMS[0] === T ? 0 : 1);
  jumpH = jumpH || 0;
  if (anim === undefined) anim = (typeof G !== 'undefined' && G) ? G.t : 0;
  // facing 既定値: 指定なければ正面(従来挙動に近い)
  if (!facing) facing = 'front';
  // 擬似3D: 論理座標→パース画面座標。NO_PERSPECTIVE時は等倍(位置そのまま)。
  let pr;
  if (NO_PERSPECTIVE) {
    pr = { x: x, y: y, scale: 1 };
  } else {
    pr = project(x, y);
  }
  x = pr.x; y = pr.y;
  const baseSc = p ? p.sc : 1;
  const s = baseSc * pr.scale * 1.04;
  let c = T.col, c2 = T.col2;            // c=脚/腕(ズボン), c2=胴(シャツ)
  if (p && p.pos === 'L') {
    const sameColor = (T.shirt && T.pants) ? (T.shirt.toLowerCase() === T.pants.toLowerCase()) : (T.col === T.col2);
    if (sameColor) { c = '#f4f4f8'; c2 = '#f4f4f8'; }
    else { const tmp = c; c = c2; c2 = tmp; }
  }
  const sk = p ? skinOf(p, T) : T.skin;
  const c2hi = shade(c2, 0.16), c2lo = shade(c2, -0.2);
  const chi = shade(c, 0.16), clo = shade(c, -0.22);
  const shoeCol = '#2a2a32';
  const num = p ? p.num : '';

  // ローカル描画ヘルパー(中心x基準、yは足元基準で上方向がマイナス)
  const R = (dx, dy, w, h, col) => px(x + dx * s, y + dy * s, Math.max(1, Math.ceil(w * s)), Math.max(1, Math.ceil(h * s)), col);

  // 影
  ctx.fillStyle = 'rgba(0,0,0,.26)';
  ctx.beginPath(); ctx.ellipse(x, y - 1, 9 * s, 3 * s, 0, 0, 7); ctx.fill();
  y -= jumpH * pr.scale;

  // ===== 2頭身プロポーション =====
  // 頭サイズ(大きめ) head ~ 16, body ~ 13。全身 ~ 30 + 脚。
  const HW = 15, HH = 15;          // 頭
  const headLeft = -HW / 2;

  // 脚・腕・胴・頭をポーズ別に。bodyTop=胴の上端(頭の下)
  // 基本の体パーツ描画(正面/背面/横で腕の出方を変える)
  function torso(dx, topY, h, opt) {
    opt = opt || {};
    R(dx, topY, 14, h, c2);
    R(dx, topY, 14, 2, c2hi);
    R(dx, topY + h - 2, 14, 2, c2lo);
  }
  function legPair(topY, h, spread, bend) {
    spread = spread === undefined ? 3 : spread;
    const side = (facing === 'left') ? -1 : (facing === 'right') ? 1 : 0;
    if (side !== 0) {
      // 横向き: 前後に足を開いたバレーの構え(膝を曲げて腰を落とす)
      // 後ろ足(やや上・奥)、前足(やや前・下)。膝を曲げるぶん脚は短め。
      const kh = Math.max(4, h - 2);          // 曲げた脚の長さ
      const backX = -side * 3, frontX = side * 4;
      // 後ろ足

const crowd = [];
const CROWD_SKINS = ['#e8b890', '#f0c8a0', '#d8a878', '#c89868'];
const CROWD_NEUTRAL = ['#c85858', '#5878c8', '#58a868', '#c8a838', '#a858a8', '#d88858', '#48a0a0', '#b04848'];
(function () {
  for (let row = 0; row < 5; row++) {
    const baseY = 50 + row * 13;
    for (let i = 0; i < 56; i++) {
      const x = 6 + i * 9 + (row % 2) * 4 + ri(-2, 2);
      crowd.push({ x, y: baseY + ri(-1, 1), sh: pick(CROWD_NEUTRAL), sk: pick(CROWD_SKINS) });
    }
  }

/* 各チームのシャツカラーを観客に反映。自陣側(左=team0/右=team1)を特に多く。 */
function recolorCrowd() {
  if (!TEAMS[0] || !TEAMS[1]) return;
  const c0 = TEAMS[0].shirt, c1 = TEAMS[1].shirt;
  // リーグ戦: ホームチームの色が8割、アウェイチームの色が2割(会場全体)
  if (typeof M !== 'undefined' && M && M.homeTeam !== null && M.homeTeam !== undefined && (G.mode === 'league' || G.mode === 'story')) {
    const homeColor = M.homeTeam === 0 ? c0 : c1;
    const awayColor = M.homeTeam === 0 ? c1 : c0;
    for (const c of crowd) {
      const r = rnd();
      if (r < 0.80) c.sh = homeColor;          // ホーム8割
      else c.sh = awayColor;                   // アウェイ2割
    }
    return;
  }
  for (const c of crowd) {
    const leftSide = c.x < W / 2;                  // 左半分=team0側
    const ownColor = leftSide ? c0 : c1;
    const otherColor = leftSide ? c1 : c0;
    const r = rnd();
    if (r < 0.65) c.sh = ownColor;
    else if (r < 0.77) c.sh = otherColor;
    else c.sh = pick(CROWD_NEUTRAL);
  }
}

function drawCourt() {
  // ===== 背景: 体育館の壁(上部) =====
  let g = ctx.createLinearGradient(0, 0, 0, 150);
  g.addColorStop(0, '#243056'); g.addColorStop(1, '#34406e');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, 150);
  // 天井トラスの照明
  for (const lx of [70, 200, 312, 442]) {
    const lg = ctx.createRadialGradient(lx, 4, 2, lx, 4, 54);
    lg.addColorStop(0, 'rgba(255,255,238,.4)'); lg.addColorStop(1, 'rgba(255,255,238,0)');
    ctx.fillStyle = lg; ctx.fillRect(lx - 54, 0, 108, 46);
    px(lx - 12, 1, 24, 4, '#fffce0');
  }
  // ===== 観客スタンド(段差・奥行き) =====
  for (let row = 0; row < 6; row++) {
    const y = 40 + row * 11;
    px(0, y, W, 11, shade('#3c4470', -row * 0.045));
    px(0, y, W, 1, 'rgba(0,0,0,.22)');
  }
  // 観客(頭+体・密)
  for (const c of crowd) {
    px(c.x, c.y + 3, 5, 5, c.sh);
    px(c.x + 1, c.y, 3, 3, c.sk);
    px(c.x + 1, c.y, 3, 1, shade(c.sk, 0.2));
  }
  // 広告ボード(スタンド最前)
  px(0, 112, W, 18, '#0e1530');
  px(0, 112, W, 2, '#33458a');
  for (let i = 0; i < 9; i++) px(8 + i * 56, 116, 48, 10, shade(['#cc3344', '#3366cc', '#33aa66', '#ccaa33'][i % 4], -0.08));
  px(0, 128, W, 3, '#080d1c');

  // ===== 電光掲示板(立体) =====
  box3d(184, 2, 144, 36, '#0a0a14', 0.4, 0.5);
  px(188, 6, 136, 28, '#070710');
  ctx.strokeStyle = '#2a2a44'; ctx.lineWidth = 1; ctx.strokeRect(188.5, 6.5, 135, 27);
  const deuceNow = (M.score[0] >= 24 && M.score[1] >= 24);
  if (deuceNow) text('★ DEUCE デュース ★', 256, 8, 9, M.t % 30 < 15 ? '#ff7090' : '#ffd040', 'center');

  let fg = ctx.createLinearGradient(0, 130, 0, H);

  ctx.fillStyle = fg; ctx.fillRect(0, 130, W, H - 130);

  ctx.moveTo(bl.x, bl.y); ctx.lineTo(br.x, br.y); ctx.lineTo(fr.x, fr.y); ctx.lineTo(fl.x, fl.y); ctx.closePath();
  ctx.fill();
  // 周囲ライン(台形枠)
  ctx.strokeStyle = '#f6eede'; ctx.lineWidth = 2;
  ctx.stroke();
  // アタックライン(ネットから3m相当: 論理x=160,350)とセンター(=256)
  const lineAt = (lx, col, lw) => {
    const a = project(lx, COURT_BACK), b = project(lx, COURT_FRONT);

  // 照明の反射

  // ===== ネット(中央・パース。奥の支柱は小さく、手前は大きく) =====
  drawNet3D();
}

/* パース対応ネット: 中央(x=256)を奥(COURT_BACK)→手前(COURT_FRONT)に張る */
function drawNet3D() {
  const back = project(256, COURT_BACK);
  const front = project(256, COURT_FRONT);
  const netHBack = 70 * back.scale;     // ネットの高さ(画面px)
  const netHFront = 70 * front.scale;
  // メッシュ(台形の帯)
  ctx.save();
  // ネット面(やや透ける白メッシュ)
  ctx.fillStyle = 'rgba(228,228,242,.16)';
  ctx.beginPath();
  ctx.moveTo(back.x, back.y - netHBack); ctx.lineTo(front.x, front.y - netHFront);
  ctx.lineTo(front.x, front.y); ctx.lineTo(back.x, back.y); ctx.closePath();
  ctx.fill();
  // 縦糸
  ctx.strokeStyle = 'rgba(228,228,242,.32)'; ctx.lineWidth = 1;
  for (let k = 0; k <= 12; k++) {
    const d = k / 12;
    const px0 = lerp(back.x, front.x, d), topY = lerp(back.y - netHBack, front.y - netHFront, d), botY = lerp(back.y, front.y, d);
    ctx.beginPath(); ctx.moveTo(px0, topY); ctx.lineTo(px0, botY); ctx.stroke();
  }
  // 横糸
  for (let k = 0; k <= 6; k++) {
    const f = k / 6;
    const ax = back.x, ay = lerp(back.y - netHBack, back.y, f);
    const bx = front.x, by = lerp(front.y - netHFront, front.y, f);
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
  }
  // 白帯(上端)
  ctx.strokeStyle = '#f4f4fa'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(back.x, back.y - netHBack); ctx.lineTo(front.x, front.y - netHFront); ctx.stroke();
  ctx.restore();
  // 支柱(奥・手前)
  const postW = b => Math.max(3, 5 * b.scale);
  px(back.x - postW(back) / 2, back.y - netHBack - 4, postW(back), netHBack + 6, '#b03028');   // 奥(赤パッド)
  px(front.x - postW(front) / 2, front.y - netHFront - 4, postW(front), netHFront + 6, '#2848b0'); // 手前(青パッド)
  // アンテナ(手前支柱に紅白)
  const ax = front.x, atop = front.y - netHFront;
  for (let yy = 0; yy < 18; yy += 6) { px(ax - 1, atop - 18 + yy, 2, 3, '#e04040'); px(ax - 1, atop - 15 + yy, 2, 3, '#f4f4f4'); }
}

/* チーム陣形の表示座標(補間用) tform[team][idx] = {x,y} */
let tform = [[], []];
function formTarget(team, form) {
  const dir = team === 0 ? -1 : 1;
  const out = [];
  for (let i = 0; i < 6; i++) {
    const f = form[i];
    out[i] = { x: NETX + dir * f.d, y: LANEY[0] + (LANEY[2] - LANEY[0]) * (f.l / 2) + 26 };
  }
  return out;
}
/* レシーブ隊形(W字型・弓なり): 後列4人(後衛3人+前衛OH)、前列2人(S,MB)。
   等間隔・直線的にせず、コートに弓なりに広がる自然な配置。 */
function receiveFormation(team) {
  const dir = team === 0 ? -1 : 1;
  const ps = TEAMS[team].players;
  const yTop = LANEY[0] + 22, yBot = LANEY[2] + 30;
  // 役割分け: 前列=セッター + 前衛MB / 後列=それ以外(後衛3人 + 前衛OH/OP)
  const frontIdx = [], backIdx = [];
  for (let i = 0; i < 6; i++) {
    if (!ps[i]) continue;
    const pos = ps[i].pos;
    const front = isFront(team, i);
    if (pos === 'S' || (front && pos === 'MB')) frontIdx.push(i);
    else backIdx.push(i);
  }
  while (frontIdx.length > 2) backIdx.push(frontIdx.pop());
  while (frontIdx.length < 2 && backIdx.length > 4) frontIdx.push(backIdx.shift());
  // 安定した擬似乱数(選手番号ベース。毎フレーム揺れないよう固定)
  const jit = (idx, scale) => (((ps[idx] ? ps[idx].num : idx) * 53 % 11) / 11 - 0.5) * scale;
  const out = [];
  for (let i = 0; i < 6; i++) out[i] = { x: NETX + dir * 168, y: (yTop + yBot) / 2 };
  // 後列4人: 弓なり(端は手前=ネット寄り、中央2人は奥に下がる)。y位置も等間隔にしない。
  const n = backIdx.length;
  // y方向の配置比率(端→中→端)。均等でなく少し偏らせる。
  const yRatios = n === 4 ? [0.06, 0.40, 0.64, 0.96]
                : n === 3 ? [0.10, 0.5, 0.92]
                : backIdx.map((_, k) => (k + 0.5) / Math.max(1, n));
  // 弓なり: 中央ほどネットから遠い(d大)。端はやや手前。
  const arcD = [150, 178, 182, 152];
  backIdx.forEach((idx, k) => {
    const ratio = yRatios[k] !== undefined ? yRatios[k] : (k + 0.5) / n;
    const d = (arcD[k] !== undefined ? arcD[k] : 168) + jit(idx, 10);
    const y = yTop + (yBot - yTop) * ratio + jit(idx, 8);
    out[idx] = { x: NETX + dir * d, y };
  });
  // 前列2人(S,MB): ネット際。左右に分け、わずかに前後差。
  const frontY = [yTop + (yBot - yTop) * 0.30, yTop + (yBot - yTop) * 0.72];
  const frontDist = [66, 78];
  frontIdx.forEach((idx, k) => {
    out[idx] = { x: NETX + dir * (frontDist[k] || 70) + jit(idx, 6), y: frontY[k] + jit(idx, 6) };
  });
  return out;
}
function initFormation(team, form) {
  tform[team] = formTarget(team, form);
}
function setFormation(team, form) { tform[team]._tgt = formTarget(team, form); }
function setReceiveFormation(team) { tform[team]._tgt = receiveFormation(team); }
function stepFormation() {
  for (let tm = 0; tm < 2; tm++) {
    const arr = tform[tm], tgt = arr._tgt;
    if (!tgt) continue;
    for (let i = 0; i < 6; i++) {
      const dx = tgt[i].x - arr[i].x, dy = tgt[i].y - arr[i].y;
      arr[i].x += dx * 0.22;
      arr[i].y += dy * 0.22;
      arr[i].vx = dx;                                       // 移動方向(向き判定用)
      arr[i].moving = Math.abs(dx) + Math.abs(dy) > 0.6;   // 走るアニメ判定
    }
  }
}

function drawTeams(opts) {
  opts = opts || {};
  stepFormation();
  // リベロのコートイン: 各チームで後衛に回ったMBをリベロと入れ替えて表示。
  const liberoSlot = [computeLiberoSlot(0), computeLiberoSlot(1)];
  const skips = opts.skips || [];
  const isSkipped = (tm, i) => {
    if (opts.skip && opts.skip.team === tm && opts.skip.idx === i) return true;
    for (const s of skips) if (s && s.team === tm && s.idx === i) return true;
    return false;
  };
  // 奥(y小)から描画して重なりを自然に
  const order = [];
  for (let tm = 0; tm < 2; tm++)
    for (let i = 0; i < 6; i++)
      order.push({ tm, i, y: tform[tm][i] ? tform[tm][i].y : LANEY[1] });
  order.sort((a, b) => a.y - b.y);
  const drawn = [new Set(), new Set()];   // 各チームで描画済みの選手(重複描画防止)
  // 各チームの実描画位置を先に確定(リベロ補正込み)し、重なりを解消してから描画
  const drawPos = [{}, {}];
  for (const o of order) {
    if (isSkipped(o.tm, o.i)) continue;
    let pos = tform[o.tm][o.i];
    if (!pos) continue;
    const isLibero = (liberoSlot[o.tm] === o.i && TEAMS[o.tm].libero);
    if (isLibero) pos = liberoBackPos(o.tm, pos);
    drawPos[o.tm][o.i] = { x: pos.x, y: pos.y, moving: pos.moving, vx: pos.vx };
  }
  // 重なり解消(各チーム内で選手同士を最小距離まで押し離す)
  separatePositions(drawPos[0], 0);
  separatePositions(drawPos[1], 1);
  for (const o of order) {
    if (isSkipped(o.tm, o.i)) continue;
    let pos = drawPos[o.tm][o.i] || tform[o.tm][o.i];
    if (!pos) continue;
    // リベロが入るスロットならリベロを描画。交代されたMBは表示しない。
    let p = TEAMS[o.tm].players[o.i];
    const isLibero = (liberoSlot[o.tm] === o.i && TEAMS[o.tm].libero);
    if (isLibero) {
      p = TEAMS[o.tm].libero;
    }
    if (!p) continue;                           // 空きスロット保護
    // 同じ選手オブジェクトを2回描かない(リベロ/MBの重複や判定ぶれによる7人描画を防止)
    if (drawn[o.tm].has(p)) continue;
    drawn[o.tm].add(p);
    const pose = opts.pose || (pos.moving ? 'run' : 'ready');
    const facing = opts.facing || facingFor(o.tm, o.i, p, pos, pose);
    dude(pos.x, pos.y, o.tm, pose, 0, p, G.t + o.i * 5, facing);
    // 作戦ターン: 全キャラの下に選手名(#番号 名字)
    if (opts.names) {
      const lp = project(pos.x, pos.y);
      let nm = p.name.split(' ')[0]; if (nm.length > 4) nm = nm.slice(0, 4);
      const label = '#' + p.num + ' ' + nm;
      ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillStyle = '#101020';
      ctx.fillText(label, lp.x + 1, lp.y + 5);
      ctx.fillStyle = o.tm === 0 ? '#bcd0ff' : '#ffc0c0';
      ctx.fillText(label, lp.x, lp.y + 4);
    }
  }
}

/* リベロを必ず後衛(ネットから遠い側)に描くための位置補正。
   元の横位置(レーン/y)は活かし、ネットからの距離(x)を後衛域へ固定。 */
function liberoBackPos(tm, pos) {
  const dir = tm === 0 ? -1 : 1;
  const backD = 170;                       // ネットからの距離(後衛域)
  const backX = NETX + dir * backD;
  // 既に後衛(|x-NETX|>=130)ならそのまま、前衛寄りなら後衛へ
  const cur = Math.abs(pos.x - NETX);
  const nx = (cur >= 130) ? pos.x : backX;
  return { x: nx, y: pos.y, moving: pos.moving, vx: pos.vx };
}

/* 選手同士が近づきすぎないよう押し離す(描画上の重なり防止)。
   posMap: {slotIdx: {x,y,...}} を直接書き換える。自陣コート範囲内に収める。 */
function separatePositions(posMap, team) {
  const keys = Object.keys(posMap);
  if (keys.length < 2) return;
  // 自陣のx範囲(ネットを越えない)。team0=左半分, team1=右半分。
  const X0 = team === 1 ? NETX + 14 : 30;
  const X1 = team === 1 ? 482 : NETX - 14;
  const COURTY0 = 196, COURTY1 = 372;
  // 投影で奥(y小)ほど画面上で圧縮されるため、奥の選手間隔を広めに取る。
  const depthMin = (ya, yb) => {
    const d = depthOf((ya + yb) / 2);            // 0=奥, 1=手前
    const f = 1 + (1 - clamp(d, 0, 1)) * 0.5;    // 奥は1.5倍
    return { mx: 40 * f, my: 32 * f };
  };
  for (let iter = 0; iter < 8; iter++) {
    let moved = false;
    for (let a = 0; a < keys.length; a++) {
      for (let b = a + 1; b < keys.length; b++) {
        const pa = posMap[keys[a]], pb = posMap[keys[b]];
        let dx = pb.x - pa.x, dy = pb.y - pa.y;
        const adx = Math.abs(dx), ady = Math.abs(dy);
        const { mx, my } = depthMin(pa.y, pb.y);
        if (adx < mx && ady < my) {
          if ((mx - adx) * 0.6 > (my - ady)) {
            const push = (my - ady) / 2 + 0.5;
            const s = dy >= 0 ? 1 : -1;
            pa.y -= s * push; pb.y += s * push;
          } else {
            const push = (mx - adx) / 2 + 0.5;
            const s = dx >= 0 ? 1 : -1;
            pa.x -= s * push; pb.x += s * push;
          }
          moved = true;
        }
      }
    }
    for (const k of keys) {
      const p = posMap[k];
      p.x = clamp(p.x, X0, X1);
      p.y = clamp(p.y, COURTY0, COURTY1);
    }
    if (!moved) break;
  }
}

/* 試合経過に応じた顔・体の向きを返す。
   front=手前(観客側,胸番号), back=相手コート側を向き背中, left/right=横向き。
   コートはネット中央(x=256)で左右に分かれ、相手コートは横方向。
   team0(左)が相手を向く=右向き('right'), team1(右)が相手を向く=左向き('left')。 */
function facingFor(tm, slot, p, pos, pose) {
  const ph = (typeof M !== 'undefined' && M) ? M.phase : '';
  const towardOpp = (tm === 0) ? 'right' : 'left';   // 相手コート側
  const towardOwn = (tm === 0) ? 'left' : 'right';   // 味方コート側
  // 移動中は進行方向を向く
  if (pose === 'run' && pos && pos.vx !== undefined && Math.abs(pos.vx) > 0.05) {
    return pos.vx > 0 ? 'right' : 'left';
  }
  // 試合開始/作戦: 全員手前(正面)
  if (ph === '' || ph === 'plan' || ph === 'whistle') return 'front';
  // サーブ/レシーブ/トス/攻撃: 相手コート側。ただしセッターは味方側(前衛時のみ)。
  if (ph === 'serve' || ph === 'serveFly' || ph === 'serveFault' || ph === 'recv' ||
      ph === 'recvMsg' || ph === 'rally' || ph === 'attackSeq' || ph === 'toss' ||
      ph === 'outcome' || ph === 'point') {
    const isSetter = (p && p.pos === 'S');
    if (isSetter) {
      // 後衛セッターは相手コート側、前衛セッターは味方側を向く
      const front = (typeof isFront === 'function') ? isFront(tm, slot) : true;
      return front ? towardOwn : towardOpp;
    }
    return towardOpp;
  }
  return 'front';
}

/* 選手pがチームtmのコート上でどのスロット(0-5)に描画されるかを返す。
   リベロの場合はliberoSlotのインデックス。見つからなければnull。 */
function slotOfPlayer(tm, p) {
  const T = TEAMS[tm]; if (!T) return null;
  if (T.libero && p === T.libero) {
    const ls = computeLiberoSlot(tm);
    return ls !== null ? { team: tm, idx: ls } : null;
  }
  for (let i = 0; i < 6; i++) if (T.players[i] === p) return { team: tm, idx: i };
  return null;
}

/* リベロがコートインして入れ替わるスロット(交代される後衛MB)を返す。
   リベロがいなければ null。後衛(ネットから遠い側)のMBを交代。
   リベロは前衛に行かないので、後衛にMBがいない場合はnull(リベロは出ない)。 */
function computeLiberoSlot(tm) {
  const T = TEAMS[tm];
  if (!T || !T.libero) return null;
  const mbIdx = [];
  for (let i = 0; i < 6; i++) if (T.players[i] && T.players[i].pos === 'MB') mbIdx.push(i);
  if (!mbIdx.length) return null;
  const hasServe = (typeof M !== 'undefined' && M) ? (M.serve === tm) : false;  // 現在サーブ権を持つか
  // リベロが代わるのは「後衛に居るMB」。ただし以下を考慮:
  //  - 前衛(P2,P3,P4)のMBとは代わらない(リベロは前衛に出ない)
  //  - P1のMBは、サーブ権を持っている間だけサーブのため出場(交代しない)。
  //    ラリーポイント制でサーブ権を失ってもローテせずP1に残った"サーブ権なしのP1のMB"は交代する。
  const eligible = mbIdx.filter(i => {
    const pos = posOfSlot(tm, i);
    if (pos === 5 || pos === 6) return true;          // 後衛(非P1) → 交代対象
    if (pos === 1 && !hasServe) return true;          // サーブ権のないP1のMB → 交代対象
    return false;                                      // 前衛 or サーブ権ありP1 → 交代しない
  });
  if (!eligible.length) return null;
  // 優先: P1(サーブ権なし) > P6 > P5 の順で1人
  const order = { 1: 0, 6: 1, 5: 2 };
  let best = eligible[0], bestRank = 9;
  for (const i of eligible) {
    const r = order[posOfSlot(tm, i)] ?? 9;
    if (r < bestRank) { bestRank = r; best = i; }
  }
  return best;
}

/* ===== 作戦カットイン: 画面上部にミニアニメ ===== */
const CUT_DUR = 92;
function drawCutin() {
  const cu = M.cutin;
  if (!cu) return;
  cu.t++;
  if (cu.t > CUT_DUR) { M.cutin = null; return; }
  const type = ATK[cu.type];
  const team = cu.team;
  const T = TEAMS[team];
  // スライドイン/アウト
  const inP = clamp(cu.t / 10, 0, 1);
  const outP = clamp((cu.t - (CUT_DUR - 12)) / 12, 0, 1);
  const slide = (1 - inP) * -260 + outP * 260;
  const bx = 0, by = 44, bw = W, bh = 92;
  ctx.save();

  // 斜めストライプ装飾
  for (let i = -2; i < 20; i++) px(bx + i * 30 + (cu.t * 2) % 30, by + 3, 12, bh - 6, 'rgba(255,255,255,.025)');

  // 左: 作戦名+番号
  shText(cu.reveal ? ('作戦 ' + cu.type) : '作戦 ?', 64, by + 18, 26, '#ffd040', 'center');
  text(cu.reveal ? type.name : '???', 64, by + 52, 13, '#e8ecff', 'center');
  text(team === 0 ? T.name : '相手の作戦', 64, by + 70, 9, '#8a96d8', 'center');

  // 中央~右: ミニプレーアニメ(助走→トス→スパイク)
  const stage = cu.t;
  const gx = 230, gy = by + bh - 12;      // 地面基準
  // ネット
  px(gx + 150, gy - 56, 3, 56, '#d8d8e8');
  // ボール軌道
  const setX = gx + 60, atkX = gx + 130, ballEndX = gx + 200;
  let ballX, ballY;
  if (stage < 30) { ballX = setX; ballY = gy - 30 - Math.sin(stage / 30 * Math.PI) * 10; }
  else if (stage < 52) { const p = (stage - 30) / 22; ballX = lerp(setX, atkX, p); ballY = lerp(gy - 30, gy - 52, p) - Math.sin(p * Math.PI) * (type.quick ? 8 : 22); }
  else { const p = clamp((stage - 52) / 24, 0, 1); ballX = lerp(atkX, ballEndX, p); ballY = lerp(gy - 50, gy - 8, p); }
  // セッター(常設)
  dude(setX - 18, gy, team, 'ready', 0, T.players[0]);
  // アタッカー: 助走→ジャンプ→スパイク
  const A = T.players[type.slot[0]] || T.players.find(p => p) || T.libero;
  if (!A) { ctx.restore(); return; }   // 念のため
  let apose = 'ready', ajump = 0, ax = gx + 95;
  if (stage < 34) { ax = lerp(gx + 95, atkX - 14, clamp(stage / 34, 0, 1)); apose = 'run'; }
  else if (stage < 58) { ax = atkX - 14; ajump = Math.sin(clamp((stage - 34) / 24, 0, 1) * Math.PI) * 30; apose = 'spike'; }
  else { ax = atkX - 14; apose = 'spike'; ajump = Math.max(0, 30 - (stage - 58) * 2); }
  dude(ax, gy, team, apose, ajump, A, stage);
  // 相手ブロッカー(クイック以外で2枚)
  if (stage > 40) {
    const opp = TEAMS[1 - team];
    let blk = opp.players.find(p => p && p.pos === 'MB') || opp.players.find(p => p) || opp.libero;
    dude(gx + 168, gy, 1 - team, 'jumpB', Math.min((stage - 40) * 1.5, 26), blk);
  }
  ballDrawMini(ballX, ballY);
  // アタッカー名
  text(A.name + ' [' + A.pos + ']', gx + 110, by + 6, 10, '#ffd76a', 'center');
  ctx.restore();
}

}

/* 歓声演出: 客席から選手コールの吹き出し+「歓声!」表示 */
function drawCheer(name) {
  const fx = M.cheerFx || (M.cheerFx = { t: 0, name });
  const t = fx.t;
  let nm = (name || '').split(' ')[0]; if (nm.length > 5) nm = nm.slice(0, 5);
  const calls = [nm + '！', 'がんばれ！', nm + 'コール', 'いけー！'];
  const spots = [[70, 70], [180, 58], [320, 62], [430, 72], [256, 50]];
  for (let i = 0; i < spots.length; i++) {
    const sx = spots[i][0], baseY = spots[i][1];
    const phase = (t + i * 11) % 70;
    if (phase > 50) continue;
    const rise = phase * 0.5;
    const a = clamp(1 - phase / 50, 0, 1);
    const bx = sx, by = baseY - rise;
    const label = calls[i % calls.length];
    const w = label.length * 9 + 12;
    ctx.globalAlpha = a;
    px(bx - w / 2, by - 9, w, 16, 'rgba(255,255,255,.92)');
    ctx.fillStyle = 'rgba(255,255,255,.92)';
    ctx.beginPath(); ctx.moveTo(bx - 4, by + 7); ctx.lineTo(bx + 4, by + 7); ctx.lineTo(bx, by + 12); ctx.fill();
    text(label, bx, by - 1, 10, '#c83048', 'center');
    ctx.globalAlpha = 1;
  }
  if (t < 50) {
    const a = t < 10 ? t / 10 : t > 40 ? (50 - t) / 10 : 1;
    ctx.globalAlpha = clamp(a, 0, 1);
    shText('☆ 大歓声！ ☆', 256, 180, 18, '#ffd040', 'center');
    text('サーブ強化!! ' + (M.cheerStreak && M.srv.cheerForced ? '(連続)' : ''), 256, 200, 11, '#ffe080', 'center');
    ctx.globalAlpha = 1;
  }
}

function drawMatch() {
  drawCourt();
  const recvTeam = 1 - M.serve;
  const ph = M.phase;

  /* バナー */
  const BANNER = {
    plan: '作戦フェーズ', whistle: '', serve: 'サーブフェーズ', serveFault: '',
    serveFly: 'レシーブフェーズ', recvMsg: '',
    attackSeq: M.atkTeam === 0 ? 'トスフェーズ' : 'ブロックフェーズ',
    outcome: '', point: '',
  };
  // 個別に描画される選手(サーバー/レシーバー/アタッカー等)をコート内描画から除外し重複を防ぐ
  const teamOpts = { names: ph === 'plan' };
  const skips = [];
  if ((ph === 'serve' || ph === 'serveFault')) {
    // サーバーはコート外に別途描画。スキップ対象は実際のサーバースロット(serverSlot)。
    skips.push({ team: M.serve, idx: serverSlot(M.serve) });
  }
  if (ph === 'serveFly' || ph === 'recvMsg') {
    // レシーバーは個別描画されるのでコート内ではスキップ
    const rt = (ph === 'serveFly') ? recvTeam : (M.recv ? (1 - M.serve) : recvTeam);
    if (M.recv && M.recv.receiver) skips.push(slotOfPlayer(rt, M.recv.receiver));
  }
  if (ph === 'attackSeq' || ph === 'outcome') {
    // 個別描画される選手(攻撃側セッター/アタッカー, 守備側ブロッカー)はコート内描画から除外
    const at = M.atkTeam, df = 1 - at;
    skips.push({ team: at, idx: 0 });   // セッター(slot0)
    const a = M.atk;
    // 確定済みアタッカー
    if (a && a.attacker !== null && a.attacker !== undefined) skips.push({ team: at, idx: a.attacker });
    // トス上昇中(attacker未確定)はtype.slot[0]が助走描画される → これもskip
    if (a && a.typeId && ATK[a.typeId] && ATK[a.typeId].slot) {
      skips.push({ team: at, idx: ATK[a.typeId].slot[0] });
    }
    const b = M.blk;
    if (b && b.lane !== undefined) {
      skips.push({ team: df, idx: frontBlocker(df, b.lane) });
      if (b.blocker) skips.push(slotOfPlayer(df, b.blocker));   // 実ブロッカーも
    }
    // COM攻撃時はCOMのアタッカーも(drawAttackSeqで個別描画)
    if (at === 1 && M.cpuType && ATK[M.cpuType] && ATK[M.cpuType].slot) {
      skips.push({ team: 1, idx: ATK[M.cpuType].slot[0] });
    }
    // outcome: ディグした選手(r.digger)も個別描画される → skip
    if (ph === 'outcome' && M.result && M.result.digger) {
      skips.push(slotOfPlayer(df, M.result.digger));
    }
  }
  teamOpts.skips = skips.filter(Boolean);
  drawTeams(teamOpts);

  if (ph === 'plan') {
    if (recvTeam === 0) {
      px(70, 150, 372, 96, 'rgba(8,8,30,.88)');
      ctx.strokeStyle = '#5868c0'; ctx.lineWidth = 2; ctx.strokeRect(71, 151, 370, 94);
      text('さくせんを えらべ!', 256, 158, 13, '#ffd76a', 'center');
      const names = ['1:オープン', '2:Aクイック', '3:Bクイック', '4:Cクイック', '5:バックアタック', '6:ブロード'];
      for (let i = 0; i < 6; i++) {
        text(names[i], 100 + (i % 3) * 115, 184 + Math.floor(i / 3) * 24, 12, '#e8ecff');
      }
      text('(Vで選手データ)', 256, 230, 10, '#8a96d8', 'center');
    }
  }

  if (ph === 'whistle') {
    if (M.t > 8 && M.t < 46) shText('ピイィッ!!', 256, 150, 24, '#ffe060', 'center');
  }

  if (ph === 'serve') {
    const s = M.srv;
    // サーブはコート外(エンドライン後方)から。左右端の外側、コート縦中央付近に立つ。
    const sx = M.serve === 0 ? 30 : 482;
    const sy = 300;
    // 狙うコート(レーン帯)のターゲット表示。人ではなくコートのゾーンを狙う。
    if (M.serve === 0) {
      const laneCY = LANEY[s.aimLane] + 26;       // 狙うレーンの中心y
      // 相手コート(ネット右〜右端)の該当レーン帯をハイライト
      const zx0 = NETX + 6, zx1 = 482, zh = 52;
      const pulse = 0.18 + Math.sin(M.t * 0.18) * 0.10;
      ctx.fillStyle = 'rgba(255,80,80,' + pulse.toFixed(3) + ')';
      ctx.fillRect(zx0, laneCY - zh / 2, zx1 - zx0, zh);
      ctx.strokeStyle = '#ff5050'; ctx.lineWidth = 2;
      ctx.strokeRect(zx0, laneCY - zh / 2, zx1 - zx0, zh);
      // 着地目標の照準マーク(レーン帯の中ほど)
      const tx = NETX + 150;
      ctx.beginPath(); ctx.arc(tx, laneCY, 9 + Math.sin(M.t * 0.25) * 2, 0, 7); ctx.stroke();
      px(tx - 1, laneCY - 16, 2, 9, '#ff5050'); px(tx - 1, laneCY + 7, 2, 9, '#ff5050');
      px(tx - 16, laneCY - 1, 9, 2, '#ff5050'); px(tx + 7, laneCY - 1, 9, 2, '#ff5050');
      const laneName = ['奥のコース', '中央のコース', '手前のコース'][s.aimLane];
      if (s.stage === 0) text('↑↓で狙うコート: ' + laneName, 56, 350, 10, '#ffd76a');
    }
    const tossUp = s.stage >= 1 ? Math.min((s.g || 0) * 0.8, 56) : 0;
    dude(sx, sy, M.serve, s.stage >= 1 ? 'spike' : 'stand', 0, s.server);
    // ボールの影はサーバーの足元(sy)の床に落とす(サーバーの影と高さを揃える)
    ballDraw(sx + (M.serve === 0 ? 10 : -10), sy - 48 - tossUp, true, sy);
    if (M.serve === 0 && s.stage === 1) gaugeBar(140, 372, 232, s.g);
    if (s.cheer) drawCheer(s.server.name);
    if (s.ace) drawAceFx(s.server.name);
  }

  if (ph === 'serveFault') {
    const s = M.srv;
    const sx = M.serve === 0 ? 30 : 482;
    const sy = 300;
    const dir = M.serve === 0 ? 1 : -1;            // ボールが飛ぶ向き
    const p = clamp(M.t / 40, 0, 1);
    // サーバー: 最初の数フレームは打った直後のスパイク姿勢、その後がっくり(recv=前屈み)
    const pose = M.t < 16 ? 'spike' : 'recv';
    dude(sx, sy, M.serve, pose, 0, s.server);
    // ボールの失敗軌道
    let bx, by;
    if (s.faultKind === 'net') {
      // ネットに引っかかって落ちる: ネット手前まで上がり、ネットで失速して真下に落ちる
      const netX = NETX - dir * 10;
      const up = clamp(M.t / 18, 0, 1);
      if (M.t < 22) {
        bx = lerp(sx + dir * 10, netX, easeOut(up));
        by = arcY(sy - 48, 196, 30, up);          // ネット上端付近まで
      } else {
        // ネットに当たって真下に落ちる
        const fp = clamp((M.t - 22) / 16, 0, 1);
        bx = netX + dir * 4;
        by = lerp(196, 348, easeOut(fp));
      }
      if (M.t > 20 && M.t < 30) shText('ネット!', NETX, 150, 18, '#ff8a8a', 'center');
    } else {
      // アウト: 大きく飛びすぎてエンドライン外へ
      bx = lerp(sx + dir * 10, NETX + dir * 250, easeOut(p));
      by = arcY(sy - 48, 150, 120, p);            // 高く上がって枠外へ
      if (M.t > 26 && M.t < 36) shText('アウト!', NETX + dir * 150, 130, 18, '#ff8a8a', 'center');
    }
    ballDraw(bx, by);
    if (M.t > 30) shText('しっぱい…', 256, 110, 22, '#ff6868', 'center');
  }

  if (ph === 'serveFly') {
    const s = M.srv;
    const p = clamp(M.t / s.flyT, 0, 1);
    const x0 = M.serve === 0 ? 40 : 472, x1 = M.serve === 0 ? 420 : 92;
    let bx = lerp(x0, x1, p);
    let by = arcY(258, 300, s.type === 'float' ? 100 : 64, p);
    if (s.type === 'float') bx += Math.sin(M.t * 0.4) * 4;
    // レシーバー: ボールに合わせて構える(狙われたレーンの位置に)
    const rx = M.serve === 0 ? 410 : 100;
    const ry = LANEY[s.aimLane] + 38;
    dude(rx, ry, recvTeam, 'recv', 0, M.recv.receiver, M.t, recvTeam === 0 ? 'right' : 'left');
    ballDraw(bx, by);
    if (recvTeam === 0) {
      // タイミングリング: 縮むリングが成功円(中央の的)に重なる瞬間にZ
      const rp = M.recv.receiver;
      const bw = recvWindow(rp, s.type);              // 成功円の幅(フレーム)
      const target = clamp(bw * 1.6, 6, 22);          // 中央の的の半径(px)
      const ideal = s.flyT * 0.86;
      const ringSpeed = s.type === 'float' ? 0.85 : 1.6;   // フローターは縮むリングがゆっくり
      const rr = clamp((ideal - M.t) * ringSpeed + target, target, 90);
      // 成功円(的)
      ctx.strokeStyle = '#3a8a5a'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(rx, 300, target, 0, 7); ctx.stroke();
      // 縮むリング
      ctx.strokeStyle = M.recv.pressed ? '#7cff8a' : '#ffe060'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(rx, 300, rr, 0, 7); ctx.stroke();
      shText('Z!', rx, 232, 14, '#ffe060', 'center');
      if (rp.pos === 'L') text('リベロ! 広い', rx, 248, 9, '#7cffd0', 'center');
    }
  }

  if (ph === 'recvMsg') {
    const rx = recvTeam === 0 ? 100 : 410;
    const fc = recvTeam === 0 ? 'right' : 'left';
    // 最初の数フレームは振り抜き、その後構え直す
    if (M.t < 14) dude(rx, 326, recvTeam, 'digswing', 0, M.recv.receiver, M.t, fc);
    else dude(rx, 326, recvTeam, 'recv', 0, M.recv.receiver, M.t, fc);
    const p = clamp(M.t / 50, 0, 1);
    const tx = recvTeam === 0 ? NETX - 30 : NETX + 30;
    ballDraw(lerp(rx, tx, p), arcY(300, 250, 80, p));
  }

  if (ph === 'attackSeq') drawAttackSeq();
  if (ph === 'outcome')   drawOutcome();

  if (ph === 'point') {
    px(56, 142, 400, 70, 'rgba(8,8,30,.9)');
    ctx.strokeStyle = '#5868c0'; ctx.lineWidth = 2; ctx.strokeRect(57, 143, 398, 68);
    shText(M.result.text, 256, 152, 14, '#ffe060', 'center');
    const w = M.result.winner;
    shText((w === 0 ? 'あなた' : 'COM') + 'の ポイント!  ' + M.score[0] + ' - ' + M.score[1],
           256, 180, 16, w === 0 ? '#7cff8a' : '#ff8888', 'center');
    const a = M.score[0], b = M.score[1];
    let banner = null, bcol = '#ff6868';
    if (a >= 24 && b >= 24 && a === b) { banner = '★ デュース ★'; bcol = '#ff7090'; }
    else if (Math.max(a, b) >= 24 && Math.abs(a - b) === 1) { banner = 'マッチポイント!'; bcol = '#ffae40'; }
    else if (a === 24 || b === 24) { banner = 'セットポイント!'; }
    if (banner && M.t % 40 < 25) shText(banner, 256, 120, 14, bcol, 'center');
  }

  const bn = BANNER[ph];
  if (bn) shText('◆ ' + bn + ' ◆', 256, ph === 'plan' ? 116 : 134, 13, '#a8b8ff', 'center');
  if (M.cutin) drawCutin();
  drawHUD();
  drawRotationBoards();
  if (M.subFx) drawSubFx();
  if (M.srFx) drawSuperReceiveFx(M.srFx.name);
  if (G.tut) drawTutorial();
}

/* ===== チュートリアル(12ステップ・スクリプト型) =====
   G.tut.seq[G.tut.i] が現在のステップ設定。kind=plan/recv/toss/serve/block。
   ポップアップ表示中はM.t凍結(updMatch側)。ジャストでバー/円/ゲージを止めてアナウンス。
   updTutorial: trueを返すとその回の試合進行を止める(ポーズ)。 */
function updTutorial(pressed) {
  const t = G.tut;
  if (!t) return false;

  // --- ポップアップ表示中: Zで閉じる(ポーズ) ---
  if (t.popup) {
    t.popup.t = (t.popup.t || 0) + 1;
    for (const k of pressed) {
      if ((isA(k) || k === 'Enter') && t.popup.t > 8) {
        const after = t.popup.after;
        t.popup = null;
        if (after) after();
        sGood();
        return true;
      }
    }
    return true;   // ポーズ継続
  }

  const ph = M.phase;
  const f = t.flags;
  const c = t.seq[t.i];          // 現在のステップ設定
  if (!c) return false;
  t.guide = null;                // 常駐ガイドは毎フレーム再設定

  // 次ステップへ進む共通処理
  const advance = (after) => {
    t.i++;
    t.flags = {};                // ステップ毎にフラグをリセット
    if (t.i < t.seq.length) t.step = t.seq[t.i].kind;
    if (after) after();
  };

  // ====== plan: 作戦練習 ======
  if (c.kind === 'plan') {
    if (ph === 'plan' && M.serve === 1) {
      if (!f.intro) {
        f.intro = true;
        tutPopup(c.num + ' ' + c.title, c.lines);
        return true;
      }
      filterKeysTo(pressed, [String(c.play)]);
      t.guide = { title: c.num + ' 作戦', lines: ['「' + planName(c.play) + '(' + c.play + ')」を選択！'] };
      return false;
    }
    if (M.plan === c.play && (ph === 'whistle' || ph === 'serve' || ph === 'serveFly')) {
      advance();
    }
    return false;
  }

  // ====== recv: レシーブ練習 ======
  if (c.kind === 'recv') {
    if (ph === 'serveFly' && M.serve === 1) {
      const justT = Math.round(M.srv.flyT * 0.86);
      if (!f.intro && M.t >= Math.round(M.srv.flyT * 0.4)) {
        f.intro = true;
        tutPopup(c.num + ' ' + c.title, c.lines);
        return true;
      }
      if (f.intro) {
        if (M.t >= justT && M.recv.pressed === null) {
          M.t = justT;
          t.guide = { title: c.num + ' レシーブ', lines: ['今だ！「Z」を選択！'] };
          filterKeysTo(pressed, ['z']);
          let pz = false; for (const k of pressed) if (isA(k)) pz = true;
          if (pz) { M.recv.pressed = justT; sHit(); f.recvForceOK = true; }
          return false;
        }
        t.guide = { title: c.num + ' レシーブ', lines: ['レシーブ円が重なるのを待とう'] };
        filterKeysTo(pressed, ['z']); removeKey(pressed, 'z');
        return false;
      }
      return false;
    }
    if (ph === 'recvMsg' && !f.recvDone) {
      f.recvDone = true;
      tutPopup('レシーブ成功！', ['OK！レシーブができました。', '次はトスを上げてみましょう！'], () => advance());
      return true;
    }
    return false;
  }

  // ====== toss: トス練習(作戦+方向、結果は forced) ======
  if (c.kind === 'toss') {
    if (ph === 'attackSeq' && M.atkTeam === 0) {
      const a = M.atk;
      if (!a) return false;
      const planJust = Math.round(TOSS_MID * 0.5);
      if (!a.touched) {
        if (!f.intro && M.t >= 12) {
          f.intro = true;
          tutPopup(c.num + ' ' + c.title, c.lines, () => { M.t = 0; });
          return true;
        }
        if (f.intro) {
          if (M.t >= planJust) {
            M.t = planJust;
            t.guide = { title: c.num + ' トス-作戦', lines: ['今だ！「' + planName(c.play) + '(' + c.play + ')」を選択！'] };
            filterKeysTo(pressed, [String(c.play)]);
          } else {
            t.guide = { title: c.num + ' トス-作戦', lines: ['バーが左中央に来るのを待とう'] };
            filterKeysTo(pressed, []);
          }
        }
        return false;
      }
      if (a.tButton === null) {
        if (!f.dir) {
          f.dir = true;
          tutPopup('トス成功！', c.dirLines || ['トスが上がりました。', 'ジャストで「' + c.dirName + '」を選んで', 'アタックの方向を決めます！']);
          return true;
        }
        if (M.t >= a.gate) {
          M.t = a.gate;
          t.guide = { title: c.num + ' トス-方向', lines: ['今だ！「' + c.dirName + '」を選択！'] };
          filterKeysTo(pressed, [c.dir]);
        } else {
          t.guide = { title: c.num + ' トス-方向', lines: ['ジャストゲージが重なるのを待とう'] };
          filterKeysTo(pressed, []);
        }
        return false;
      }
      return false;
    }
    if (ph === 'outcome' && M.atkTeam === 0 && !f.done) {
      f.done = true;
      const msg = (c.forced === 'kill')
        ? ['ナイスアタック！', '狙い通り決まりました！']
        : ['ナイスアタック！', '相手に拾われましたが、', '狙った選手のレシーブを乱せます！'];
      tutPopup('アタック！', msg, () => advance());
      return true;
    }
    return false;
  }

  // ====== serve: サーブ練習(strong/float) ======
  if (c.kind === 'serve') {
    if (ph === 'serve' && M.serve === 0) {
      const s = M.srv;
      if (!f.intro) {
        f.intro = true;
        tutPopup(c.num + ' ' + c.title, c.lines);
        return true;
      }
      if (s.stage === 0) {
        if (s.aimLane !== 0) s.aimLane = 0;      // 奥コース
        if (!f.toss) {
          f.toss = true;
          const tl = (c.srvType === 'float')
            ? ['コースは「奥」。フローターは', '早めのZでトスすると揺れる球に。', '「Z」を選択してトス！']
            : ['コースは「奥」に決まりました。', '「Z」を選択してトスを上げよう！'];
          tutPopup('サーブ - トス', tl);
          return true;
        }
        t.guide = { title: c.num + ' サーブ-トス', lines: ['今だ！「Z」を選択してトス！'] };
        filterKeysTo(pressed, ['z']);
        return false;
      }
      if (s.stage === 1) {
        if (!f.just) {
          f.just = true;
          tutPopup('サーブ - ジャスト', ['ジャストゲージが重なったら', '「Z」を選択して打ちます！'].concat(
            c.cheer ? ['歓声でサーブが強化されています！'] : []));
          return true;
        }
        const justG = (c.srvType === 'float') ? 30 : 78;   // フローターは早め
        if (s.g >= justG) {
          s.g = justG;
          t.guide = { title: c.num + ' サーブ-ジャスト', lines: ['今だ！「Z」を選択！'] };
          filterKeysTo(pressed, ['z']);
        } else {
          t.guide = { title: c.num + ' サーブ-ジャスト', lines: ['ジャストゲージが重なるのを待とう'] };
          filterKeysTo(pressed, []);
        }
        return false;
      }
      return false;
    }
    // サーブがエースになる場合(④⑥⑩は相手レシーブ→相手攻撃へ続くので comReceive)
    if (c.ace && ph === 'point' && M.result && M.result.kind === 'ace' && M.serve === 0) {
      if (!f.aceDone) {
        f.aceDone = true;
        tutPopup('サービスエース！', ['お見事！サービスエースです！',
          c.last ? 'これでチュートリアルは終了です。' : '', 'では試合を楽しみましょう！'].filter(Boolean), () => {
            G.tutorialDone = true; G.tutorial = false; G.level = 2; G.tut = null;
          });
        return true;
      }
      return true;
    }
    // comReceive: サーブを相手が拾って攻撃 → 次のブロックステップへ
    if (c.comReceive && ph === 'recvMsg' && M.serve === 0 && !f.srvDone) {
      f.srvDone = true;
      tutPopup('ナイスサーブ！', ['相手がレシーブしました。', '相手の攻撃をブロックしましょう！'], () => advance());
      return true;
    }
    return false;
  }

  // ====== block: ブロック練習(forced shut/out) ======
  if (c.kind === 'block') {
    if (ph === 'attackSeq' && M.atkTeam === 1) {
      const b = M.blk;
      const targetLane = (M.cpuType && ATK[M.cpuType]) ? ATK[M.cpuType].lane : 1;
      if (!f.intro && M.t >= 40) {
        f.intro = true;
        tutPopup(c.num + ' ' + c.title, c.lines, () => { M.t = 40; });
        return true;
      }
      if (!f.intro) return false;
      if (M.t < DECIDE + 2) { t.guide = { title: c.num + ' ブロック', lines: ['相手の打つ位置を見極めよう'] }; filterKeysTo(pressed, []); return false; }
      if (b.lane !== targetLane && b.pressT === null) {
        M.t = Math.min(M.t, SPIKE - 12);
        const dir = targetLane < b.lane ? '↑' : '↓';
        t.guide = { title: c.num + ' ブロック-移動', lines: ['スパイク位置に移動！「' + dir + '」'] };
        filterKeysTo(pressed, ['ArrowUp', 'ArrowDown']);
        return false;
      }
      if (b.pressT === null) {
        if (M.t >= SPIKE) {
          M.t = SPIKE;
          const g = (c.forced === 'shut') ? ['位置OK！今だ「Z」でシャット!'] : ['位置OK！今だ「Z」を選択!'];
          t.guide = { title: c.num + ' ブロック-ジャンプ', lines: g };
          filterKeysTo(pressed, ['z']);
        } else {
          t.guide = { title: c.num + ' ブロック', lines: ['ジャンプの合図を待とう'] };
          filterKeysTo(pressed, []);
        }
        return false;
      }
      return false;
    }
    if (ph === 'outcome' && M.atkTeam === 1 && !f.done) {
      f.done = true;
      const msg = (c.forced === 'shut')
        ? ['ドシャット！ブロック成功で得点！', '相手の攻撃を止めました！']
        : ['ブロックアウト！', '惜しくも相手の得点ですが、', 'ブロックの形は完璧でした！'];
      tutPopup((c.forced === 'shut') ? 'シャットブロック！' : 'ブロックアウト', msg, () => advance());
      return true;
    }
    return false;
  }

  return false;
}

/* 作戦番号→名前(チュートリアル表示用) */
function planName(n) {
  return (ATK[n] && ATK[n].name) ? ATK[n].name : ('作戦' + n);
}

/* 現在のチュートリアルステップ設定を返す(なければnull) */
function curTut() {
  return (G.tut && G.tut.seq) ? G.tut.seq[G.tut.i] : null;
}

/* pressed配列を許可キーのみに絞る(data-k値で判定) */
function filterKeysTo(pressed, allowed) {
  for (let i = pressed.length - 1; i >= 0; i--) {
    const k = pressed[i];
    const kk = (k === 'ArrowUp' || k === 'ArrowDown' || k === 'ArrowLeft' || k === 'ArrowRight') ? k
             : numKey(k) ? String(numKey(k))
             : isA(k) ? 'z' : isB(k) ? 'x' : k;
    if (!allowed.includes(kk)) pressed.splice(i, 1);
  }
}
function removeKey(pressed, key) {
  for (let i = pressed.length - 1; i >= 0; i--) {
    const k = pressed[i];
    const kk = isA(k) ? 'z' : isB(k) ? 'x' : k;
    if (kk === key) pressed.splice(i, 1);
  }
}

/* ポップアップを出す(ポーズ開始)。afterは閉じた時のコールバック。 */
function tutPopup(title, lines, after) {
  if (!G.tut) return;
  G.tut.popup = { title, lines, after, t: 0 };
}

/* チュートリアル⑤: サーブのジャストミス→「ミス！」表示してサーブの最初からリプレイ */

  M.popup = { text: 'ミス！', t: 0, col: '#ff6868' }; sBad();

  });

/* チュートリアル③: トスのタイミングミス→「ミス！」表示してトスの最初からリプレイ */
function tutReplayToss(reason) {
  M.popup = { text: 'ミス！', t: 0, col: '#ff6868' }; sBad();

}

/* チュートリアルの説明を画面最上段(得点板〜作戦フェーズ上辺の少し上)に常時表示 */
function drawTutorial() {
  const t = G.tut;
